<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtre de Paraules IEC - Columnes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 1000px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; gap: 12px; margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        input, button { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        
        .btn-cerca { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-cerca:hover { background-color: #218838; }
        
        .btn-print { background-color: #6c757d; color: white; border: none; cursor: pointer; margin-bottom: 20px; display: none; width: 100%; }

        /* DISSENY DE COLUMNES */
        #resultats { 
            background: #fff; 
            padding: 15px; 
            border: 1px solid #eee; 
            border-radius: 4px; 
            font-family: 'Courier New', Courier, monospace;
            
            /* Configuració de columnes */
            column-count: 4; /* Nombre de columnes per defecte */
            column-gap: 40px;
            column-rule: 1px solid #f0f0f0; /* Línia divisòria suau */
        }

        /* Adaptació per a pantalles petites */
        @media (max-width: 600px) {
            #resultats { column-count: 2; }
        }

        .stats { font-weight: bold; margin: 15px 0 10px 0; color: #333; font-size: 1.1rem; }

        /* CONFIGURACIÓ PER A IMPRIMIR */
        @media print {
            .controls, h2, p, .btn-print, hr { display: none !important; }
            body { background: white; margin: 0; padding: 0; max-width: 100%; }
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
            #resultats { 
                column-count: 5; /* Més columnes al paper per estalviar espai */
                font-size: 10pt; 
                border: none;
            }
            .stats { border-bottom: 2px solid #333; padding-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Filtre de Paraules IEC</h2>
    <p>1. Puja el fitxer <strong>Entrades_IEC.txt</strong></p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".txt">
        <hr>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="filtreText" placeholder="Conté (ex: ny)" style="flex: 2;">
            <input type="number" id="longitudMax" placeholder="Màx. lletres" style="flex: 1;">
        </div>
        <button class="btn-cerca" onclick="filtrarParaules()">Cerca i organitza</button>
    </div>

    <div id="zonaResultats" style="display:none;">
        <button class="btn-print" id="btnPrint" onclick="window.print()">🖨️ Imprimir llista en columnes</button>
        <div class="stats" id="comptador"></div>
        <div id="resultats"></div>
    </div>
</div>

<script>
    let llistaOriginal = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const fitxer = e.target.files[0];
        if (!fitxer) return;

        const lector = new FileReader();
        lector.onload = function(e) {
            llistaOriginal = e.target.result.split(/\r?\n/).map(p => p.trim()).filter(p => p.length > 0);
            alert("Fitxer llest amb " + llistaOriginal.length + " paraules.");
        };
        lector.readAsText(fitxer);
    });

    function filtrarParaules() {
        const textBuscat = document.getElementById('filtreText').value.toLowerCase();
        const maxLen = parseInt(document.getElementById('longitudMax').value);
        
        if (llistaOriginal.length === 0) {
            alert("Siusplau, puja primer el fitxer txt.");
            return;
        }

        const filtrades = llistaOriginal.filter(paraula => {
            const pMin = paraula.toLowerCase();
            const okText = textBuscat === "" || pMin.includes(textBuscat);
            const okLen = isNaN(maxLen) || paraula.length <= maxLen;
            return okText && okLen;
        });

        document.getElementById('zonaResultats').style.display = 'block';
        document.getElementById('comptador').innerText = "S'han trobat " + filtrades.length + " paraules:";
        
        // Ara posem cada paraula en un <div> propi per facilitar el salt de columna
        const divResultats = document.getElementById('resultats');
        divResultats.innerHTML = filtrades.map(p => `<div>${p}</div>`).join("");
        
        document.getElementById('btnPrint').style.display = filtrades.length > 0 ? 'block' : 'none';
    }
</script>

</body>
</html>
