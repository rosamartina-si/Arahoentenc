<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtre de Paraules IEC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; gap: 12px; margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        input, button { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        
        .btn-cerca { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-cerca:hover { background-color: #218838; }
        
        .btn-print { background-color: #6c757d; color: white; border: none; cursor: pointer; margin-top: 10px; display: none; }
        .btn-print:hover { background-color: #5a6268; }

        #resultats { 
            white-space: pre-wrap; 
            background: #fff; 
            padding: 15px; 
            border: 1px solid #eee; 
            border-radius: 4px; 
            max-height: 400px; 
            overflow-y: auto; 
            font-family: monospace;
        }
        .stats { font-weight: bold; margin: 15px 0 5px 0; color: #333; }

        /* CONFIGURACIÓ PER A IMPRIMIR */
        @media print {
            .controls, h2, p, .btn-print, hr { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            #resultats { max-height: none; overflow: visible; border: none; font-size: 12pt; }
            .stats { font-size: 10pt; color: black; border-bottom: 1px solid #000; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Filtre de Paraules IEC</h2>
    <p>1. Puja el fitxer <strong>Entrades_IEC.txt</strong></p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".txt">
        <hr>
        <input type="text" id="filtreText" placeholder="Conté (ex: ny)">
        <input type="number" id="longitudMax" placeholder="Longitud màxima (ex: 4)">
        <button class="btn-cerca" onclick="filtrarParaules()">Cerca paraules</button>
    </div>

    <div id="zonaResultats" style="display:none;">
        <div class="stats" id="comptador"></div>
        <div id="resultats"></div>
        <button class="btn-print" id="btnPrint" onclick="window.print()">🖨️ Imprimir resultats / Guardar PDF</button>
    </div>
</div>

<script>
    let llistaOriginal = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const fitxer = e.target.files[0];
        if (!fitxer) return;

        const lector = new FileReader();
        lector.onload = function(e) {
            llistaOriginal = e.target.result.split(/\r?\n/).map(p => p.trim()).filter(p => p.length > 0);
            alert("Carregat: " + llistaOriginal.length + " paraules.");
        };
        lector.readAsText(fitxer);
    });

    function filtrarParaules() {
        const textBuscat = document.getElementById('filtreText').value.toLowerCase();
        const maxLen = parseInt(document.getElementById('longitudMax').value);
        
        if (llistaOriginal.length === 0) {
            alert("Siusplau, puja primer el fitxer txt.");
            return;
        }

        const filtrades = llistaOriginal.filter(paraula => {
            const pMin = paraula.toLowerCase();
            const okText = textBuscat === "" || pMin.includes(textBuscat);
            const okLen = isNaN(maxLen) || paraula.length <= maxLen;
            return okText && okLen;
        });

        // Mostrar zona de resultats
        document.getElementById('zonaResultats').style.display = 'block';
        document.getElementById('comptador').innerText = "Resultats trobats: " + filtrades.length;
        document.getElementById('resultats').innerText = filtrades.join("\n");
        
        // Mostrar botó d'imprimir només si hi ha resultats
        document.getElementById('btnPrint').style.display = filtrades.length > 0 ? 'block' : 'none';
    }
</script>

</body>
</html>
