<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cercador de Mots IEC - Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .box { background: white; max-width: 900px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        input[type="text"] { flex: 2; min-width: 250px; }
        
        .btn-go { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; flex: 3; transition: 0.3s; }
        .btn-go:hover { background: #218838; }
        .btn-reset { background: #6c757d; color: white; border: none; cursor: pointer; flex: 1; }
        
        .status { font-size: 0.9em; padding: 12px; background: #e9ecef; border-radius: 6px; margin-bottom: 15px; border-left: 5px solid #28a745; }
        
        /* LOADING SPINNER */
        #loader { 
            display: none; 
            align-items: center; 
            gap: 10px; 
            font-weight: bold; 
            color: #28a745; 
            margin: 15px 0; 
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultats { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 8px; 
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }
        .vocal-check { display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>Cercador de Mots IEC</h2>
    
    <div class="status" id="debug">Pujar un fitxer .txt per començar.</div>

    <input type="file" id="fileInput" accept=".txt" multiple style="width:100%; margin-bottom:15px;">

    <div class="form-row">
        <input type="text" id="cerca" placeholder="Seqüència de lletres (ex: ar)">
        <select id="tipus">
            <option value="exacte">Seqüència exacta</option>
            <option value="dispers">Lletres disperses</option>
        </select>
        <select id="on">
            <option value="tot">Arreu de la paraula</option>
            <option value="ini">Al principi</option>
            <option value="fi">Al final</option>
        </select>
    </div>

    <div class="form-row">
        <input type="text" id="no" placeholder="Exclou lletres (ex: kx)">
        <input type="number" id="min" placeholder="Llargada mín" style="width:120px;">
        <input type="number" id="max" placeholder="Llargada màx" style="width:120px;">
    </div>

    <div class="form-row">
        <label class="vocal-check"><input type="checkbox" id="vocal"> Obligar mín. 1 vocal</label>
        <label class="vocal-check"><input type="checkbox" id="net"> Resultat net (sense accents)</label>
    </div>

    <div class="form-row">
        <button class="btn-go" id="btnFiltrar" onclick="prepararCerca()">FILTRAR PARAULES</button>
        <button class="btn-reset" onclick="location.reload()">REINICIAR</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <span>Filtrant el diccionari...</span>
    </div>

    <div id="res-box" style="display:none;">
        <hr>
        <h3 id="comptador">Resultats: 0</h3>
        <div id="resultats"></div>
    </div>
</div>

<script>
    let dades = [];

    // 1. CARREGAR FITXERS
    document.getElementById('fileInput').onchange = async function(e) {
        const files = e.target.files;
        if (!files.length) return;
        
        let temporal = new Set();
        document.getElementById('debug').innerText = "⏳ Llegint i processant dades...";

        for (let f of files) {
            const buffer = await f.arrayBuffer();
            let text = "";
            try {
                text = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
            } catch {
                text = new TextDecoder('windows-1252').decode(buffer);
            }
            
            text.split(/\r?\n/).forEach(linia => {
                let p = linia.trim();
                if (p.length > 0) temporal.add(p);
            });
        }
        
        dades = Array.from(temporal);
        document.getElementById('debug').innerText = `✅ Memòria: ${dades.length} paraules carregades a punt per cercar.`;
    };

    function netejar(t) {
        return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // 2. MOSTRAR EL "PENSANT" ABANS DE FILTRAR
    function prepararCerca() {
        if (dades.length === 0) {
            alert("Siusplau, puja primer el fitxer .txt");
            return;
        }

        // Mostrem el loader i amaguem resultats vells
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('res-box').style.display = 'none';
        document.getElementById('btnFiltrar').disabled = true;

        // Donem un petit respir al navegador perquè pinti el loader
        setTimeout(executarCerca, 300);
    }

    // 3. LA LÒGICA DE FILTRATGE
    function executarCerca() {
        const valCerca = netejar(document.getElementById('cerca').value);
        const valTipus = document.getElementById('tipus').value;
        const valOn = document.getElementById('on').value;
        const valNo = netejar(document.getElementById('no').value);
        const valMin = parseInt(document.getElementById('min').value);
        const valMax = parseInt(document.getElementById('max').value);
        const valVocal = document.getElementById('vocal').checked;
        const valNet = document.getElementById('net').checked;

        let filtrats = dades.filter(paraula => {
            const pNet = netejar(paraula);
            const pLen = paraula.length;

            if (!isNaN(valMin) && pLen < valMin) return false;
            if (!isNaN(valMax) && pLen > valMax) return false;

            if (valCerca) {
                if (valTipus === "exacte") {
                    if (valOn === "tot" && !pNet.includes(valCerca)) return false;
                    if (valOn === "ini" && !pNet.startsWith(valCerca)) return false;
                    if (valOn === "fi" && !pNet.endsWith(valCerca)) return false;
                } else {
                    for (let l of valCerca) { if (!pNet.includes(l)) return false; }
                    if (valOn === "ini" && !valCerca.includes(pNet[0])) return false;
                    if (valOn === "fi" && !valCerca.includes(pNet[pNet.length-1])) return false;
                }
            }

            if (valNo) {
                for (let l of valNo) { if (pNet.includes(l)) return false; }
            }

            if (valVocal && !/[aeiouàèéíòóúïü]/.test(paraula.toLowerCase())) return false;

            return true;
        });

        if (valNet) {
            filtrats = Array.from(new Set(filtrats.map(p => netejar(p))));
        }

        filtrats.sort((a,b) => a.localeCompare(b, 'ca'));
        
        // Finalitzem
        document.getElementById('loader').style.display = 'none';
        document.getElementById('btnFiltrar').disabled = false;
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('comptador').innerText = `Resultats: ${filtrats.length}`;
        document.getElementById('resultats').innerHTML = filtrats.map(p => `<div>${p}</div>`).join("");
    }
</script>

</body>
</html>
