ieron? y quiero dezir el despidie<n>te & co<n>el acabar. Estauamos en Escalona vi-lla} [fol. 10r] {HD. primero.} {CB1. del duq<ue> della en vn meson y dio me vn pedac'o de longaniza q<ue> le assasse. Ya q<ue> la lo<n>ganiza auia pringado y comido se las pringadas: saco vn marauedi dela bolsa / y mando q<ue> fuesse por el de vino a la taberna: puso me el demonio el aparejo delante los ojos: el qual, ((como suelen dezir)) haze al ladro<n> / y fue q<ue> auia cabe el fuego vn nauo pequen~o larguillo y ruynoso / y tal que por no ser para la olla deuio ser echado alli / y como al presente nadie estuuiesse si( )no el y yo solos: como me vi co<n> apetito goloso / auie<n>do me puesto de<n>tro el sabroso olor dela longaniza. del q<ua>l solame<n>te sabia q<ue> auia de gozar no mira<n>do q<ue> me podria suceder / pospuesto todo el temor por cu<m>plir co<n>el desseo: en ta<n>to q<ue> el ciego sacaua dela bolsa el dinero: saque la longaniza y muy p<re>sto meti el sobredicho nabo en el assador el q<ua>l mi amo da<n>do me el dinero p<ar>a el vino: tomo y come<n>c'o a dar bueltas al fuego q<ue>rie<n>do assar al q<ue> de ser cozido por sus d<e>meritos auia escapado. Yo fuy por el vino co<n>el q<ua>l no tarde en despachar la lo<n>ganiza / y q<ua>ndo vine halle al peccador d<e>l ciego q<ue> tenia entre dos reuanadas apertado el nabo: al q<ua>l} {CW. B ij} [fol. 10v] {HD. Tratado +} {CB1. aun no auia conoscido por no lo auer tentado co<n>la mano. Como tomasse las reuanadas & mordiesse en ellas pe<n>sando ta<m>bien lleuar parte dela lo<n>ganiza: hallo se en frio con el frio nabo: altero se & dixo. Que es esto Lazarillo? Lazerado de mi: dixe yo: si quereys a mi echar algo: yo no ve<n>go de traer el vino algu<n>o estaua ay y por burlar haria esto. No no dixo el: q<ue> yo no he dexado el assador dela mano: no es possible. Yo torne a jurar y perjurar que estaua libre de aquel trueco y ca<m>bio: mas poco me aprouecho. Pues a las astucias del maldito ciego nada se le escondia: leua<n>to se y asio me por la cabec'a / y llego se a oler me / & como deuio sentir el huelgo a vso de buen podenco por mejor satisfazer se dela verdad, y con la gran agonia q<ue> lleuaua asie<n>do me conlas manos / abria me la boca mas de su derecho / y desate<n>tadame<n>te metia la nariz: la qual el tenia lue<n>ga y afilada. Y a aquella sazo<n> co<n> el enojo se auia augme<n>tado vn palmo / co<n> el pico dela qual me llego a la gulilla: y co<n> esto y co<n>el gran miedo q<ue> tenia / y co<n> la breuedad del tie<m>po: la negra longaniza a( )vn no auia hecho assiento en el estoma-go,} [fol. 11r] {HD. Tractado} {CB1. y lo mas principal co<n>el destie<n>to dela cu<m>plidissima nariz / medio quasi ahoga<n>do me todas estas cosas se juntaro<n> y fuero<n> causa q<ue> el hecho y golosina se manifestasse / y lo suyo fuesse buelto a su duen~o. De manera q<ue> antes que el mal ciego sacasse de mi boca su tro<m>pa / tal alteracio<n> sintio mi estomago q<ue> le dio co<n>el hurto en ella: de suerte q<ue> su nariz & la negra mal maxcada lo<n>ganiza a vn tie<m>po saliero<n> de mi boca. O gran dios quien estuuiera aquella hora sepultado: q<ue> muerto ya lo estaua. Fue tal el corage del peruerso ciego / q<ue> si al ruydo no acudiera<n> pie<n>so no me dexara co<n> la vida: sacaro<n> me de entre sus manos dexando se las llenas d<e> aquellos pocos cabellos q<ue> tenia: aran~ada la cara y rascun~ado el pescuec'o y la garga<n>ta / y esto bie<n> lo merescia pues por su maldad me venian ta<n>tas persecuciones. Co<n>taua el mal ciego a todos quantos alli se allegaua<n> mis desastres / y daua les cuenta vna y otra vez: assi dela del jarro como dela del razimo. Y agora delo presente: era la risa de todos tan grande q<ue> toda la gente que por la calle passaua: entraua a ver la fiesta: mas con ta<n>ta gracia y donayre} {CW. B iij} [fol. 11v] {HD. Tratado +} {CB1. recontaua el ciego mis hazan~as q<ue> aunq<ue> yo estaua tan maltratado / y llorando me parescia q<ue> hazia sin justicia en no se las reyr. Y en qua<n>to esto passaua: a la memoria me vino vna couardia y floxedad que hize porq<ue> me maldezia / y fue no dexalle sin narizes pues tan buen tiempo tuue para ello que la meytad del camino estaua andado / que con solo apretar los dientes se me quedara<n> en casa / y con ser de aq<ue>l maluado por ventura lo retuuiera mejor mi estomago q<ue> retuuo la lo<n>ganiza / y no paresciendo ellas: pudiera negar la demanda. Pluguiera a dios q<ue> lo huuiera hecho: q<ue> esso fuera assi: que assi. Hiziero<n> nos amigos la mesonera y los q<ue> alli estaua<n> y co<n> el vino q<ue> para beuer le auia traydo: lauaro<n> me la cara y la garganta: sobre lo qual disca<n>taua el mal ciego: donayres diziendo: por verdad mas vino me gasta este moc'o en lauatorios al cabo del an~o q<ue> yo beuo en dos. A[ ]lo[ ]menos Lazaro eres en mas cargo al vino: q<ue> a tu padre: porq<ue> el vna vez te enge<n>dro mas el vino mil te ha dado la vid(o)[a]/ y luego contaua qua<n>tas vezes me auia descalabrado y harpado la cara y con vino luego sana-ua.} [fol. 12r] {HD. primero.} {CB1. Yo te digo ((dixo[))] q<ue> si vn ho<m>bre enel mundo ha de ser bie<n>auenturado co<n> vino q<ue> seras tu. Y reyan mucho los que me lauauan co<n> esto aunq<ue> yo renegaua. Mas el pronostico del ciego no salio mentiroso: y despues aca muchas vezes me acuerdo de aquel ho<m>bre / que sin duda deuia tener sp<irit>u de prophecia / y me pesa delos sinsabores q<ue> le hize: aunque bien se lo pague: co<n>siderando lo q<ue> aquel dia me dixo salir me ta<n> verdadero: como adela<n>te U<uestra> M<erced> oyra. Uisto esto y las malas burlas q<ue> el ciego burlaua de mi: determine de todo en todo dexalle: y como lo traya pensado / y lo tenia en voluntad. Con este postrer juego q<ue> me hizo afirme lo mas / y fue ansi: q<ue> luego otro dia salimos por la villa a pedir limosna / & auia llouido mucho la noche antes. Y porq<ue> el dia ta<m>bien llouia / y andaua reza<n>do debaxo de vnos portales q<ue> en aq<ue>l pueblo auia do<n>de no nos mojamos: mas como la noche se venia y el llouer no cessaua: dixo me el ciego. Lazaro esta agua es muy porfiada y qua<n>to la noche mas cierra mas rezia: acojamo( )nos a la posada co<n> t<iem>po. Para yr alla auiamos d<e> passar vn arroyo q<ue> co<n>} {CW. B iiij} [fol. 12v] {HD. primero.} {CB1. la mucha agua yua grande / yo le dixe. Tio el arroyo va muy ancho: mas si quereys / yo veo por donde trauessemos mas ayna sin nos mojar: porque se estrecha alli mucho, & saltando passaremos a pie enxuto. Parescio le buen consejo & dixo. Discreto eres: por esto te quiero bien lleua me a esse lugar donde el arroyo se ensangosta: que agora es inuierno / y sabe mal el agua / & mas lleuar los pies mojados. Yo que vi el aparejo ami desseo: saque le debaxo delos portales & lleue lo derecho de vn pilar / o poste de piedra que enla plac'a estaua: sobre el qual y sobre otros cargauan saledizos de aquellas casas y digo le. Tio este es el passo mas angosto que en el arroyo ay: como llouia rezio y el triste se mojaua / & con la priessa que lleuauamos d<e> salir del agua q<ue> encima de nos caya. Y lo mas principal ((porque Dios le cego aquella hora el entendimiento)) fue por dar me del venganc'a. Creyo se de mi / y dixo: pon me bien derecho: y salta tu el arroyo. Yo le puse bien derecho en frente del pilar / y doy vn salto: & po<n>go me detras del poste: como quien espera tope de Toro / & dixe le.} [fol. 13r] {HD. Primero.} {CB1. Sus salta todo lo que podays: porque deys deste cabo del agua: aun a( )penas lo auia acabado de dezir quando se abalanc'a el pobre ciego como cabron: y de toda su fuerc'a arremete / tomando vn passo a( )tras dela corrida para hazer mayor salto / y da con la cabec'a enel poste que sono tan rezio, como si diera con vna gran calabac'a / & cayo luego para atras medio muerto y hendida la cabec'a: como y olistes la longaniza y no el poste? ole / ole: le dixe yo. Y dexe le en poder de mucha gente que lo auia ydo a socorrer: y tome la puerta de la villa en los pies de vn trote: y antes q<ue> la noche viniesse di comigo en Torrijos / no supe mas lo que Dios del hizo / ni cure de lo saber. {RUB. % Como Lazaro se assento con vn clerigo / y delas cosas que con el passo.} {IN4.} OTro dia no pareciendo me estar alli seguro / fuy me avn lugar que llaman Maqueda / a donde me toparon mis peccados con vn cleri-go /} [fol. 13v] {HD. Tractado +} {CB1. que llegando a pedir limosna me pregunto / si sabia ayudar a missa / yo d(l)[i]xe que si ((como era verdad)) que aunque mal tratado / mil cosas buenas me mostro el peccador del ciego: y vna dellas fue esta. Finalme<n>te el clerigo me rescibio por suyo. Escape del trueno y di enel relampago: porque era el ciego para con este vn Alexandre magno con ser la mesma auaricia / como he contado. No digo mas sino que toda la lazeria del mundo estaua encerrada en este / no se si de su cosecha era / o lo auia anexado con el abito de clerezia. El tenia vn arcaz viejo / y cerrado con su llaue: la qual traya atada co<n> vn agugeta del paletoque: y en viniendo el bodigo de la yglesia / por su mano era luego alli lanc'ado y tornada a[ ]cerrar el arca: y en toda la casa no auia ninguna cosa de comer / como suele estar en otras algun tozino colgado al humero: algun queso puesto en alguna tabla / o en el Armario / algun canastillo con algunos pedac'os de pan que de la messa sobran. Que me paresce a mi que aunque dello no me aprouechara: con la vista dello me consolara. Solamente ha-uia} [fol. 14r] {HD. segundo.} {CB1. vna horca de cebollas: y tras la llaue en vna camara en lo alto dela casa destas tenia yo de racion vna para cada quatro dias: y quando le pedia la llaue para yr por ella. Si alguno estaua presente: echaua mano al falsopecto y con gran continencia la desataua y me la daua: diziendo. Toma y buelue la luego y no hagays sino golosinar: como si debaxo della estuuieran todas las conseruas de Ualencia con no auer en la dicha camara / como(~) dixe: maldita la otra cosa que las cebollas colgadas de vn clauo: las quales el tenia tambien por cuenta / que si por malos de mis peccados me desmandara a mas de mi tasa: me costara caro. Finalmente yo me finaua de hambre. Pues ya que comigo tenia poca caridad / consigo vsaua mas. Cinco blancas de carne era su ordinario para comer y cenar / verdad es que partia comigo del caldo: que de la carne / ta<n> blanco el ojo: sino vn poco de pa<n>: y pluguiera a Dios que me demediara. Los Sabados comen se en esta tierra cabec'as de Carnero / y embiaua me por vna q<ue> costaua tres marauedis: aq<ue>lla le cozia y comia los ojos} [fol. 14v] {HD. Tratado. +} {CB1. y la lengua y el cogote y sesos / y la carne q<ue> en las quixadas tenia: y daua me todos los huessos roydos: y daua me los enel plato diziendo. Toma / come / triumpha que para ti es el mundo / mejor vida tienes que el papa. Tal te la de Di(e)[o]s dezia yo passo entre mi. A cabo de tres semanas que estuue con el / vine a tanta flaqueza / que no me podia tener en las piernas de pura hambre: vime claramente yr ala sepultura / si Dios y mi saber no me remediaran para vsar de mis man~as no tenia aparejo / por no tener en q<ue> dalle salto / y aunque algo vuiera no podia cegalle: como hazia al q<ue> dios perdone / si de aquella calabac'ada fenecio: q<ue> toda( )via aunq<ue> astuto co<n> faltalle aquel preciado sentido no me sentia: mas estotro ninguno ay q<ue> ta<n> aguda vista tuuiesse como el tenia. Quando al offertorio estauamos ninguna blanca enla concha caya que no era del registrada: el vn ojo tenia enla gente y el otro en mis manos baylaua<n> le los ojos en el caxco / como si fueran de azogue: quantas blancas ofrecia<n> tenia por cuenta: y acabado el offrecer: luego me quitaua la corneta y la ponia sobre el al-tar:} [fol. 15r] {HD. segundo.} {CB1. no era yo sen~or de asir le vna blanca todo el tiempo que con el beui / o por mejor dezir mori / de la tauerna nunca le traxe vna blanca de vino / mas aquel poco que dela offre<n>da auia metido en su arcaz compassaua de tal forma: que le turaua toda la semana. Y por ocultar su gra<n> mezquindad dezia me Mira moc'o los sacerdotes han de ser muy te<m>plados en su comer y beuer / y por esto yo no me desmando como otros. Mas el lazerado mentia falsamente: porque en cofradias y mortuorios que rezamos / a costa agena comia como lobo y beuia mas que vn saludador: y porque dixe d<e> mortuorios. Dios me perdone que jamas fuy enemigo de la naturaleza humana sino entonces: y esto era porque comiamos bien y me hartauan desseaua y aun rogaua a Dios que cada dia matasse el suyo. Y quando dauamos sacramento alos enfermos / especialmente la extrema vncion / como manda el clerigo rezar alos que estan alli: yo cierto no era el postrero de la oracion / y con todo mi corac'on / y buena voluntad rogaua al sen~or: no que la echasse ala parte que mas seruido fuesse} [fol. 15v] {HD. Tratado. +} {CB1. ((como se suele dezir)) mas que le lleuasse de aqueste mundo. Y quando alguno de estos escapaua ((Dios me lo perdone)) que mil vezes le daua al diablo. Y el que se moria otras tantas bendiciones lleuaua de mi dichas: porque en todo el tiempo que alli estuue que seria quasi seys meses: solas veynte personas fallescieron: y estas bie<n> creo que las mate yo: o por mejor dezir murieron a mi requesta porque viendo el Sen~or mi rouiosa y continua muerte: pienso que holgaua de matar los por dar me a mi vida mas de lo que al presente padecia: remedio no hallaua: que si el dia que enterrauamos yo viuia: los dias que no hauia muerto: por quedar bien vezado de la hartura: tornando a mi quotidiana hambre: mas lo sentia. De manera que en nada hallaua descanso: saluo enla muerte: que yo tambie<n> para mi como para los otros desseaua algu<n>as vezes mas no la via aunque estaua siempre en mi. Pense muchas vezes yr me d<e> aquel mezquino amo: mas por dos cosas lo dexaua. La primera por no me atreuer a mis piernas por temer de la flaqueza que de pura} [fol. 16r] {HD. segundo.} {CB1. hambre me venia. Y la otra consideraua / y dezia. Yo he tenido arca abierta / y comienc'o a barrer la casa co<n> mucha alegria paresciendo me con aquel remedio / remediar dende en adelante la triste vida. Y assi estuue con ello aquel dia y otro gozoso: mas no estaua en mi dicha que} [fol. 17r] {HD. segundo.} {CB1. me durasse mucho aquel descanso: porque luego al tercero dia me vino la terciana derecha: y fue que veo ha deshora al que me mataua de hambre: sobre nuestro arcaz / boluiendo y reboluiendo: contando y tornando a contar los panes. Yo dissimulaua y en mi secreta oracion y deuociones y plegarias dezia. Sant Juan y ciega le. Despues que estuuo vn gran rato echando la cuenta por dias y dedos contando / dixo. Si no tuuiera a tan buen recado esta arca: yo dixera que me auian tomado della panes: pero de oy mas solo por cerrar la puerta ala sospecha: quiero tener buena cuenta con ellos: nueue quedan y vn pedac'o. Nueuas malas te de dios ((dixe yo entre mi)) parecio me con lo q<ue> dixo passar me el corac'on co<n> saeta de montero / y comenc'o me el estomago a escaruar de hambre / viendo se puesto en la dieta passada. Fue fuera de casa: yo por consolarme abro el arca / y como vi el pan comenc'e lo de adorar ((no osando rescebillo)) conte los: si a dicha el lazerado se herrara / y halle su cuenta mas verdadera que yo quisiera: lo mas q<ue> yo pude hazer: fue dar en} {CW. C} [fol. 17v] {HD. Tratado. +} {CB1. ellos mil besos: y lo mas delicado que yo pude: del partido parti vn poco al pelo que el estaua / y con aquel passe aquel dia no tan alegre como[ ]el passado. Mas como la hambre creciesse: mayormente que tenia el estomago hecho a mas pan: aquellos dos / o tres dias ya dichos: moria mala muerte: tanto que otra cosa no hazia en viendo me solo sino abrir / y cerrar el arca y comtemplar en aquella cara de Dios ((que ansi dizen los nin~os[))]. Mas el mesmo Dios que socorre a los afligidos viendo me en tal estrecho: truxo a mi memoria vn pequen~o remedio: que considerando entre mi dixe. Este arqueton es viejo y grande y roto por algunas partes / aun que pequen~os agujeros. Puede se pensar que ratones entrando en el hazen dan~o a este pan: sacar lo entero / no es cosa conueniente porque vera la falta el que en tanta me haze biuir. Esto bien se sufre: y comienc'o a desmigajar el pan sobre vnos no muy costosos manteles que alli estauan / y tomo vno y dexo otro: de manera que en cada qual de tres / o quatro / desmigaje su poco: despues como quie<n>} [fol. 18r] {HD. segundo.} {CB1. toma gragea lo comi / y algo me console. Mas el como viniesse a comer y abriesse el arca: vio el mal pesar / y sin dubda creyo ser ratones los que el dan~o auian hecho / porque estaua muy al propio contra hecho de como ellos lo suelen hazer. Miro todo el arcaz de vn cabo otro/ y vio le ciertos agujeros por do sospechaua hauian entrado: llamo me diziendo. Lazaro / mira mira que persecucion ha venido aquesta noche por nuestro pan. Yo hize me muy marauillado preguntando le que seria / que ha de ser dixo el: ratones que no dexan cosa a vida: pusimonos a comer y quiso Dios que aun en esto me fue bien que me cupo mas pan que la lazeria que me solia[ ]dar / porque rayo con vn cuchillo todo lo que penso ser ratonado / diziendo. Come te esso que el rato<n> cosa limpia es. Y assi aq<ue>l dia an~adie<n>do la racio<n> del trabajo de mis manos / o d<e> mis vn~as por mejor dezir / acabamos de comer aunque yo nunca empec'aua. Y luego me vino otro sobre( )salto / que fue ver le andar solicito: quitando clauos delas paredes / y buscando tablillas / con las quales clauo y cerro} {CW. C i/} [fol. 18v] {HD. Tratado +} {CB1. todos los agujeros dela vieja arca. O sen~or mio ((dixe yo ento<n>ces)) a quanta miseria y fortuna y desastres estamos puestos los nascidos / y quan poco turan los plazeres de esta nuestra trabajosa vida. He me aqui que pensaua con este pobre y triste remedio remediar y passar mi lazeria / y estaua ya quanto que alegre y de buena ventura: mas no quiso mi desdicha despertando ha este lazerado de mi amo/ y poniendo le mas rtido hize / segun de yuso esta escripto / y con aquello algun tanto consolado tornando a cerrar me bolui a mis pajas en las quales repose y dormi vn poco. Lo qual yo hazia mal / y echaua lo al no comer. Y ansi seria porque cierto en aquel tiempo no me deuian de quitar el suen~o los cuydados de el rey de Francia. Otro dia fue por el sen~or mi amo visto el dan~o assi del pan como del agujero q<ue> yo auia hecho y comenc'o a dar alos Diablos los ratones / y dezir. Que diremos a esto? Nunca auer sentido ratones en esta casa sino agora: y sin dubda deuia de dezir verdad. Porque si saca auia de auer en el reyno justamente de ellos privilegiada / aquella de razon auia de ser. Porque no suelen morar donde no ay que comer. Torna a buscar clauos por la casa y por las paredes y tablillas a atapar se los: Uenida la noche y su reposo/ luego era yo puesto en} [fol. 20r] {HD. segundo.} {CB1. pie con mi aparejo y quantos el tapaua de dia destapaua yo de noche. En tal manera fue y tal priessa nos dunos / que sin dubda por esto se deuio dezir / donde vna puerta se cierra otra se abre. Finalmente paresciamos tener a destajo la tela de Penelope / pues quanto el texia de dia: rompia yo de noche Ca en pocos dias y noches pusimos la pobre despensa de tal forma / que quien quisiera propiamente della hablar: mas corac'as viejas de otro tiempo que no arcaz la llamara / segun la clauazon y tachuelas sobre si tenia. De que vio no le aprouechar nada su remedio ((dixo)) este arcaz esta tan maltratado y es de madera tan vieja y flaca que no aura raton a quien se defienda / y va ya tal que si andamos mas con el: nos dexara sin guarda / y aun lo peor que au<n>que haze poca toda via hara falta faltando / y me pondra en costa de tres / o quatro reales. El mejor remedio que hallo pues el de hasta aqui no aprouecha: armare por de dentro a estos ratones malditos. Luego busco prestada vna ratonera: y con cortezas de queso que a los vezinos pedia: contino el} {CW. C iiij} [fol. 20v] {HD. Tratado. +} {CB1. gato estaua armado dentro del arca. Lo qual era para mi singular auxilio: porque puesto caso / que yo no auia menester muchas salsas para comer toda via me holgaua con las cortezas del queso que de la ratonera sacaua / & sin esto no perdonaua el ratonar del bodigo. Como hallasse el pan ratonado y el queso comido y no cayesse el rato<n> que lo comia daua se al diablo: preguntaua alos vezinos que podria ser comer el queso y sacar lo de la ratonera y no caer ni quedar dentro el raton / y hallar cayda la trampilla del Gato. Acordaron los vezinos no ser el raton el que este dan~o hazia / porque no fuera menos de hauer caydo alguna vez dixo le vn vezino. En vuestra casa yo me acuerdo que solia andar vna Culebra, y esta deue de ser sin dubda. Y lleua razon que como es larga / tiene lugar de tomar el ceuo / y aun que la coja la trampilla encima como no entre toda dentro: torna se a salir. Quadro a todos lo que aquel dixo: y altero mucho a mi amo: y de<n>de en adelante no dormia tan a suen~o suelto / que qualquier gusano d<e>la madera q<ue> d<e> noche sonasse: pen-saua} [fol. 21r] {HD. segundo.} {CB1. ser la culebra que le roya el arca / luego era puesto en pie & co<n> vn garrote q<ue> a la cabecera ((desde q<ue> aquello le dixero<n>)) ponia / daua enla peccadora del arca gra<n>des garrotazos pe<n>sando espantar la culebra / a los vezinos despertaua co<n> el estrue<n>do q<ue> hazia & a mi no dexaua dormir: yua se a mis pajas & trastornaua las y a mi co<n> ellas pe<n>sando q<ue> se yua para mi se emboluia en mis pajas o en mi sayo: porq<ue> le dezia<n> q<ue> de noche acaescia a estos animales, buscando calor yr se a las cunas donde esta<n> criaturas: y aun mordellas y hazer les peligrar. Yo las mas vezes hazia del dormido y enla man~ana dezia me el. Esta noche moc'o no sentiste nada: pues tras la culebra anduue y aun pie<n>so se ha de yr para ti a la cama q<ue> son muy frias y buscan calor / plega a dios q<ue> no me muerda ((dezia yo)) que harto miedo le te<n>go: desta manera andaua tan eleuado y leua<n>tado del suen~o / q<ue> mi fe la culebra o culebro por mejor dezir: no osaua roer de noche ni leua<n>tar se al arca, mas d<e> dia mie<n>tra estaua enla yglesia o por el lugar hazia mis saltos: los quales dan~os viendo el y el poco remedio q<ue> les podia poner: anda-ua} [fol. 21v] {HD. Tratado +} {CB1. d<e> noche ((como digo)) hecho trasgo: yo huue miedo q<ue> con aquellas dilige<n>cias no me topasse conla llaue q<ue> debaxo delas pajas tenia y parescio me lo mas seguro metella de noche enla boca porq<ue> ya desde q<ue> viui conel ciego la tenia tan hecha bolsa q<ue> me acaescio tener en ella doze o quinze marauedis todo en medias blancas sin q<ue> me estoruassen el comer: porq<ue> de otra manera no era sen~or de vna blanca q<ue> el maldito ciego no cayesse co<n> ella no dexando costura ni remiendo q<ue> no me buscaua muy a menudo: pues ansi como digo / metia cada noche la llaue en la boca y dormia sin recelo q<ue> el bruxo de mi amo cayesse con ella: mas q<ua>ndo la desdicha ha de venir / por demas es dilige<n>cia. Quisiero<n> mis hados ((o por mejor dezir)) mis peccados q<ue> vna noche q<ue> estaua durmiendo: la llaue se me puso enla boca q<ue> abierta deuia tener de tal manera y postura que el ayre y resoplo q<ue> yo durmiendo echaua / salia por lo hueco d<e> la llaue ((que de can~uto era)) y siluaua ((segu<n> mi desastre quiso)) muy rezio de tal manera que el sobresaltado de mi amo lo oyo: y creyo sin duda ser el siluo dela culebra / y cierto} [fol. 22r] {HD. segundo.} {CB1. lo deuia parescer: leuanto se muy passo con su garrote enla mano y al tiento & sonido d<e> la culebra se llego a mi con mucha quietud por no ser sentido dela culebra, y como cerca se vio: penso que alli en las pajas do yo estaua echado al calor mio se auia venido / leuantando bien el palo / pensando tener la debaxo y dar le tal garrotazo que la matasse / con toda su fuec'a me descargo enla cabec'a vn tan gran golpe que sin ningun sentido y muy mal descalabrado me dexo: como sintio q<ue> me auia dado: segun yo d<e>uia hazer gra<n> sentimie<n>to co<n>el fiero golpe: contaua el q<ue> se auia llegado a mi: y da<n>do me gra<n>des vozes llama<n>do me procuro recordar me: mas como me tocasse co<n>las manos: tento la mucha sangre q<ue> se me yua / y conoscio el dan~o q<ue> me auia hecho: y con mucha priessa fue a buscar lu<m>bre / y llegando con ella hallo me quexando toda via con mi llaue en la boca: que nunca la desampare la mitad fuera: bie<n> de aquella manera que deuia estar al tie<m>po que siluaua con ella. Espantado el matador de culebras / que podria ser aquella llaue: miro la / sacando me la del todo dela boca} [fol. 22v] {HD. Tratado +} {CB1. & vio lo q<ue> era: porq<ue> enlas guardas nada d<e>la suya difere<n>ciaua: fue luego a proualla y co<n> ella p<ro>uo el maleficio. Deuio d<e> dezir el cruel cac'ador / el rato<n> y culebra q<ue> me daua<n> guerra y me comian mi hazie<n>da he hallado: de lo q<ue> sucedio en aq<ue>llos tres dias siguie<n>tes ninguna fe dare: porq<ue> los tuue en el vie<n>tre de la vallena: mas de como esto q<ue> he co<n>tado: oy ((despues q<ue> en mi torne)) dezir a mi amo / el qual a qua<n>tos alli venia<n> lo co<n>taua por exte<n>so: a[ ]cabo de tres dias yo torne en mi sentido / & vi me echado en mis pajas: la cabec'a toda emplastada y llena de azeytes & vngue<n>tos: y espa<n>tado dixe q<ue> es esto: respo<n>dio me el cruel sacerdote a fe q<ue> los ratones y culebras q<ue> me destruya<n>: ya los he cac'ado / y mire por mi / y vi me ta<n> mal tratado q<ue> luego sospeche mi mal A esta hora entro vna vieja q<ue> ensalmaua / & los vezinos y comie<n>c'an me a quitar trapos d<e> la cabec'a y curar el garrotazo: y como me hallaro<n> buelto en mi sentido holgaro<n>se mucho / y dixero<n>: pues ha tornado en su acuerdo plazera a dios no sera nada / ay tornaron de nueuo a co<n>tar mis cuytas y a reyr las / y yo peccador a llorar las. Co<n> todo esto diero<n>} [fol. 23r] {HD. tercero.} {CB1. me de comer q<u  +} {CB1. dixo el alos hombres de poca arte dizen esso: mas a los mas altos como yo / no les han de hablar menos de. Beso las manos de Uuestra merced / o por lo menos. Beso os sen~or las manos / si el que me habla es cauallero. Y ansi de aquel de mi tierra que me atestaua de mantenimiento, nunca mas le quise sufrir / ni sufriria ni sufrire a hombre del mundo de el rey abaxo: que mantenga os Dios me diga. Peccador de mi dixe yo por esso tiene tan poco cuydado de mantenerte / pues no sufres que nadie se lo ruegue. Mayormente dixo / que no soy tan pobre que no tengo en mi tierra vn solar de casas: que a estar ellas en pie y bien labradas diez y seys leguas de donde naci en aquella costanilla de Ualladolid: valdrian mas de dozientas vezes mil marauedis segun se podrian hazer grandes y buenas / y tengo vn palomar que a no estar derribado como esta: daria cad(e)[a] an~o mas de dozientos palominos / y otras cosas que me callo que dexe por lo que tocaua a mi honrra. Y vine a esta ciudad / pensando que hallaria vn bue<n> assiento: mas no me ha succedido como pe<n>-se.} [fol. 36r] {HD. tercero.} {CB1. Canonigos y sen~ores de la yglesia muchos hallo: mas es gente tan limitada / que no los sacaran de su paso todo el mundo. Caualleros de media talla tambien me ruegan: mas seruir con estos es gran trabajo / porque de hombre os aueys de conuertir en malilla. Y si no anda con Dios os dizen / y las mas vezes son los pagamentos a largos plazos / y las mas y las mas ciertas comjdo por seruido. Ya quando quieren reformar consciencia / y satisfazeros vuestros sudores / soys librados en la recamara: en vn sudado jubon / o rayda capa / o sayo. Ya quando assienta vn hombre co<n> vn sen~or de titulo, toda via passa su lazeria. Pues por ventura no ay en mi habilidad para seruir y contentar a estos. Por dios si con el topasse muy gran su priuado pienso que fuesse / y que mil seruicios le hiziesse / porque yo sabria mentille tambien otro / y agradalle alas mil marauillas reylle ya mucho sus do         const textAlcalaRaw = `[fol. 1r] {CB1. {MIN.} {RUB. La vida de Lazarillo de Tormes / y de sus fortunas: y aduersidades. Nueuamente impressa, corregida, y de nueuo an~adida enesta segu<n>da impression.} Uendense en Alcala de Henares, en casa d<e> Salzedo Librero. An~o de. M. D. LIIII} [fol. 1v] [fol. 2r] {HD. Prologo.} {CB1. {IN3.} YO por bien tengo que cosas tan sen~aladas: y por ventura nunca oydas, ni vistas: vengan a noticia de muchos: y no se entierren enla sepultura del oluido: pues podria ser que alguno que las lea, halle algo que le agrade. Y alas que no ahondaren tanto, los deleyte, y a este proposito dize Plinio: que no ay libro por malo que sea: que no tenga alguna cosa buena. Mayormente q<ue> los gustos no son todos vnos: mas lo que vno no come, otro se pierde por ello. Y assi vemos cosas tenidas en poco de algunos q<ue> de otros no lo son. Y esto es para que ninguna cosa se deuria romper, ni echar a mal si muy detestable no fuesse sino que a todos se comunicasse: mayormente siendo sin perjuyzio, y pudiendo sacar della algun fructo: porq<ue> si assi no fuesse muy pocos escriuirian para vno solo: pues no se haze sin trabajo. E quieren ya que lo passan: ser recompensados no con dineros, mas co<n> que vean y lean sus obras, & si ay de que: se las alaben. Y a este proposito dize Tullio. La honrra cria las artes. Quien piensa q<ue>l soldado q<ue> es primero del escala: tiene mas aborrescido el biuir: no por cierto: mas el desseo d<e> alaba<n>c'a le haze ponerse al peligro} {CW. a ij y assi} [fol. 2v] {HD. Prologo} {CB1. y assi enlas artes y letras es lo mismo. Predica muy bien el presentado: y es hombre q<ue> dessea mucho el prouecho de las animas mas p<re>gunte<n> a su merced si le pesa qua<n>do le dizen, o q<ue> marauillosame<n>te lo ha hecho v<uest>ra reuere<n>cia: gusto muy ruynme<n>te el sen~or do<n> fulano: y dio el sayete de armas al truhan: porq<ue> le loaua de auer lleuado muy buenas la<n>c'as: que hiziera si fuera verdad, y todo va desta mane e vn c'apatero auia muchas sogas y otras cosas q<ue> de esparto se hazen, y parte dellas dieron a mi amo enla cabec'a, el qual alc'ando la mano toco enellas, & viendo lo que era dixome. Anda presto mochacho, salgamos d<e> entre ta<n> mal manjar, que ahoga sin comerlo. Yo que bie<n> descuydado yua d<e> aquello, mirelo que era y como no vi sino sogas y cinchas, que no era cosa de comer, dixele. Tio porque dezis esso? Respo<n>dio me. Calla sobrino, segu<n> las man~as que lleuas lo sabras, y veras como digo verdad, y ansi passamos adelante por el mismo portal, y llegamos a vn meson, a la puerta del qual auia muchos cuernos e(u)[n]la pared, donde atauan los recueros sus bestias, y como yua te<n>ta<n>do si era alli el meson, ado<n>de el rezaua cada dia por la mesonera, la oracion d<e>la emparedada, hazio de vn cuerno, y con vn gran sospiro dixo. O mala cosa, peor que tienes la hechura, de quantos eres desseado poner tu nombre sobre cabec'a agena, y de quan pocos te-nerte,} {CW. ner} [fol. 10r] {HD. Primero \ Fo. x.} {CB1. ny a(n)[u]n oyr tu nombre, por ninguna via. Como le oy lo que dezia dixe. Tio que es esso que dezis. Calla sobrino que algun dia te dara este que en la mano tengo alguna mala comida y cena. No le comere yo dixe, y no me la dara. Yo te digo verdad, sino verlo has si biues, y ansi passamos adela<n>te hasta la puerta del meson, adonde pluguiere a Dios nunca alla llegaramos, segun lo que me suscedia en el. Era todo lo mas que rezaua por mesoneras, y por bodegoneras y turroneras, y rameras, y ansi por semejantes mugercillas, que por hombre casi nunca le vi dezir oracion./ Reyme entre mi de los dichos, y aunque mochacho note mucho la discreta co<n>sideracion y palabras del ciego, mas por no ser prolixo dexo de co<n>tar muchas cosas, assi graciosas como de notar, q<ue> co<n>este ciego mi primer amo me acaesciero<n> y quiero dezir el despidiente y co<n>el acabar Estauamos en Escalona villa del duque della, en vn meson, y diome vn pedac'o de longaniza que le assasse, & ya que la longaniza auia pringado y comidose las pringadas, saco vn Marauedi de la bolsa, y mandome q<ue> fuesse por el de vino: y pusome el demonio el aparejo delante los ojos: el q(n)[u]al ((como sue(~)l[en] d<e>(o)zir)) haze al ladron, y fue q<ue> auia cabe} {CW. B ij el} [fol. 10v] {HD. Tractado +} {CB1. el fuego vn nabo pe(p)[q]uen~o, larguillo y ruynoso, y tal que por no ser para la olla deuio ser echado alli: y como al p<re>sente nadie estuuiesse sino el & yo solos, como me vi con apetito goloso, auiendome puesto dentro el sabroso olor dela longaniza, del qual solame<n>te sabia q<ue> auia de gozar, no mira<n>do que me podria susceder, pospuesto todo el temor por cu<m>plir con el desseo, en tanto q<ue> el ciego sacaua dela bolsa el dinero, saque la longaniza, y muy presto meti el sobredicho nabo en el assador: el qual mi amo da<n>dome el dinero p<ar>a el vino, tomo y come<n>c'o a dar bueltas al fuego, querie<n>do assar al que de ser cozido por sus demeritos auia escapado. Yo fuy por el vino con el qual no tarde en despachar la lo<n>ganiza: y quando vine halle al pecador del ciego q<ue> tenia entre dos reuanadas apretado el nabo: al qual aun no auia conoscido por no lo auer te<n>tado con la mano. Como tomasse las reuanadas y mordiesse en ellas pe<n>sando tambien lleuar parte de la longaniza: hallose en frio, con el frio nabo: alterose y dixo: Que es esto Lazarillo? Lazerado de mi, dixe yo, si quereys a mi echar algo: yo no ve<n>go de traer el vino: alguno estaua ay: y por burlar haria esso. No no dixo el, que yo no he dexado el assador d<e>la} {CW. mano} [fol. 11r] {HD. Primero \ Fo. xj.} {CB1. mano: no es possible. Yo torne a jurar y perjurar que estaua libre de aquel trueco y ca<m>bio: mas poco me aprouecho. Pues a las astucias del maldito ciego nada se le esco<n>dia leuantose y asiome por la cabec'a, y llego se a olerme, y como d<e>uio sentir el huelgo a vso de buen podenco por mejor satisfazerse d<e> la verdad: y con la gran agonia que lleuaua asiend ino la terciana derecha, y fue que veo a[ ]deshora al que me mataua de hambre, sobre nuestro arcaz boluiendo y reboluiendo y conta<n>do los panes. Yo dissimulaua, y en mi secreta oracio<n> y deuociones, y plegarias d<e>zia sant Juan y ciegale. Despues que estuuo vn gran rato echando la cuenta por dias y dedos contando: dixo. Si[ ]no tuuiera a tan buen recaudo esta arca, yo dixera que me auian tomado della panes: pero de oy mas solo por cerrar puerta ala sospecha: quiero tener buena cuenta conellos: nueue queda(d)[n] y vn pedac'o. Nueuas malas te de dios,} {CW. dixe} [fol. 17r] {HD. Segundo. \ Fo, xvij.} {CB1. dixe yo entre mi, paresciome con lo q<ue> dixo passarme el corac'on con saet(e)[a] de montero y come<n>c'o me el estomago a escaruar de ha<m>bre, viendose puesto en la dieta passada. Fue fuera de casa: yo por consolarme abro el arca y como vi el pan comencelo de adorar, no osando recebillo, co<n>te los, si a dicha el lazerado se errara, y halle su cuenta mas verdadera q<ue> yo quisiera. Lo mas q<ue> yo pude hazer: fue dar en<e>llos mil besos: y lo mas delicado q<ue> yo pude: d<e>l partido parti vn poco al pelo y ayre q<ue> estaua: y co<n> aquello passe aquel dia no tan alegre como el passado: mas como la hambre cresciesse: mayormente q<ue> tenia el estomago hecho a mas pan, aquellos dos, o tres dias ya dichos: moria mala muerte, tanto que otra cosa no hazia en viendome solo sino abrir y cerrar el arca y contemplar en aquella cara de Dios, que ansi dize<n> los nin~os: mas el mismo dios que socorre alos afligidos vie<n>dome en tal estrecho, truxo a mi memoria vn pequen~o remedio, que considerando entre mi dixe. Este arqueton es viejo y grande y roto por algu<n>as partes aunque pequen~os agujeros: puede se pensar que ratones entrando en el haze<n> dan~o a este pa<n>, sacarlo entero no es cosa conuiniente porque vera la falta el q<ue>} {CW. C en} [fol. 17v] {HD. Tractado +} {CB1. en tanta me haze biuir. Esto bien se suffre y comienc'o a desmigajar el pan sobre vnos mi amo visto el dan~o assi del pan como del agujero que yo auia hecho y come(u)[n]c'o a dar al Diablo los ratones y dezir. Que diremos a esto nunca auer sentido rato(u)[n]es en esta casa sino agora? y sin duda deuia de dezir verdad, porque si casa auia de auer enel reyno justamente dellos priuilegiada: aquella de razon auia de ser, porque no suelen morar do<n>de no ay que comer. Torna a buscar clauos por la casa y por las paredes y tablillas y atapar se los, venida la noche y su reposo luego yo era puesto en pie con mi aparejo y quantos el tapaua de dia destapaua yo de noche. En tal manera fue y tal prissa nos dimos que sin duda por esto se deuio dezir: do<n>de vna puerta se cierra, otra se abre: finalmente paresciamos tener a destajo la tela de Penelope: pues quanto el texia de dia: rompia yo de noche, y en pocos dias y} {CW. C iij no} [fol. 19v] {HD. Tractado +} {CB1. noches pusimos la pobre despensa de tal forma que quien quisiera propiamente della hablar: mas corac'as viejas de otro tiempo que no arcaz la llamara segun la clauazo<n> y tachuelas sobre si tenia. De que vio no le aprouechar nada su remedio, dixo, este arcaz esta tan maltratado y es de madera tan vieja y flaca que no aura raton a[ ]quien se defienda y va ya tal que si andamos mas con el: nos dexara sin guarda: y aun lo peor que aunque vale poco: toda via hara falta falta<n>do y me pondra en costa de tres, o quatro Reales. El mejor remedio que hallo pues el de hasta aqui no aprouecha: armare por de dent[r]o a estos ratones malditos. Luego busco prestada vna ratonera, y con cortezas de queso que a los vezinos pedia: contino el gato estaua armado dentro del arca lo qual era para mi singular auxilio: porque puesto caso q<ue> yo no auia menester muchas salsas para comer toda via me holgaua con las cortezas del queso que de la ratonera sacaua, y sin esto no perdonaua el ratonar del bodigo. Como hallasse el pan ratonado, y el queso comido y no cayesse el raton que lo comia dauase al Diablo: & preguntaua a las diligencias no me topasse con la llaue q<ue> debaxo las pajas tenia: y parescio me lo mas seguro metella d<e> noche enla boca porq<ue> ya desde q<ue> biui conel ciego la tenia tan hecha bolsa q<ue> me acaescio tener enella doze o quinze marauedis todo en medias blancas sin que me estoruasse el comer: por que de otra manera no era sen~or d<e> vna bla<n>ca quel ma[l]dito ciego no cayesse co<n> ella no dexa<n>do costura ni remiendo que no me buscaua muy a menudo, pues ansi como digo metia cada noche la llaue enla boca y dormia sin recelo q<ue> el bruxo d<e> mi amo cayesse co<n> ella: mas qua<n>do la desdicha ha de venir:} {CW. por} [fol. 21r] {HD. Segundo. \ Fo. xxj.} {CB1. por demas es diligencia. Quisiero<n> mis hados, o ((por mejor dezir)) mis pecados, q<ue> vna noche que estaua durmie<n>do, la llaue se me puso enla boca, que abierta deuia tener, de tal manera y postura quel ayre y resoplo q<ue> yo durmie<n>do echaua, salia por lo hueco d<e>la llaue ((que de can~uto era)) y siluaua. segun mi desastre quiso ((muy rezio[))], d<e> tal manera que el sobresaltado d<e> mi amo lo oyo: y creyo sin duda ser el siluo d<e>la Culebra. & cierto lo deuia parescer, leua<n>tose muy passo con su garrote enla mano, y al tiento y sonido dela Culebra se llego a mi con mucha quietud, por no ser sentido d<e>la Culebra, y como cerca se vio: penso que alli enlas pajas, do yo estaua echado al calor mio se auia venido: leuantando bien el palo, pensando tenerla debaxo y dar le tal garrotazo que la matasse, con toda su fuerc'a me d<e>scargo enla cabec'a tan gran golpe que sin ningun sentido, y muy mal d<e>scalabrado me d<e>xo, y como sintio que me auia dado, segun yo d<e>uia hazer gra<n> sentimie<n>to con el fiero golpe, co<n>taua el que se auia llegado a mi: y dando me gra<n>des bozes llamando me procuro recordarme: mas como me tocasse con las manos, te<n>to la mucha sangre que se me yua: y conoscio el dan~o que me auia hecho: y co<n> mucha prissa fue} {CW. a bus} [fol. 21v] {HD. Tractado +} {CB1. a buscar lumbre, y llegando conella: hallo me quexa<n>do toda via con mi llaue enla boca, que nunca la desampare la mitad fuera: bien de aquella manera que deuia estar al tiempo que siluaua conella. Espantado el matador de culebras, que podria ser aq<ue>lla llaue, mirola, sacandome la del todo d<e>la boca & vio lo que era, porque enlas guardas nada dela suya differenciaua: fue luego a proualla y conella prouo el maleficio. Deuio de dezir el cruel cac'ador, el raton y culebra que me dauan guerra y me comia<n> mi hazie<n>da he hallado: d<e>lo q<ue> sucedio en aq<ue>llos tres dias sigue<n>tes ninguna fe dare: porque los tuue enel vientre dela vallena, mas de como esto que he contado, oy despues que en mi torne, dezir a mi amo: el qual a quantos alli venian, lo contaua por exte<n>so. A cabo de tres dias yo torne en mi sentido & vi me echado en mis pajas, la cabec'a toda emplastada y llena de azeytes y vnguentos: y espantado dixe que es esto: respondiome el cruel sacerdote, a fe que los ratones y culebras que me destruyan, ya los he cac'ado: & mire por mi: & vime tan mal tractado que luego sospeche mi mal. A esta hora entro vna vieja q<ue> ensalmaua: & los vezinos & comie<n>c'a<n> me a quitar trapos dela cabec'a y cu-rar} {CW. rar} [fol. 22r] {HD. Segundo. \ Fo. xxij.} {CB1. el garrotazo y como me hallaro<n> buelto en mi sentido holgaronse mucho, y dixeron pues a tornado en su acuerdo plazera a Dios no sera nada: ay tornaron de nueuo a contar mis cuytas y a reyrlas & yo pecador a llorar las. Con todo esto dieron me de comer que estaua transido de hambre y a( )penas me pudieron demediar: y ansi de poco en poco a los quinze dias me leuante y estuue sin peligro: mas no sin hambre y medio sano. Luego otro dia que fuy leuantado: el sen~or mi amo me tomo por la mano, y saco me la puerta fuera y puesto enla calle dixo me. Lazaro de oy mas eres tuyo, y no mio, busca amo y vete con Dios que yo no quiero en mi compan~ia tan diligente seruidor: no es possible sino que aya ~or dixe yo, acuda aqui que nos traen aca vn muerto. Como assi respondio el: aqui arriba lo encontre: y venia diziendo su muger Marido y sen~or mio: adonde os lleuan a la casa lobrega y obscura, a la casa triste y des-dichada,} {CW. dichada} [fol. 32r] {HD. Tercero. \ Fo. xxxij.} {CB1. ala casa donde nunca come<n> ni beuen, aca sen~or nos le trae<n>, & ciertame<n>te qua<n>do mi amo esto oyo, aunque no tenia porq<ue> estar muy risuen~o, rio tanto, que muy gran rato estuuo sin poder hablar. Eneste tie<m>po tenia ya yo echada el aldaua ala puerta, puesto el hombro enella por mas defensa. Passo la gente con su muerto: & yo todauia me recelaua que nos le auian de meter en casa, y desque fue ya mas harto de reyr que de comer el bueno de mi amo, dixome, verdad es Lazaro segun la biuda lo va diziendo tu tuuiste razon de pensar lo que pensaste, mas pues dios lo ha hecho mejor, y pasan adelante, abre, abre, y ve por de comer dexalos sen~or, acabe<n> de passar la calle, dixe yo. Al fin vino mi amo ala puerta d<e>la calle y abrela esforc'andome, que bien era menester segu<n> el miedo y alteracio<n> q<ue> tenia, y me torno a encaminar: mas aun q<ue> comimos bie<n> aq<ue>l dia, maldito el gusto yo tomaua enello ni en aquellos tres dias torne en mi color, & mi amo muy risuen~o todas las vezes que se le acordaua aquella mi consideracion. Desta manera estuue con mi tercero y pobre amo que fue este Escudero algunos dias, y en todos dessea<n>do saber la intencio<n> de su venida y estada enesta tierra porque} {CW. desde} [fol. 32v] {HD. Tractado +} {CB1. desde el primer dia que con el assente, le conosci[ ]ser estra<n>gero por el poco conoscimie<n>to, y trato que con los naturales della tenia. Al fin se cumplio mi desseo, y supe lo q<ue> desseaua, porque vn dia que auiamos comido razonablamente, y estaua algo co<n>tento, conto me su hazienda, & dixome, ser de Castilla la vieja, y q<ue> auia dexado su tierra no mas de por no quitar el bonete a vn cauallero su vezino, sen~or dixe yo, si el era lo que d<e>zis y tenia mas que vos, no errauades en quitarse lo primero pues dezis que el tambien os lo quitaua, si es & si tiene, y tambie<n> me lo quitaua el a mi, mas de quantas vezes yo se le quitaua primero, no fuera malo comedir se el alguna y ganar me por la mano. Paresceme sen~or le dixe yo q<ue> en esso no mirara, mayormente con mis mayores que yo y que tienen mas. Eres mochacho, me respo<n>dio, y no sientes las cosas d<e>la honrra, en que el dia de oy esta todo el caudal de los hombres de bien (q)[p]ues hago te saber, q<ue> yo soy como ves vn escudero, mas voto te a Dios si al conde topo enla calle y no me quita muy bien quitado del todo el bonete que otra vez que venga me sepa yo entrar en vna casa fingiendo enella algun negocio, o atrauessar otra calle si la ay antes que} {CW. llegue} [fol. 33r] {HD. Tercero. \ Fo. xxxiij.} {CB1. llegue a mi, por no quitar selo, q<ue> vn hidalgo no deue a otro que a Dios y al Rey nada, ni es justo siendo hombre d<e> bien se descuyde vn punto de tener en mucho su persona. Acuerdome que vn dia deshonrre en mi tierra a vn official, & quise poner en el las manos, porque cada vez que le topaua me dezia. Mante<n>ga dios a. U<uestra> M<erced> vos don villano ruyn le dixe yo, porque no soys bie<n> criado? Mantenga os Dios me aueys de dezir, como si fuesse quien quiera. De alli adelante, de aqui aculla me quitaua el bonete, & hablaua como deuia, y no es buena manera d<e> saludar vn ho<m>bre a otro, dixe yo. Dezirle que le mantenga Dios? mira mucho de en hora mala dixo el: alos hombres de poca arte dize<n> esso: mas alos mas altos como yo no les ha<n> d<e> hablar menos de Beso las manos de. U<uestra> M<erced> o por lo menos Besos sen~or las manos, si el que me habla es cauallero. Y ansi de aquel de mi tierra que me atestaua de mantenimiento, nunca mas le quise suffrir, ni suffriria, ni suffrire a hombre del mundo del rey abaxo, que mantenga os dios me diga. Pecador de mi dixe yo por esso tiene tan poco cuydado de mantenerte untillos agudos para le ence<n>der la yra, y que paresciessen en fauor del culpado dezirle bien delo que bien le estuuiesse: y por el contrario, ser malicioso mofador, malsinar alos de casa, y alos de fuera pesquisar y procurar de saber vidas agenas, para contarselas, y otras muchas galas desta qualidad: que oy dia se vsan en palacio y alos sen~ores del parescen bie<n> y no quieren ver en sus casas hombres virtuosos antes los aborrescen y tienen en poco, y llaman nescios & que no son personas de negocios. ni con quien el sen~or se puede descuydar, y con estos los astutos vsan como digo el dia de oy, delo que yo vsaria,} {CW. E ij mas} [fol. 34v] {HD. Tractado +} {CB1. mas no quiere mi ve<n>tura que le halle. Desta manera lamentaua tambien su aduersa fortuna mi amo, dandome relacion de su persona valerosa. Pues esta<n>do enesto: entro por la puerta vn hombre y vna vieja, el hombre le pide el alquile de la casa, y la vieja el dela cama, hacen cuenta y de dos meses le alcanc'aron, lo que el en vn an~o no alcanc'ara, pienso q<ue> fueron doze o treze reales y el les dio muy buena respuesta que saldria a la plac'a a trocar vna piec'a de a dos, y que ala tarde boluiessen, mas su salida fue sin buelta. Por manera que a la tarde ellos boluieron, mas fue tarde, yo les dixe que aun no era venido. Uenida la noche, y el no, yo vue miedo de quedar en casa solo, y fuime a las vezinas y conteles el caso, y alli dormi. Uenida la man~ana los acreedores bueluen y preguntan por el vezino, mas a estotra puerta. Las mugeres les respo<n>de<n> veys aqui su moc'o y la llaue de la puerta, ellos me preguntaron por el, y dixeles que no sabia adonde estaua y que tanpoco auia buelto a casa desque salio a trocar la piec'a y que pensaua que de mi y dellos se auia ydo con el trueco. De que esto me oyeron; van por vn alguazil y vn escriuano, y he( )los do bueluen luego conellos, y toman la lla-ue} {CW. ue} [fol. 35r] {HD. Tercero. \ Fo. xxxv.} {CB1. y llamanme, y llaman testigos y abren la puerta y entran a embargar la hazienda de mi amo hasta ser pagados de su deuda. Anduuieron toda la casa, y hallaron la desembarac'ada, como he contado, & dize<n> me, ques de la hazie<n>da de tu amo? sus arcas y pan~os d<e> pared y alhajas de casa? no se yo esso les respondi, sin duda dizen ellos esta noche lo deuen de auer alc'ado y lleuado a alguna parte. Sen~or alguazil prended a este moc'o, que el sabe donde esta. Enesto vino el algu(e)[a]zil y echo me mano por el collar del jubon, diziendo. Mochacho tu eres preso, si no descubres les bienes deste tu amo. Yo como en otra tal no me vuiesse visto porque a( )sido del collar si auia sido muchas vezes, mas era mansamente d<e>l trauado para que mostrasse el camino al que no lo veia. Yo huue mucho miedo y llorando prometile de dezir[ ]lo que me preguntauan, bien esta, dizen ellos, pues di lo que sabes y no ayas temor, sentose el scriuano en vn poyo para escriuir el inuentario preguntandome que tenia, sen~ores dixe yo, lo que este mi amo tiene segun el me dixo, es vn muy buen solar de casas y vn palomar derribado, bien esta dize<n> ellos, por poco q<ue> esso valga, ay para nos entregar d<e>la deuda y a[ ]q<ue>} {CW. E iij parte} [fol. 35v] {HD. Tractado +} {CB1. parte de la ciudad tiene esso, me preguntaron, en su tierra les respondi. Por dios que esta bueno el negocio dixeron ellos, y ado<n>de es su tierra? De Castilla la vieja me dixo el que era, les dixe. Rieronse mucho el Alguazil y el escriuano diziendo, bastante relacion es esta, para cobrar vuestra deuda aunque mejor fuesse. Las vezinas que estauan presentes, dixeron, sen~ores este es vn nin~o innocente y ha pocos dias q<ue> esta con esse escudero, y no sabe del mas q<ue> vuessas mercedes, si[ ]no qua<n>to el pecadorcico se llega aqui a nuestra casa, y le damos de comer lo que podemos por amor de Dios, y a las noches se yua a dormir conel, vista mi innocencia, dexaron me da<n>dome por libre. Y el Alguazil y el escriuano piden al hombre y a la muger sus derechos, sobre lo qual tuuieron gran contienda y ruydo, porque ellos alegaron no ser obligados a pagar, pues no auia de que, ni se hazia el embargo, los otros dezian que auian dexado de yr a otro negocio, que les importaua mas, por venir aquel finalme<n>te despues de dadas muchas bozes: al cabo carga vn porqueron co<n> el viejo alfamar d<e>la vieja, y aunque no yua muy cargado alla van todos cinco dando bozes, no se en que paro, creo yo que el pe-cador} {CW. cador} [fol. 36r] {HD. Quarto. \ Fo. xxxvj.} {CB1. alfamar pagara por todos y bien se empleaua: pues el tiempo que auia de reposar y descansar de los trabajos passados, se andaua alquilando. Assi como he contado me dexo mi pobre tercero amo: do acabe de conoscer mi ruyn dicha, pues sen~alandose todo lo que podia contra mi: hazia mis negocios tan al reues, que los amos q<ue> suelen ser dexados delos moc'os en mi no fuesse ansi, mas que mi amo me dexasse y huyesse de mi. {RUB. Como Lazaro assento con vn Frayle, y delo que le acaescio conel.} {IN2.} HUue de buscar el quarto y este fue vn Frayle que las mugercillas que digo, me encaminaron. Al qual ellas le llamaua<n> pariente: gran enemigo del choro, y de comer enel conuento: perdido por andar fuera, amicissimo de negocios seglares, & visitar, tanto que pienso que ronpia el mas c'apatos que todo el conuento. Este me dio los primeros c'apatos que rompi en mi vida, mas no me duraron ocho dias, ni yo pude con su trote durar mas. Y por esto, y por otras cosillas que no digo sali del.} {CW. E iiij Com} [fol. 36v] {HD. Tractado +} {CB1. {RUB. Como Lazaro assento con vn Buldero y delas cosas que conel passo.} {IN2.} ENel quinto por mi ventura di, que fue vn Buldero el mas desembuelto, y d<e>suergonc'ado, y el mayor echador d<e>llas que jamas yo vi, ni ver espero, ni pienso nadie vio porque tenia y buscaua modos y maneras & muy sotiles inuenciones. En entrando enlos lugares do auian de presentar la bulla. Primero presentaua alos clerigos, o curas algunas cosillas no tan( )poco de mucho valor  como la gente a gran ruydo cargasse y la casa estuuiesse llena della. Uiendo que no podian afrentarse con las armas: dezia<n> se palabras injuriosas: entre las quales el Alguazil dixo a mi amo: que era falsario y las bullas que predicaua eran falsas: finalmente que los del pueblo viendo que no bastauan a ponellos en paz: acordaron de lleuar al Alguazil d<e>la posada a otra parte. Y assi quedo mi amo muy enojado: y despues que los huespedes y vezinos le vuieron rogado q<ue> perdiesse el enojo y se fuesse a dormir, y assi nos echamos todos. La man~ana venida: mi amo se fue ala yglesia y ma<n>do tan~er a missa y al sermon para despedir la bulla. Y el pueblo se junto el qual andaua murmurando delas bullas: diziendo. Como eran falsas; y que el mismo Alguazil rin~iendo: lo auia descubierto. De manera que atras que tenian mala gana de tomalla con aquello del todo la aborrescieron. El sen~or Comissario se subio al pulpito, y comienc'a su sermon, y a animar la gente a que no quedassen sin tanto bien, y indulgencia como la sancta Bulla traya. Estando en lo mejor del sermon, entra por la puerta dela} {CW. yglesia} [fol. 38r] {HD. Quinto. \ Fo. xxxviij} {CB1. yglesia el Alguazil, & desque hizo oracion, leuantose & con boz alta y pausada, cuerdamente comenc'o a dezir. Buenos hombres oyd me vna palabra, que despues oyreys aquien quisierdes, Yo vine aqui con este Echacueruo que os predica: el qual me engan~o: & dixo que le fauoresciese eneste negocio, y que partiriamos la ganancia: & agora visto el dan~o que haria a mi consciencia & a vuestras haziendas: arrepentido de lo hecho os declaro claramente, que las bullas que predica son falsas, & que no le creays ni las tomeys: & que yo directe ni indirecte no soy parte en ellas. & q<ue> desde agora dexo la vara & doy con ella enel suelo, y si en algu<n> tiempo este fuere castigado por la falsedad que vosotros me seays testigos como yo no soy con el ni le doy a ello ayuda, antes os desengan~o, & declaro su maldad. Y acabo su razonamiento. Algunos hombres ho<n>rrados que alli estauan se quisieron leuantar y echar al Alguazil fuera de la yglesia, por euitar esca<n>dalo: mas mi amo les fue a la mano & mando a todos que so pena de excommunion no le estoruassen: mas que le dexassen dezir todo lo que quisiesse: & ansi el tambien tuuo silencio mientras el Alguazil dixo todo lo que he dicho: como callo:} {CW. mi amo} [fol. 38v] {HD. Tractado +} {CB1. mi amo le pregunto si queria dezir mas que lo dixesse. El Alguazil dixo, harto mas ay q<ue> dezir de vos & de vuestra falsedad: mas por agora basta, El Sen~or Comissario se hinco de rodillas enel pulpito, & puestas las manos y mirando al cielo, dixo ansi. Sen~or Dios a quie<n> ninguna cosa es escondida antes todas manifiestas: & a quien nada es impossible antes todo possible: tu sabes la verdad y quan injustamente yo soy afrentado: en lo que a mi toca yo le perdono: porq<ue> tu sen~or me perdones: no mires a aq<ue>l que no sabe lo que haze ni dize: mas la injuria a ti hecha: te suplico & por justicia te pido no dissimules: porque alguno que esta aqui: q<ue> por ventura pe<n>so tomar aquesta sancta bulla & dando credito a las falsas palabras de aquel hombre lo dexara de hazer, & pues es tanto perjuyzio del proximo, te suplico yo sen~or no lo dissimules: mas luego muestra aqui milagro & sea desta manera: que si es verdad lo que aquel dize & que yo traygo maldad y falsedad: este pulpito se hunda comigo, y meta siete estados debaxo d<e> tierra: do el, ni yo jamas parezcamos. Y si es verdad lo que yo digo, & aquel persuadido del Demonio ((por quitar y priuar alos que estan presentes de tan gran bien)) dize mal-dad:} {CW. dad:} [fol. 39r] {HD. Quinto. \ Fo. xxix.} {CB1. tambien sea castigado, y de todos conoscida su malicia. A( )penas auia acauado su oracion el deuoto sen~or mio: quando el negro Alguazil cae de su estado & da tan gran golpe enel suelo que la yglesia toda hizo resonar, & comenc'o a bramar y echar espumajos por la boca y torcella, y hazer visajes co<n> el gesto, dando de pie y de mano: reuoluiendose por aquel suelo a vna parte & a otra, el estruendo y bozes de la gente era tan grande que no se oyan vnos a otros algunos estauan espantados y temerosos, vnos dezia<n> el sen~or le socorra y valga: otros bien se le emplea: pues leuantaua tan falso testimonio. Finalmente algunos que alli estauan & a mi parescer no sin harto temor se llegaron y le trauaron de los brac'os con los quales daua fuert(a)[e]s pun~adas a los que cerca del estauan: otros le tirauan por las piernas, y tuuieron reziamente porque no auia mula falsa enel mundo: que tan rezias coces tirasse. Y a( )si le tuuieron vn gran rato: porque mas de quinze hombres estauan sobre el: y a todos daua las manos llenas, y si se descuidauan en los hocicos. A todo esso el sen~or mi amo estaua enel pulpito de rodillas: las manos y los ojos puestos enel cielo trasportado enla diuina essencia: quel} {CW. planto} [fol. 39v] {HD. Tractado +} {CB1. planto y ruydo y bozes q<ue> enla yglesia auia no era<n> parte para apartarle de su diuina co<n>templacion. Aquellos buenos ho<m>bres llegaron a el, y dando bozes le despertaron y le suplicaron quisiesse socorrer a aquel pobre q<ue> sestaua muriendo, y q<ue> no mirasse a las cosas passadas: ni a sus dichos malos: pues ya dellos tenia el pago, mas si en algo podria aprouechar para librarle del peligro & passion q<ue> padescia por amor de dios lo hiziesse. Pues ellos vean clara la culpa del culpado, y la verdad, y bondad suya, pues a su peticion y venganc'a el sen~or no alargo el castigo. El sen~or comissario como quien despierta de vn dulce suen~o: los miro, & miro al delinque<n>te y a todos los que al( )rededor estauan, y muy pa(n)[u]sadamente les dixo Buenos hombres vosotros nunca auiades de rogar por vn hombre en quien Dios tan sen~aladamente se ha sen~alado: Mas pues el nos manda que no boluamos mal por mal y perdonemos las injurias con confianc'a podremos suplicarle que cu<m>pla lo que nos manda y su magestad perdone a este que le ofendio poniendo en su sancta fe obstaculo vamos todos a suplicalle. Y assi baxo del pulpito & encomendo aqui muy deuotame<n>te suplicassen a n<uest>ro sen~or tuuiesse por bien} {CW. perdonar} [fol. 40r] {HD. Quinto. \ Fo. xl.} {CB1. perdonar a aquel pecador y boluerle en su salud y santo juyzio, y la<n>c'ar del el demonio si su magestad auia permitido q<ue> por su gran pecado enel entrasse. Todos se hincaron de rodillas y delante del altar con los clerigos come<n>c'aron a cantar con boz baxa vna letania, & viniendo el conla cruz y agua be<n>dita despues de auer sobre el ca<n>tado. El sen~or mi amo puestas las manos al cielo, y los ojos q<ue> casi nada se le parescia sino vn poco de blanco, comienc'a vna oracion no menos larga q<ue> deuota, con la qual hizo llorar a toda la gente como suele<n> hazer en los sermones d<e> passio<n> de predicador y auditorio deuoto: suplica<n>do a n<uest>ro sen~or pues no querria la muerte d<e>l pecador: si( )no su vida y arrepe<n>timiento: q<ue> aquel encaminado por el demonio y persuadido dela muerte y peccado le quisiesse perdonar y dar vida y salud: para que se arrepentiese y confesase sus pecados y esto hecho ma<n>do traer la bulla, y pusosela en la cabec'a y luego el pecador d<e>l alguazil come<n>c'o poco a poco a estar mejor y tornar en si: y desq<ue> fue bie<n> buelto e<n> su acuerdo echo se alos pies d<e>l sen~or comissario y dema<n>da<n>do le p<er>do<n>: [c]o<n>fesso auer dicho aq<ue>llo por la boca y ma<n>damie<n>to d<e>l demonio: lo vno por hazer a el dan~o y vengarse del enojo: lo otro y mas} {CW. principal} [fol. 40v] {HD. Tractado. +} {CB1. principal porque el d<e>monio recibia mucha pena del bien que alli se hiziera, en tomar la bulla. El sen~or mi amo le perdono, y fueron hechas las amistades entre ellos, y a tomar la bulla vuo tanta prissa que casi anima viue<n>te en el lugar no quedo sin ella: marido y muger & hijos & hijas: mozos y moc'as Diuulgose la nueua de lo acaescido por los lugares comarcanos, y quando a ellos llegauamos no era menester sermon ni yr a la yglesia. Que ala posada la venia<n> a tomar como si fuera<n> peras q<ue> se dieran de balde. De manera que en diez o doze lugares d<e> aquellos al( )rededor donde fuymos echo el sen~or mi amo otras tantas mil bullas sin predicar sermon. Quando se hizo el ensayo confiesso mi pecado, que tambien fuy dello espantado, y crey que ansi era como otros muchos. Mas co<n> ver despues la risa y burla que mi amo y el alguazil lleuaua<n> y hazia<n> del negocio. Conosci como auia sido industriado por el industrioso y inuentiuo d<e> mi amo Acaescionos en otro lugar el qual no quiero nombrar por su honrra lo siguiente y fue que mi amo p<re>dico dos o tres Sermones y do a Dios la Bulla tomauan, visto por el astuto de mi amo lo que passaua y q<ue> aunque dezia se fiaua<n> por vn a($n~)[n~]o no apro-uechaua,} {CW. uecha} [fol. 41r] {HD. Quinto. \ Fo. xij.} {CB1. y que estauan tan rebeldes en tomarla, y que su trabajo era perdido, hizo tocar las campanas para despedirse, y hecho su sermon y despedido desde al pulpito, ya que se queria abaxar llamo al escriuano y a mi que yua cargado con vna[s] Alforjas: & hizo nos llegar al primer escalon, y tomo al Alguazil las que enlas manos lleuaua, y las que no tenia enlas Alforjas pusolas ju<n>to a sus pies, y tornose a poner enel pulpito con cara alegre, y arrojar desde alli de diez en diez, y de veynte en veynte de sus bullas, hazia todas partes, diziendo. Hermanos mios tomad, tomad delas gracias q<ue> Dios os embia hasta vuestras casas y no os duela pues es obra tan pia la rede<m>pcio(u)[n] de los captiuos christianos que estan en tierra de Moros porque no renieguen nuestra sancta fe, y vayan alas penas del infierno, si quiera ayudaldes co<n> vuestra limosna, y co<n> cinco Pater nostres, y cinco Aue marias, para que salgan de cautiuerio, y aun tambie<n> aprouechan para los padres, y hermanos y deudos que teneys enel Purgatorio como lo vereys enesta sancta Bulla, como el pueblo las vio ansi arrojar como cosa que se daua de balde, y ser venida dela mano d<e> Dios tomaua<n>, a mas tomar aun p<ar>a los nin~os} {CW. F dela} [fol. 41v] {HD. Tractado +} {CB1. dela cuna, y para todos sus defunctos contando desde los hijos hasta el menor criado que tenian contando los por los dedos Bimonos en tanta priessa que a mi aynas me acabaran de romper vn pobre y viejo sayo q<ue> traya, de manera que certifico a U<uestra> M<erced> que en poco mas de vn[a] hora no quedo Bulla en las alforjas, y fue necessario yr ala posada por mas, acabados de tomar todos, dixo mi amo desde el pulpito a su escriuano y al del concejo q<ue> se leuantassen y para que se supiesse quien eran los q<ue> auian de gozar dela sancta indulgencia, y perdones dela sancta bulla, y para que el diesse buena cuenta a quien le hauia embiado se escriuiessen. Y assi luego todos de muy buena voluntad dezian las que auian tomado contando por orden los hijos, & criados, y defunctos. Hecho su inuentario pidio alos Alcaldes. q<ue> por charidad porque el tenia que hazer en otra parte mandassen al escriuano le diesse autoridad d<e>l inue<n>tario, y memoria delas que alli quedauan, que segun dezia el escriuano eran mas de dos mil. Hecho esto el se despedio con mucha paz y amor, y ansi nos partimos d<e>ste lugar, y a(n)[u]n antes q<ue> nos partiessemos fue p<re>guntado el por el tenie<n>te cura d<e>l lugar y por los Regi-dores} {CW. dores} [fol. 42r] {HD. Quinto. \ Fo. xlij.} {CB1. si la bulla aprouechaua para las criaturas que estauan en el vientre de sus madres, a lo qual el respo<n>dio que segun las letras que el auia estudiado que no, q<ue> lo fuessen a pregu<n>tar a los doctores mas antiguos que el, & que esto era lo que sentia eneste negocio. E ansi nos partimos yendo todos muy alegres del buen negocio, dezia mi amo al Alguazil y escriuano que os paresce como a estos villanos que con solo dezir Christianos viejos somos sin hazer obras de charidad se piensan saluar sin poner nada de su hazienda, pues por vida del Licenciado Paschasio Gomez que a su costa se saquen mas de diez cautiuos, y ansi nos fuymos hasta otro lugar de aq<ue>l cabo de toledo hazia la mancha que se dize adonde topamos otros mas obstinados en tomar bullas hechas mi amo y los demas q<ue> yuamos n<uest>ras dilige<n>cias en dos fiestas que alli estuuimos no se auian echado treynta Bullas visto por mi amo la gran perdicion, y la mucha costa que traya, y el ardideza que el sotil de mi amo tuuo para hazer despender sus bullas fue que este dia dixo la missa mayor, y d<e>spues d<e> acabado el sermo<n>, y buelto al altar tomo vna cruz q<ue> traya d<e> poco mas d<e> vn palmo y en vn brasero de lu<m>bre que encima d<e>l} {CW. F ij altar} [fol. 42v] {HD. Tractado +} {CB1. altar auia el qual auian traydo para calentarse las manos porque hazia gran frio pusole detras del missal, sin que nadie mirasse enello, y alli sin dezir nada puso la cruz encima la lumbre, y ya q<ue> vuo acabado la Missa, y echada la bendicto<n> tomola co<n> vn pan~izuelo vie<n> embuelta la cruz en la mano derecha, y enla otra la Bulla, y ansi se baxo hasta la postrera grada del altar adonde hizo que besaua la cruz, & hizo sen~al que viniessen adorar la cruz, y ansi vinieron los Alcaldes los primeros, y los mas ancianos del lugar viniendo vno a vno como se vsa. Y el primero q<ue> llego q<ue> era vn Alcalde viejo au<n> que el le dio a besar la cruz bien delicadamente se abraso los rostros, & se quito presto afuera. Lo qual visto por mi amo le dixo passo quedo sen~or Alcalde milagro, y ansi hizieron otros siete o ocho y a todos les dezia passo sen~ores, milagro quando el vido que los rostriquemados bastauan para testigos del milagro no la quiso dar mas a besar subio se al pie del altar, y de alli dezia cosas marauillosas, diziendo, Que por la poca charidad que auia enellos, auia Dios permitido aquel milagro, y que aquella Cruz auia de ser lleuada a la sancta yglesia mayor de su Obispado, que por la poca cha-ridad} {CW. ridad} [fol. 43r] {HD. Quinto. \ Fo. xliij.} {CB1. que en<e>l pueblo auia la cruz ardia, fue tanta la prissa que vuo enel tomar dela Bulla q<ue> no bastauan dos escriuanos: ni los clerigos, ni sacristanes a escriuir, creo de cierto q<ue> se tomaro<n> mas de tres mil bullas como te<n>go dicho a. U<uestra> M<erced> despues al partir el fue con gran reuerencia, como es razo<n> a tomar la sancta cruz, dizie<n>do que la auia de hazer engastonar en oro, como era razon fue rogado mucho del concejo y clerigos del lugar les dexasse alli aquella sancta cruz por memoria del milagro alli acaescido, el en ninguna manera lo queria hazer, y al fin rogado de tantos se la dexo co<n> q<ue> le dieron otra cruz vieja que tenian antigua de plata que podra pesar dos o tres libras segun dezian y ansi nos partimos alegres con el bue<n> trueque, y con auer negociado bien en todo no vio nadie lo suso( )dicho sino yo, porque me subia par del altar para ver si auia quedado algo enlas ampollas para ponello en cobro como otras vezes yo lo tenia de costumbre y como alli me vio puso se el dedo en la boca haziendo me sen~al que callasse yo ansi lo hize porque me cumplia, aunque despues q<ue> vi el milagro no cabia e(u)[n] mi por echallo fuera sino q<ue> el temor de mi astuto amo no me lo dexaua comunicar con nadie, ni nu<n>ca de} {CW. F iij mi} [fol. 43v] {HD. Tractado Sexto.} {CB1. mi salio porque me tomo jurame<n>to que no descubriesse el milagro, y ansi lo hize hasta agora Y aunque mochacho cayome mucho en gracia, & dixe entre mi. Quantas destas deuen de hazer estos burladores entre la innocente gente, finalme<n>te estuue coneste mi quinto amo cerca de quatro meses: enlos quales passe tambien hartas fatigas, aunq<ue> me daua bien de comer a costa delos curas y otros clerigos do yua a predicar. {RUB. Como Lazaro se assento con vn Capellan, y lo que conel passo.} {IN2.} DEspues deste, assente con vn maestro de pintar panderos, para molelle las colores: y tambien suffri mil males. Siendo ya en este tiempo buen moc'uelo entrando vn dia en la yglesia mayor vn capellan della me recibio por suyo, y pusome en poder vn buen asno & quatro ca<n>taros y vn ac'ote: y come<n>ce a echar agua por la ciudad. Este fue el primer escalo<n> que yo subi para venir a alcanc'ar buena vida: porque mi boca era medida daua cada dia a mi amo. xxx. m<a>r<uedi>s ganados, y los Sabados ganaua para m(t)[i] y todo lo demas entre semana de. xxx. m<a>r<uedi>s.} {CW. fue} [fol. 44r] {HD. Septimo. \ Fo. x(i)[l]iiij.} {CB1. Fue me tambien enel officio q<ue> al cabo de quatro an~os q<ue> lo vse con poner enla ganancia bue<n> recaudo ahorre para me vestir muy ho<n>rradame<n>te dela ropa vieja, dela qual co<m>pre vn jubon de fustan viejo y vn sayo raydo de manga tranc'ada y puerta, y vna capa q<ue> auia sido frisada, y vna espada delas viejas primeras de Cuellar, desque me vi en habito de ho<m>bre de bie<n>: dixe a mi amo se tomasse su asno q<ue> no q<ue>ria mas seguir aq<ue>l officio {RUB. Como Lazaro assento con vn Alguazil, y delo que le acaescio conel.} {IN2.} DEspedido del Capella<n>: assente por ho<m>bre d<e> justicia co<n> vn Alguazil, mas muy poco biui conel, por parescer me officio peligroso, mayorme<n>te que vna noche nos corrieron a mi y a mi amo a pedradas y a palos vnos retraydos, y a mi amo q<ue> espero, trataron le mal, mas a mi no me alca<n>c'aro<n>, co<n> esto renegue del trato, y pensando en que modo de biuir, haria mi assiento por tener descanso, y ganar algo para la vejez, quiso Dios alumbrar me y poner me en camino y manera prouechosa, y con fauor que tuue de Amigos y Sen~ores todos mis trabajos y fatigas: hasta entonces passa-das} {CW. F iiij das} [fol. 44v] {HD. Tractado +} {CB1. fueron pagados con alcanc'ar lo q<ue> procure, que fue vn officio real viendo que no ay nadie que medre, sino los que le tienen[.] En el qual el dia de oy biuo y resido a seruicio de Dios y de vuestra. M. Y es que te<n>go cargo de pregonar los vinos que enesta ciudad se ve<n>den, y en almonedas y cosas perdidas, aco<m>pan~ar los que padescen persecuciones por justicia: y declarar a bozes sus delictos, pregonero hablando en buen Romance, enel qual officio vn dia q<ue> ahorcauamos vn apan~ador en Toledo, y lleuaua vna buena soga d<e>sparto, conosci y cay enla cue<n>ta dela sentencia que aquel mi Ciego amo auia dicho en Escalona, y me ar[r]epenti del mal pago que le di por lo mucho que me ensen~o que despues de Dios, el me dio industria para llegar al estado q<ue> a[g]ora esto. Ha me sucedido tambien, yo le he vsado tan facilme<n>te que quasi todas las cosas al officio tocantes passan por mi mano, tanto que en toda la ciudad: el que ha d<e> echar vino a ve<n>der. o algo, si Lazaro de Tormes no entiende enello, hazen cuenta de no sacar prouecho. Eneste tiempo viendo mi habilidad & buen biuir teniendo noticia d<e> mi persona, el sen~or A[r]cipreste d<e> sant Saluador: mi sen~or, y seruidor, y amigo d<e> vuestra. M. porq<ue>} {CW. le} [fol. 45r] {HD. Octauo. \ Fo. lxv.} {CB1. le pregonaua sus vinos, procuro casar me con vna criada suya, & visto por mi que de tal persona no podia venir sino bie<n> y fauor, acorde delo hazer y a( )si me case con ella, y hasta agora no estoy arrepentido, porque alie<n>de de ser buena hija, & diligente seruicial, tengo en mi sen~or el A[r]cipreste todo fauor y ayuda, & siempre en el an~o le da en vezes al pie de vna carga de trigo por las Pascuas su carne, y qua<n>do el par delos bodigos, las calc'as viejas que dexa, & hizo nos alquilar vna casilla par dela suya, los domingos & fiestas quasi todas las comiamos en su casa, mas malas le<n>guas que nunca faltaron ni faltaran no nos dexan biuir, diziendo, no se que & si se que de que veen a mi muger yrle a hazer la cama, & guisar le de comer, y mejor les ayude dios q<ue> ellos dizen la verdad aunque eneste tiempo siempre he tenido alguna sospechula y auido algunas malas cenas por esperalla algunas noches hasta las laudes y au<n> mas, y se me ha venido ala memoria lo q<ue> mi amo el ciego me dixo en Escalona, estand ero, & la amo mas que a mi, y me haze Dios con ella mil mercedes y mas bien que yo merezco, que yo jurare sobre la hostia co<n>sagrada que es tan buena muger como biue dentro de las puertas de Toledo: & quie<n> otra cosa me dixere, yo me matare con el: Desta manera no me dizen nada: & yo tengo paz en mi casa[.] esto fue el mismo an~o que nuestro victorioso Emperador enesta insigne ciudad de Toledo entro: y tuuo en ella cortes, y se hizieron grandes regozijos y fiestas: como Uuestra Merced aura oydo. Pues eneste tiempo estaua en mi prosperidad, y en la cumbre de toda buena Fortuna, de lo q<ue> de aqui adelante me suscediere auisare a Uuestra Merced.} [fol. 46v] {CB1. Fue Impressa esta presente obra en Alcala de Henares en casa de Salzedo Librero/ a veynte y seis de Febrero/ de Mil y Quinientos/ y Cinquenta/ y quatro An~os {MIN. {LAT. Pacientia vincit malicia.}}}`;

        const textMedinaRaw = `[fol. 1r] {CB1. {MIN.} La vida de Lazarillo d<e> Tormes: y de sus fortunas y aduersidades. M. D. liiij.} [fol. 1v] [fol. 2r] {HD. Prologo.} {CB1. {IN2.} IO por bien te<n>go que cosas ta<n> sen~aladas: y por ventura nu<n>ca oydas ni vistas: ve<n>gan a noticia de muchos: y no se entierren enla sepoltura del oluido / pues podria ser que alguno que las lea / halle algo que le agrade. Y a las que no ahondaren tanto los deleyte / & a este proposito dize Plinio: que no ay libro por malo que sea / q<ue> no tenga alguna cosa buena. Mayormente que los gustos no son todos vnos: mas lo q<ue> vno no come: otro se pierde por ello. Y assi vemos cosas tenidas en poco de algunos que de otros no lo son. Y esto para que ninguna cosa se deuria romper / ni echar a mal si muy detestable no fuesse sino que a todos se comunicasse / mayormente siendo sin perjuyzio / & pudiendo sacar della algun fructo: porque si assi no fuesse} {CW. a ij} [fol. 2v] {HD. Prologo.} {CB1. muy pocos escriuirian para vno solo: pues no se haze sin trabajo. Y quieren ya que lo passan / ser recompensados no con dineros / mas con q<ue> vean y lean sus obras: y si ay de que / se las alaben. Y a este proposito dize Tulio La honra cria las artes. Quien piensa q<ue>l soldado que es primero del escala / tiene mas aborrescido el viuir / no por cierto / mas el desseo de alabanc'a le haze ponerse al peligro: y asi enlas artes & letras es lo mismo. Predica muy bien el presentado: y es hombre q<ue> dessea mucho el p<ro>uecho delas animas / mas pregunten a su merced si le pesa qua<n>do le dize<n> / O que marauillosamente lo ha hecho vuestra reuere<n>cia / Justo muy ruynme<n>te el sen~or do<n> fulano / & dio el sayete de armas al truha<n> / porque lo loaua de auer lleuado muy buenas lanc'as: que hiziera si fuera verdad: & todo va desta manera / que confessando yo / no ser mas san-cto} [fol. 3r] {HD. Prologo.} {CB1. que mis vezinos: desta nonada q<ue> en este grosero estylo escriuo: no me pesara qu
