o / y de las cosas que con el passo.} {IN5.} OTro dia no parescie<n>do me estar alli seguro / fui me avn lugar q<ue> llaman Maqueda / adonde me toparon mis peccados con vn clerigo / que llegando a pedir limosna me pregunto / si sabia ayu-dar} [fol. 18r] {HD. Segundo.} {CB1. a Missa / yo dixe que si / como era verdad / que aunq<ue> maltratado / mil cosas buenas me mostro el peccador d<e>l ciego / y vna dellas fue esta. Finalme<n>te el clerigo me recibio por suyo. Escape del trueno / y di enel relampago: porque era el ciego para con este vn Alexandre magno / con ser la misma auaricia / como he contado: no digo mas sino q<ue> toda la lazeria del mundo estaua encerrada en este / no se si de su cosecha era / o lo auia anexado con el habito de clerezia. El tenia vn arcaz viejo / & cerrado con su llaue: la qual traya atada con vn agugeta del paletoque / y en viniendo el bodigo de la yglesia / por su mano era luego alli lanc'ado y tornada a cerrar el arca: y en toda la casa no auia ninguna cosa de comer / como suele estar en otras [*a]lgun tocino colgado al humero / al[*g]un queso puesto en alguna tabla / o} {CW. c ij} [fol. 18v] {HD. Tractado +} {CB1. enel Armario algun canastillo con algunos pedac'os de pan que de la mesa sobran: que me parece a mi que au<n>q<ue> dello no me aprouechara: con la vista dello me consolara. Solamente auia vna horca d<e> cebollas: y tras la llaue en vna camara en lo alto dela casa destas tenia yo de racio<n> vna para cada quatro dias / y q<ua>ndo le pedia la llaue para yr por ella: si alguno estaua presente: echaua mano al falso( )pecto & con gran continencia la desataua & me la daua: diziendo. Toma & buelue la luego y no hagays sino golosinar: como si debaxo della estuuieran todas las conseruas de Ualencia con no auer en la dicha camara como dixe: maldita la otra cosa que las cebollas colgadas de vn clauo: las quales el tenia tambien por cuenta que si por malos de mis pecados me desmandara a mas de mi tasa: me costa-ra} [fol. 19r] {HD. Segundo.} {CB1. caro. Finalmente yo me finaua de hambre: pues ya que comigo tenia poca caridad / consigo vsaua mas Cinco blancas de carne era su ordinario para comer y cenar / verdad es que partia comigo del caldo: que de la carne / tan blanco el ojo: sino vn poco de pan: y pluguiera a Dios que me demediara. Los Sabados comen se en esta tierra cabec'as de Carnero / y embiaua me por vna que costaua tres marauedis: aquella le cozia y comia los ojos y la lengua y el cogote y sesos / y la carne que en las quixadas tenia: y daua me todos los huessos roydos: y daua me los enel plato diziendo. Toma / come / triumpha que para ti es el mundo / mejor vida tienes que el Papa. Tal te la de Dios dezia yo passo entre mi. A cabo de tres semanas que estuue con el vine a tanta flaqueza / que no me podia tener en las} {CW. C iij} [fol. 19v] {HD. Tractado +} {CB1. piernas de pura hambre / vime claramente yr a la sepoltura / si Dios y mi saber no me remediara<n> para vsar de mis man~as no tenia aparejo / por no tener en q<ue> dalle salto / y aun que algo vuiera no podiera cegalle / como hazia al q<ue> Dios perdone / si de aq<ue>lla calabac'ada fenecio: q<ue> toda( )via aunq<ue> astuto co<n> faltalle aq<ue>l preciado sentido no me sentia: mas estotro ninguno ay q<ue> ta<n> aguda vista tuuiesse como el tenia. Qua<n>do al offertorio estauamos ninguna bla<n>ca en la concha caya que no era del registrada / el vn ojo tenia en la gente y el otro en mis manos: baylauan le los ojos enel caxco / como si fueran de azogue / quantas bla<n>cas ofrecian tenia por cuenta: y acabado el offrecer / luego me quitaua la corneta y la ponia sobre el altar: no era yo sen~or de asir le vna blanca todo el tiempo que con el biui / o por mejor dezir} [fol. 20r] {HD. Segundo.} {CB1. mori / de la tauerna nu<n>ca le traxe vna blanca de vino / mas aquel poco que de la offre<n>da auia metido en su arcaz compassaua de tal forma / q<ue> le (t)[d]uraua toda la semana. Y por ocultar su gra<n> mezquindad / dezia me. Mira moc'o los sacerdotes han de ser muy te<m>plados en su comer y beuer / y por esto yo no me desmando como otros. Mas el lazerado mentia falsamente / porq<ue> en cofradias y mortuorios que rezamos / a costa agena comia como lobo y beuia mas q<ue> vn saludador: y porq<ue> dixe de mortuorios / Dios me perdone q<ue> jamas fuy enemigo de la naturaleza humana sino ento<n>ces: y esto era porq<ue> comiamos bie<n> y me hartaua<n> / desseaua y au<n> rogaua a Dios q<ue> cada dia matasse el suyo. Y quando dauamos sacramento a los enfermos / especialmente la extrema vncion / como manda el clerigo rezar a los que esta<n> alli:} {CW. c iiij} [fol. 20v] {HD. Tractado +} {CB1. yo cierto no era el postrero de la oracion / & con todo mi corac'on & buena voluntad rogaua al sen~or: no que la echasse a la parte que mas seruido fuesse ((como se suele dezir)) mas que le lleuasse deste mundo / & quando alguno destos escapaua ((Dios me lo perdone)) que mil vezes le daua al diablo / y el que se moria otras tantas be<n>diciones lleuaua d<e> mi dichas: por que en todo el tiempo que alli estuue que serian quasi seys meses: solas veynte personas fallecieron / y estas bien creo que las mate yo / o por mejor dezir murieron a mi requesta por que viendo el sen~or mi rauiosa & continua muerte: pienso que holgaua de matar los por dar me a mi vida: mas de lo que al presente padecia: remedio no hallaua: que si el dia que enterrauamos yo biuia: los dias que no auia muerto: por quedar bien vezado} [fol. 21r] {HD. Segundo.} {CB1. dela hartura: tornando a mi quotidiana hambr(^a)[^e]: mas lo sentia. De manera que en nada hallaua descanso: saluo en la muerte: que yo tambien para mi como para los otros desseaua algunas vezes mas no la via aunque estaua siempre en mi. Pense muchas vezes yr me de aquel mezquino amo mas por dos cosas lo dexaua. La primera por no me atreuer a mis piernas por temer de la flaqueza que de pura ha<m>bre me venia. Y la otra: consideraua & dezia. Yo he tenido dos amos. El primero traya me muerto de hambre / & dexando le tope con estotro que me tiene ya con ella en la sepoltura: pues si deste desisto & doy en otro mas baxo: que sera sino fenecer? Con esto no me osaua menear porque tenia por fe q<ue> todos los grados auia de hallar mas ruynes. Y a abaxar otro punto no sonara Laza-ro} {CW. c v} [fol. 21v] {HD. Tractado +} {CB1. ni se oyera enel mundo: pues estando en tal aflicion / qual plega al sen~or librar d<e>lla a todo fiel christiano y sin saber darme consejo / viendome yr de mal en peor. Un dia q<ue>l cuytado / ruyn y lazerado de mi amo auia ydo fuera del lugar llego se a[ ]caso a mi puerta vn calderero: el qual yo creo que fue angel embiado a mi / por la mano de dios en aq<ue>l habito / pregunto me si tenia algo q<ue> adobar: en mi teniades bie<n> q<ue> hazer / y no hariades poco si me remediassedes / dixe passo q<ue> no me oyo / mas como no era tiempo de gastar lo en dezir gr<aci>as / alumbrado por el esp<irit>u sancto / le dixe. Tio vna llaue deste arte he perdido / y temo mi sen~or me ac'ote / por v<uest>ra vida veays si en essas q<ue> traeys ay algunas que le haga / q<ue> yo os lo pagare. Come<n>c'o a prouar el angelico calderero vna y otra de vn gra<n> sartal q<ue> dellas traya / & yo ayudalle} [fol. 22r] {HD. Segundo.} {CB1. con mis flacas oraciones / quando no me cato veo en figura d<e> panes / como dize<n> la cara de Dios de<n>tro del arcaz: y abierto dixe le. Yo no te<n>go dineros q<ue> os dar por la llaue / mas tomad de ay el pago. El tomo vn bodigo de aquellos el que mejor le parecio / y da<n>do me mi llaue se fue muy co<n>tento / dexando me mas a mi. Mas no toque en nada por el presente / porq<ue> no fuesse la falta sentida: y aun porque me vi de tanto bien sen~or / parescio me que la ha<m>bre no se me osaua llegar / Uino el misero de mi amo / y quiso Dios no miro enla oblada q<ue>l angel auia lleuado. Y otro dia en saliendo de casa abro mi parayso panal / y tomo entre las manos y dientes vn bodigo: y en dos credos le hize inuisible / no se me oluidando el arca abierta / y comienc'o a barrer la casa co<n> mucha alegria paresciendo me con aquel remedio /} [fol. 22v] {HD. Primero.} {CB1. remediar dende en adelante la triste vida. Y assi estuue con ello aquel dia y otro gozoso: mas no estaua en mi dicha que me durasse mucho aquel desca<n>so: porque luego al tercero dia me vino la terciana derecha / & fue q<ue> veo a deshora al que me mataua de hambre: sobre nuestro arcaz boluiendo y reboluiendo: contando y tornando a contar los panes. Yo dissimulaua y en mi secreta oracion y deuociones y plegarias dezia: sant Juan y ciegale. Despues que estuuo vn gran rato echando la cuenta por dias y dedos contando: dixo. Si no tuuiera a tan buen recaudo esta arca: yo dixera que me auian tomado della panes: pero de oy mas solo por cerrar puerta ala sospecha: quiero tener buena cue<n>ta conellos: nueue queda<n> y vn pedac'o. Nueuas malas te de dios ((dixe yo entre mi)) parecio me con lo q<ue> dixo} [fol. 23r] {HD. Segundo.} {CB1. passarme el corac'on co<n> saeta de montero / & comenc'o me el estomago a escaruar de hambre / viendo se puesto en la dieta passada. Fue fuera de casa: yo por consolarme abro el arca & como vi el pan comence lo de adorar ((no osando recebillo)) conte los: si a dicha el lazerado se errara / & halle su cuenta mas verdadera que yo quisiera. Lo mas que yo pude hazer: fue dar en ellos mil besos / y lo mas delicado que yo pude: del partido parti vn poco al pelo q<ue> el estaua / & con aq<ue>l passe aquel dia no tan alegre como el passado: mas como la hambre creciesse: mayormente que tenia el estomago hecho a mas pan / aquellos dos / o tres dias ya dichos: moria mala muerte: tanto que otra cosa no hazia en viendo me solo sino abrir / & cerrar el arca & contemplar en aquella cara de Dios ((que ansi dizen los} [fol. 23v] {HD. Tractado +} {CB1. nin~os[))]: Mas el mismo dios que socorre alos afligidos viendo me en tal estrecho: truxo a mi memoria vn pequen~o remedio / que considerando entre mi dixe. Este arqueton es viejo y grande y roto por algunas partes aunque pequen~os agujeros: puede se pensar que ratones entrando en el hazen dan~o a este pan: sacar lo entero no es cosa conueniente porque vera la falta el que en tanta me haze viuir. Esto bien se sufre: y comienc'o a desmigajar el pan sobre vnos no muy costosos manteles que alli estauan y tomo vno y dexo otro: de manera que en cada qual de tres / o quatro desmigaje su poco / despues como quie<n> toma gragea lo comi / & algo me console: mas el como viniesse a comer & abriesse el arca: vio el mal pesar & sin dubda creyo ser ratones los que el dan~o auian hecho porq<ue> estaua} [fol. 24r] {HD. Segundo.} {CB1. muy al propio contrahecho de como ellos lo suelen hazer. Miro todo el arcaz de vn cabo a otro: & vio le ciertos agujeros por do sospechaua hauian entrado: llamo me diziendo. Lazaro mira: mira que persecucion ha venido aq<ue>sta noche por nuestro pan yo hize me muy marauillado preguntando le que seria / que ha de ser dixo el / ratones que no dexan cosa a vida: pusimonos a comer & quiso dios que aun en esto me fue bien que me cupo mas pan que la lazeria que me solia dar / porque rayo con vn cuchillo todo lo q<ue> penso ser ratonado / diziendo. Comete esso que el raton cosa limpia es. E assi aquel dia an~adiendo la racion del trabajo de mis manos / o de mis vn~as por mejor dezir / acabamos de comer / aun que yo nunca empec'aua / & luego me vino otro sobresalto que fue ver le andar solicito} [fol. 24v] {HD. Tractado +} {CB1. quitando clauos de paredes / & buscando tablillas con las quales clauo y cerro todos los agujeros de la vieja arca. O sen~or mio ((dixe yo entonces)) a qua<n>ta miseria & fortuna & desastres estamos puestos los nascidos y quan poco (t)[d]uran los plazeres desta nuestra trabajosa vida. He me aqui que pensaua con este pobre y triste remedio remediar & passar mi lazeria / y estaua ya quanto que alegre y de buena ventura: mas no quiso mi desdicha despertando a este lazerado de mi amo / & poniendo le mas dilige<n>cia de la que el de suyo se tenia ((pues los miseros por la mayor parte nunca de aquella carecen)) agora cerrando los agujeros del arca cerrasse la puerta a mi consuelo / & la abriesse a mis trabajos. Assi lamentaua yo en tanto que mi solicito carpintero con muchos clauos & tablillas dio fin a} {CW. sus} [fol. 25r] {HD. Segundo.} {CB1. sus obras / diziendo. Agora donos traydores ratones / conuiene os mudar proposito q<ue> en esta casa mala medra teneys / de q<ue> salio de su casa / voy a ver la obra: y halle que no dexo en la triste y vieja arca agujero: ni aun por do<n>de le pudiesse entrar vn moxquito / abro con mi desaprouechada llaue sin espera<n>c'a de sacar prouecho & vi los dos o tres panes comenc'ados los que mi amo creyo ser ratonados y dellos toda via saque alguna lazeria: tocando los muy ligeramente a vso de esgremidor diestro / como la necessidad sea tan gran maestra viendo me con tanta siempre noche & dia estaua pe<n>sando la manera que ternia en suste<n>tar el viuir / & pienso p<ar>a hallar estos negros remedios que me era luz la hambre / pues dizen que el ingenio con ella se auisa / & al contrario con la hartura: & assi era} {CW. d} [fol. 25v] {HD. Tractado +} {CB1. por cierto en mi. Pues estando vna noche desuelado en este pensamie<n>to pensando como me podria valer & aprouechar me del arcaz. Senti que mi amo dormia porque lo mostraua con roncar y en vnos resoplidos gra<n>des que daua qua<n>do estaua durmie<n>do / leuanteme muy quedito & auiendo en el dia pensando lo q<ue> auia de fazer: y dexado vn cuchillo viejo que por alli andaua en parte do le hallasse / voy me al triste arcaz: & por do hauia mirado tener menos defensa / le acometi co<n>el cuchillo q<ue> a manera de barreno del vse / y como la antiquissima arca por ser de tantos an~os la hallasse sin fuerc'a & corac'on antes muy blanda & carcomida / luego se me rindio & consintio en su costado por mi remedio vn buen agujero. Esto hecho: abro muy passo la llagada arca & al tiento del pan que halle partido} [fol. 26r] {HD. Segundo.} {CB1. hize segun de yuso esta escripto & co<n> aquello algun tanto consolado tornando a cerrar me bolui a mis pajas en las quales repose & dormi vn poco / lo qual yo hazia mal y echaua lo al no comer: & ansi seria porque cierto en aquel tiempo no me deuian de quitar el suen~o los cuydados del rey de Fra<n>cia. Otro dia fue por el sen~or mi amo visto el dan~o assi del pan como del agujero que yo auia hecho & comenc'o a dar al Diablo los ratones & dezir. Que diremos a esto? nunca auer sentido ratones en esta casa sino agora: & sin duda deuia de dezir verdad / porque si casa auia de auer en el reyno justamente dellos priuilegiada / aquella de razon auia de ser / porque no suelen morar donde no ay que comer. Torna a buscar clauos por la casa & por las paredes & tablillas a atapar se los: venida la} {CW. d ij} [fol. 26v] {HD. Tratado. +} {CB1. noche & su reposo / luego yo era puesto en pie con mi aparejo & qua<n>tos el tapaua d<e> dia destapaua yo d<e> noche. En tal manera fue & tal prissa nos dimos que sin duda por esto se deuio dezir / donde vna puerta se cierra otra se abre: finalmente pareciamos tener a destajo la tela de Penelope / pues quanto el texia de dia: rompia yo de noche: y en pocos dias y noches pusimos la pobre despensa de tal forma que quien quisiera propiamente della hablar / mas corac'as viejas de otro tiempo que no arcaz la llamara segun la clauazon & tachuelas sobre si tenia. De que vio no le ap<ro>uechar nada su remedio ((dixo)) este arcaz esta ta<n> mal[ ]tratado y es de madera tan vieja & flaca que no aura raton a quie<n> se defie<n>da & va ya tal que si andamos mas con el: nos dexara sin guarda / & aun lo peor que aun q<ue>} [fol. 27r] {HD. Segundo} {CB1. haze poca toda via hara falta faltando & me pondra en costa de tres / o quatro reales. El mejor remedio q<ue> hallo pues el de hasta aqui no aprouecha: armare por de dentro a estos ratones malditos. Luego busco prestada vna ratonera: y con cortezas de queso que a los vezinos pedia: co<n>tino el gato estaua armado dentro del arca: lo qual era para mi singular auxilio: porque puesto caso q<ue> yo no auia menester muchas salsas para comer toda via me holgaua co<n> las cortezas del queso que dela ratonera sacaua / & sin esto no perdonaua el ratonar del bodigo. Como hallasse el pa<n> ratonado y el queso comido & no cayesse el raton que lo comia dauase al diablo: pregu<n>taua a los vezinos que podria ser comer el queso & sacar lo de la ratonera & no caer ni q<ue>dar dentro el raton / & hallar cayda la tram-pilla} {CW. d iij} [fol. 27v] {HD. Tractado +} {CB1. del gato / acordaron los vezinos no ser el raton el que este dan~o hazia / porque no fuera menos de hauer caydo alguna vez: dixo le vn vezino. En vuestra casa yo me acuerdo que solia andar vna Culebra: & esta deue de ser sin duda: & lleua razon que como es larga / tiene lugar de tomar el ceuo / & aun que la coja la tra<m>pilla encima como no entre toda dentro: torna se a salir. Quadro a todos lo q<ue> aquel dixo: & altero mucho a mi amo: & dende en adela<n>te no dormia tan a suen~o suelto q<ue> qualq<ui>er gusano d<e>la madera q<ue> de noche sonasse: pe<n>saua ser la culebra q<ue> le roya el arca / luego era puesto en pie & co<n> vn garrote que ala cabecera ((desde que aquello le dixero<n>)) ponia / daua en la pecadora del arca grandes garrotazos pensando espantar la Culebra / alos vezinos despertaua co<n> el estrue<n>-do} [fol. 28r] {HD. S[e]gundo.} {CB1. que hazia & a mi no dexaua dormir: yua se a mis pajas & trastornaua las y a mi con ellas pe<n>sando q<ue> se yua para mi se emboluia en mis pajas o en mi sayo: porq<ue> le dezian que de noche acaescia a estos animales / busca<n>do calor yr se alas cunas donde esta<n> criaturas: & aun mordellas y hazer les peligrar. Yo las mas vezes hazia d<e>l dormido y en la man~ana dezia me el. Esta noche moc'o no sentiste nada: pues tras la culebra anduue & aun pie<n>so se ha d<e> yr p<ar>a ti ala cama q<ue> son muy frias & buscan calor / plega a dios q<ue> no me muerda ((d<e>zia yo)) q<ue> harto miedo le te<n>go: desta manera andaua tan eleuado & leua<n>tado del suen~o q<ue> mi fe la culebra o el culebro por mejor dezir: no osaua roer de noche ni leua<n>tar se al arca / mas de dia mie<n>tra estaua enla ygl<es>ia o por el lugar fazia mis saltos: los q<ua>les dan~os viendo el} {CW. d iiij} [fol. 28v] {HD. Tratado. +} {CB1. y el poco remedio que les podia poner: andaua d<e> noche ((como digo)) hecho trasgo: yo vue miedo que con aquellas dilige<n>cias no me topasse con la llaue que debaxo d<e>las pajas tenia & parescio me lo mas seguro metella de noche enla boca porque ya desde que viui con el ciego la tenia tan hecha bolsa que me acaescio tener enella doze o quinze marauedis todo en medias blancas sin que me estoruasse el comer: porque de otra manera no era sen~or de vna blanca quel maldito ciego no cayesse con ella no dexando costura ni remiendo q<ue> no me buscaua muy a menudo: pues ansi como digo / metia cada noche la llaue enla boca & dormia sin recelo que el bruxo de mi amo cayesse co<n> ella: mas quando la desdicha ha de venir / por de mas es diligencia. Quisieron mis hados ((o por mejor dezir)) mis pecca-dos} [fol. 29r] {HD. Segundo.} {CB1. q<ue> vna noche q<ue> estaua durmiendo: la llaue se me puso enla boca que abierta deuia tener de tal manera & postura quel ayre y resoplo q<ue> yo durmiendo echaua / salia por lo hueco dela llaue ((que de can~uto era)) & siluaua ((segu<n> mi desastre quiso)) muy rezio de tal manera que el sobresaltado de mi amo lo oyo: & creyo sin duda ser el siluo dela Culebra / & cierto lo deuia parescer: leua<n>to se muy passo con su garrote en la mano & al tiento & sonido de la Culebra se llego a mi con mucha quietud por no ser sentido de la Culebra / & como cerca se vio: penso que alli en las pajas do yo estaua echado al calor mio se auia venido / leuantando bien el palo / pensando tener la debaxo & dar le tal garrotazo que la matasse / con toda su fuerc'a me descargo en la cabec'a tan gran golpe q<ue> sin ningu<n> sentido y muy mal d<e>s-calabrado} {CW. d v} [fol. 29v] {HD. Tratado. +} {CB1. me dexo: como sintio que me auia dado: segun yo deuia hazer gra<n> sentimie<n>to conel fiero golpe: contaua el q<ue> se auia llegado a mi: & da<n>do me gra<n>des bozes llama<n>do me procuro recordar me / mas como me tocasse co<n> las manos: tento la mucha sangre q<ue> se me yua / & conocio el dan~o q<ue> me auia hecho / & co<n> mucha prissa fue a buscar lumbre / & llegando con ella hallo me quexando toda via con mi llaue enla boca: q<ue> nunca la desampare la mitad fuera: bie<n> de aq<ue>lla manera q<ue> deuia estar al tiempo q<ue> siluaua con ella. Espa<n>tado el matador de culebras / que podria ser aq<ue>lla llaue: miro la / saca<n>dome la d<e>l todo dela boca & vio lo que era: porq<ue> enlas guardas nada d<e>la suya difere<n>ciaua: fue luego a p<ro>ualla & co<n>ella prouo el maleficio. Deuio d<e> dezir el cruel cac'ador / el rato<n> & culebra q<ue> me daua<n> guerra & me} [fol. 30r] {HD. Segundo.} {CB1. comia<n> mi hazie<n>da he hallado: delo q<ue> sucedio en aq<ue>llos tres dias siguie<n>tes ninguna fe dare: porq<ue> los tuue en el vientre de la vallena: mas d<e> como esto q<ue> he contado: oy ((despues q<ue> en mi torne)) dezir a mi amo / el q<ua>l a qua<n>tos alli venia<n>: lo co<n>taua por exte<n>so. A cabo de tres dias yo torne en mi sentido & vime echado en mis pajas: la cabec'a toda emplastada & llena d<e> azeytes & vngue<n>tos / y espa<n>tado dixe q<ue> es esto: respondio me el cruel sacerdote a fe q<ue> los ratones & Culebras que me destruyan: ya los he cac'ado / & mire por mi / & vi me ta<n> mal tratado q<ue> luego sospeche mi mal. A esta hora entro vna vieja que ensalmaua / & los vezinos & comienc'an me quitar trapos d<e>la cabec'a & curar el garrotazo & como me fallaro<n> buelto en mi sentido holgaro<n> se mucho / & dixeron: pues ha tornado en su acuerdo plazera} [fol. 30v] {HD. Tratado +} {CB1. a Dios no ser  [fol. 35v] {HD. Tractado +} {CB1. lo qual era impossible porque de lo duro: mal se puede hazer blando: el diablo d<e>l enxalma maldita la cosa tenia dentro desi q<ue> puesto sobre el can~izo todas las can~as se sen~alaua<n> y parecie<n> a lo propio entrecuesto de flaquissimo puerco si sobre aquel hambriento colchon vn alfamar del mismo jaez d<e>l q<ua>l el color yo no pude alcanc'ar. Hecha la cama & la noche venida dixo me. Lazaro ya es tarde y de aqui a la plac'a ay gran trecho. ta<m>bien enesta ciudad andan muchos ladrones q<ue> siendo de noche capean / passemos como podamos / y man~ana venido el dia Dios hara merced porq<ue> yo por estar solo no estoy proueydo: antes he comido estos dias por alla fuera mas agora hazer lo hemos de otra manera. Sen~or de mi dixe yo / ninguna pena te<n>ga U<uestra> M<erced> q<ue> bie<n> se passar vna noche / y aun mas si} [fol. 36r] {HD. Tercero.} {CB1. es menester. Sin comer viuiras mas y mas sano me respo<n>dio / porq<ue> como deziamos oy / no ay tal cosa enel mu<n>do para viuir mucho q<ue> comer poco. Si por essa via es / dixe entre mi / nunca yo morire q<ue> siempre he guardado essa regla por fuerc'a / y aun espero en mi desdicha a tenella toda mi vida. Y acosto se en la cama poniendo por cabecera las calc'as y el jubon: y ma<n>do me echar a sus pies / lo q<ua>l yo hize mas maldito el suen~o que yo dormi: porq<ue> las can~as y mis salidos huessos en toda la noche dexaro<n> de rifar y ence<n>der se: q<ue> con mis trabajos: males & ha<m>bre pienso q<ue> en mi cuerpo no auia libra de carne: & ta<m>bien como aq<ue>l dia no auia comido casi nada rauiaua de ha<m>bre ((la q<ua>l con el suen~o no tenia amistad)) maldixe me mil vezes ((dios melo p<er>done)) & a mi ruyn fortuna: alli lo mas dela noche & lo peor no} {CW. e iiij} [fol. 36v] {HD. Tractado +} {CB1. osando me reboluer por no despertalle pedi a dios muchas vezes la muerte. La man~ana venida leua<n>tamonos & comie<n>c'a a[ ]limpiar & sacudir sus calc'as & jubon: sayo & capa: & <ue> este mi amo tiene segun el me dixo / es vn muy buen solar de casas & vn palomar derribado: bien esta dizen ellos / por poco que esso valga / ay para nos entregar de la deuda & a que parte dela ciudad tiene esso / me preguntaron: en su tierra les respondi. Por Dios que esta bueno el negocio dixeron ellos / y adonde es su tiera? De Castilla la vieja me dixo el que era / les dixe.} [fol. 51r] {HD. Tercero.} {CB1. Rieron se mucho el alguazil y el escriuano diziendo. Bastante relacion es esta / para cobrar vuestra deuda: aun que mejor fuesse. Las vezinas que estauan presentes / dixeron. Sen~ores este es vn nin~o innocente & ha pocos dias q<ue> esta con esse escudero / & no sabe del mas que vuesas mercedes / si no qua<n>to el peccadorcico se llega a( )qui a nuestra casa / y le damos de comer lo que podemos por amor de dios / y a las noches se yua a dormir con el: vista mi inocencia: dexaro<n> me dando me por libre. Y el alguazil y el escriuano piden al hombre & ala muger sus derechos: sobre lo qual tuuieron gran co<n>tienda & ruydo: por que ellos allegaro<n> no ser obligados a pagar / pues no auia d<e> que: ni se hazia el embargo / los otros dezian que auia dexado de yr a otro negocio / que les importaua mas: por venir a} {CW. g iij} [fol. 51v] {HD. Tractado +} {CB1. aquel: finalmente despues de dadas muchas bozes al cabo carga vn porqueron con el viejo alfamar dela vieja: & aunq<ue> no yua muy cargado alla van todos cinco dando bozes: no se en que paro / creo yo quel peccador alfamar pagara por todos & bien se empleaua: pues el tiempo que auia d<e> reposar y descansar de los trabajos passados: se andaua alquilando. Asi como he contado me dexo mi pobre tercero amo: do acabe de conocer mi ruyn dicha: pues sen~alando se todo lo que podria contra mi: hazia mis negocios tan al reues: que los amos que suelen ser dexados de los moc'os en mi no fuesse ansi: mas que mi amo me dexasse & huyesse de mi.} [fol. 52r] {HD. Quarto.} {CB1. {RUB. % Como Lazaro se assento con vn Frayle dela Merced y delo que le acaescio con el.} {IN6.} VUe de buscar el quarto y este fue vn frayle dela merced q<ue> las mugercillas que digo / me encaminaron. Al qual ellas le llamauan pariente / gran enemigo del coro / y de comer enel co<n>uento: perdido por andar fuera: amicissimo de negocios seglares / & visitar: ta<n>to que pienso que rompia el mas c'apatos que todo el conuento. Este me dio los primeros c'apatos que rompi en mi vida / mas no me duraron ocho dias ni yo pude con su trote durar mas. Y por esto & por otras cosillas que no digo sali del.} {CW. g iiij} [fol. 52v] {HD. Tratado. +} {CB1. {RUB. % Como Lazaro se assento con vn Buldero & de las cosas que conel passo.} {MIN=.} {IN6.} ENel quinto por mi ventura di: q<ue> fue vn buldero el mas d<e>sembuelto y desuergo<n>c'ado / y el mayor echador d<e>llas q<ue> jamas yo vi / ni ver esp<er>o: ni pienso nadie vio porq<ue> tenia & buscaua modos & maneras & muy sotiles inue<n>ciones. En entra<n>do e<n>los lugares} [fol. 53r] {HD. Quinto.} {CB1. do auian de presentar la bulla. Primero presentaua alos clerigos o curas algunas cosillas no tan poco de mucho valor ni substancia. Una lechuga murciana si era por el tiempo vn par de limas o naranjas / vn melocoton vn par de duraznos / cada sendas peras verdin~ales. Ansi procuraua tener los propicios / porq<ue> fauoreciessen su negocio & llamassen sus feligreses a tomar la bulla ofreciendose le a el las gracias / informaua se dela sufficiencia dellos: si dezian que entendia<n> / no hablaua palabra en latin por no dar tropec'on / mas aprouechaua se de vn gentil & bien cortado romance y desemboltissima lengua. E si sabian que los dichos clerigos / eran delos reuere<n>dos / digo que mas con dineros q<ue> con letras & con reuerendas se ordenan / hazia se entrellos vn sancto Thomas / & hablaua dos} {CW. g v} [fol. 53v] {HD. Tratado. +} {CB1. horas en latin: a[ ]lo[ ]menos que lo parescia aunque no lo era. Qua<n>do por bien no le tomauan las bullas / buscaua como por mal se las tomassen & para aquello hazia molestias al pueblo. E otras vezes con man~osos artificios: & porque todos los que le veya hazer seria largo de contar: dire vno muy sotil & donoso conel qual prouare bien su sufficie<n>cia. En vn lugar dela sagra de Toledo: auia predicado dos o tres dias / haziendo sus acostumbradas diligencias / y no le auian tomado bulla: ni a mi ver: tenia<n> intencion de sela tomar. Estaua dado al diablo co<n> aquello: y pensando q<ue> hazer se / acordo de co<m>bidar al pueblo / para otro dia de man~ana despedir la bulla. Y essa noche despues de cenar pusieron se a jugar la colacion el y el alguazil: & sobre el juego vinieron a ren~ir y a auer malas palabras.} [fol. 54r] {HD. Quinto.} {CB1. El llamo al Alguazil ladro<n> / y el otro a el falsario: sobre esto el sen~or Comissario mi sen~or tomo vn lanc'on / que en el portal do jugauan / estaua. El Alguazil puso mano a su espada que en la cinta tenia al ruydo & bozes que todos dimos: acuden los huespedes y vezinos: & meten se en medio: y ellos muy enojados procurando se de desembarac'ar delos que en medio estauan / para se matar: mas como la gente a gran ruydo cargasse y la casa estuuiesse llena della. Uiendo que no podian afrentar se con las armas: dezian se palabras injuriosas: entre las quales el Alguazil dixo a mi amo: que era falsario & las bullas que predicaua eran falsas: finalmente que los del pueblo viendo que no bastauan a ponellos en paz: acordaron de lleuar al alguazil de la posada a otra parte. Y assi} [fol. 54v] {HD. Tractado +} {CB1. quedo mi amo muy enojado / & despues que los huespedes y vezinos le vuieron rogado que perdiesse el enojo y se fuesse a dormir: y assi nos echamos todos. La man~ana venida: mi amo se fue a la yglesia & ma<n>do tan~er a missa & al sermon para despedir la bulla. Y el pueblo se ju<n>to / el qual andaua murmurando delas bullas / diziendo / como eran falsas / & que el mismo alguazil rin~endo: lo auia descubierto. De manera que atras que tenian mala gana de tomalla / con aquello del todo la aborescieron. El sen~or Comissario se subio al pulpito: & comienc'a su sermon / & a animar la gente a que no quedassen sin tanto bien & indulge<n>cia como la sancta Bulla traya. Estando en lo mejor del sermon / entra por la puerta de la yglesia el Alguazil: & desque hizo oracion / leuantosse & con boz alta y} [fol. 55r] {HD. Quinto.} {CB1. pausada / cuerdame<n>te comenc'o a dezir. Buenos hombres oyd me vna palabra / que despues oyreys a quien quisierdes. Yo vine aqui con este Echacueruo que os predica: el qual me engan~o: & dixo que le fauoresciesse eneste negocio: y que partiriamos la ganancia / & agora visto el dan~o q<ue> haria a mi consciencia & a vuestras haziendas: arrepentido delo hecho os declaro claramente / que las bullas que predica son falsas / y que no le creays ni las tomeys / y que yo directe ni indirecte / no soy parte enellas / & que desde agora dexo la vara & doy con ella enel suelo: & si en algun tiempo este fuere castigado por la falsedad que vosotros me seays testigos como yo no soy co<n> el ni le doy a ello ayuda: antes os desengan~o / & declaro su maldad. Y acabo su razonamiento. Algunos hombres ho<n>rra-dos} [fol. 55v] {HD. Tratado. +} {CB1. que alli estauan se quisieron leuantar y echar al alguazil fuera dela yglesia por euitar esca<n>dalo: mas mi amo les fue ala mano & mando a todos que so pena de excomunion no le estoruassen: mas que le dexassen dezir todo lo q<ue> quisiesse / & ansi el tambien tuuo silencio mientras el alguazil dixo todo lo q<ue> he dicho: como callo: mi amo le pregunto si queria dezir mas que lo dixesse. El alguazil dixo. Harto mas ay que dezir de vos & de vuestra falsedad: mas por agora basta. El sen~or Comissario se hinco de rodillas en el pulpito / y puestas las manos & mirando al cielo: dixo ansi. Sen~or Dios a quien ninguna cosa es escondida antes todas manifiestas / & aquien nada es impossible antes todo possible: tu sabes la verdad & quan injustamente yo soy afre<n>tado: enlo que a mi toca yo lo perdo-no:} [fol. 56r] {HD. Quinto.} {CB1. por que tu sen~or me perdones: no mires a aquel q<ue> no sabe lo que haze ni dize / mas la injuria a ti hecha: te suplico & por justicia te pido no disimules / porque alguno que esta aqui / que por ventura penso tomar aquesta sancta bulla & dando credito a las falsas palabras de aquel hombre lo dexara de hazer: & pues es tanto perjuyzio del proximo / te suplico yo sen~or no lo dissimules: mas luego muestra aqui milagro & sea desta manera / que si es verdad lo que aquel dize & que yo traygo maldad & falsedad: este pulpito se hunda comigo / y meta siete estados debaxo de tierra / do el ni yo jamas parezcamos. Y si es verdad lo que yo digo: & aquel persuadido del Demonio ((por quitar & priuar a los que estan presentes de tan gran bien)) dize maldad / tambien sea castigado / y de} [fol. 56v] {HD. Tratado. +} {CB1. todos conocida su malicia. A penas auia acabado su oracion el deuoto sen~or mio: qua[n]ndo el negro Alguazil cae de su estado & da tan gran golpe enel suelo que la yglesia toda hizo resonar: & comenc'o a bramar y echar espumajos por la boca & torcella / & hazer visajes conel gesto / dando de pie y de mano: reboluiendo se por aquel suelo a vna parte y a otra: el estruendo & bozes de la gente era tan grande que no se oyan vnos a otros algunos estauan espantados y temerosos: vnos dezian / el sen~or le socorra y valga: otros bien se le emplea / pues leuantaua tan falso testimonio. Finalme<n>te algunos que alli estauan & a mi parescer no sin harto temor se llegaron y le trauaron delos brac'os co<n> los quales daua fuertes pun~adas alos que cerca del estauan / otros le tirauan por las piernas / & tuuieron} {CW. rezia} [fol. 57r] {HD. Quinto.} {CB1. reziamente porque no auia mula falsa enel mundo / que tan rezias coces tirasse. Y asi le tuuieron vn gra[n] rato porque mas de quinze hombres estauan sobre el / y a todos daua las manos llenas & si se descuydauan enlos hocicos. A todo esto el sen~or mi amo estaua enel pulpito de rodillas: las manos y los ojos puestos enel cielo trasportado enla diuina esse<n>cia: quel pla<n>to & ruydo & bozes que en la yglesia auia no eran parte para apartalle de su diuina conte<m>placion. Aquellos buenos hombres llegaron a el: & dando bozes le despertaron y le suplicaron quisiesse socorrer a aquel pobre que estaua murie<n>do: y que no mirase alas cosas passadas: ni a sus dichos malos: pues ya dellos tenia el pago mas si en algo podria ap<ro>uechar para librar le del peligro & passion que padescia por amor de dios lo hiziesse} {CW. h} [fol. 57v] {HD. Tractado +} {CB1. Pues ellos veyan clara la culpa del culpado / y la verdad / & bo<n>dad suya / pues a su peticion y venganc'a el sen~or no alargo el castigo. El sen~or comissario como quien despierta de vn dulce suen~o: los miro & miro al delinquente & a todos los que al( )rededor estauan & muy pausadame<n>te les dixo. Buenos hombres vosotros nunca auiades de rogar por vn hombre en quien Dios tan sen~aladamente se ha sen~alado. Mas pues el nos manda q<ue> no boluamos mal por mal y perdonemos las injurias con confianc'a podremos suplicar le q<ue> cumpla lo que nos manda & su magestad perdone a este que le ofendio poniendo en su sancta fe obstaculo / vamos todos a suplicalle. Y assi baxo del pulpito y encomendo aqui muy deuotamente suplicassen a nuestro sen~or tuuiesse por bien de perdonar a} [fol. 58r] {HD. Quinto.} {CB1. aquel pecador & boluerle en su salud y sano juyzio / & lanc'ar del el Demonio si su magestad auia permitido que por su gran peccado enel entrasse. Todos se hincaron de rodillas y delante del altar con los clerigos comenc'auan a cantar con boz baxa vna letania: & viniendo el conla cruz & agua bendita despues de auer sobre el cantado. El sen~or mi amo puestas las manos al cielo / & los ojos que casi nada sele parecia si no vn poco de blanco: comienc'a vna oracion no menos larga que deuota: con la qual hizo llorar a toda la ge<n>te como suele<n> hazer enlos sermones de passio<n> de predicador & auditorio deuoto: suplicando a n<uest>ro sen~or pues no queria la muerte del pecador: sino su vida & arrepentimiento q<ue> aq<ue>l encaminado por el demonio y p<er>suadido d<e>la muerte y pecado le quisiesse p<er>donar & dar} {CW. h ij} [fol. 58v] {HD. Tractado +} {CB1. vida & salud: p<ar>a que se arrepintiesse & co<n>fessase sus pecados: y esto hecho ma<n>do traer la bulla: & puso se la enla cabec'a & luego el pecador del alguazil comenc'o poco a poco a estar mejor & tornar en si: y desque fue bien buelto en su acuerdo: echo se a los pies del sen~or comissario y demandando le perdon / co<n>fesso auer dicho aq<ue>llo por la boca y ma<n>damiento del demonio: lo vno por hazer a el dan~o y vengar se del enojo: lo otro & mas principal porque el d<e>monio recibia mucha pena d<e>l bien q<ue> alli se hiziera: en tomar la bulla. El sen~or mi amo le perdono: y fueron hechas las amistades entre ellos: y a tomar la bulla vuo ta<n>ta prisa que casi anima viuiente enel lugar no quedo sin ella / marido & muger & hijos & hijas / moc'os: & moc'as. Diuulgo se la nueua delo acaecido por los lugares comarcanos} [fol. 59r] {HD. Quinto.} {CB1. y quando a ellos llegauamos no era menester sermon ni yr a la yglesia. Que ala posada la venia<n> a tomar como si fueran peras que se dieran de balde. De[ ]manera que en diez o doze lugares de aquellos al( )rededores donde fuymos echo el sen~or mi amo otras tantas mil bullas sin predicar sermon. Qua<n>do se hizo el ensayo confiesso mi pecado / q<ue> tambien fuy dello espantado / y crey que ansi era como otros muchos. Mas con ver despues la risa y burla q<ue> mi amo y el alguazil lleuaua<n> & hazian del negocio. Conoci como auia sido industriado por el industrioso & inuentiuo de mi amo / & aunque mochacho cayo me mucho en gracia: & dixe entre mi. Qua<n>tas destas deuen de hazer estos burladores entre la innoce<n>te gente: finalmente estuue con este mi quinto amo cerca de quatro meses / en los} {CW. h iij} [fol. 59v] {HD. Tractado +} {CB1. quales passe ta<m>bien hartas fatigas. {RUB. % Como Lazaro se assento con vn Capellan / & lo que con el passo.} {MIN=.} {IN6.} DEspues desto / assente con vn maestro de pintar panderos / para molelle los colores: y ta<m>bie<n> sufri mil males. Sie<n>do ya en este tiempo buen moc'uelo entrando vn dia enla yglesia mayor vn capellan d<e>lla me recibio} [fol. 60r] {HD. Sexto.} {CB1. por suyo: y puso me en poder vn bue<n> asno & quatro cantaros & vn ac'ote: & comence a echar agua por la cibdad. Este fue el primer escalon q<ue> yo subi p<ar>a venir a alcanc'ar buena vida porque mi boca era medida daua cada dia a mi amo treynta marauedis ganados & los sabados ganaua para mi / & todo lo de mas entre semana de treynta marauedis. Fue me ta<m>bien enel officio q<ue> al cabo de quatro an~os q<ue> lo vse con poner enla ganancia buen recaudo ahorre para me vestir muy honrradamente de la ropa vieja: dela qual compre vn jubon de fustan viejo & vn sayo raydo de manga tra<n>c'ada & puerta / & vna capa que auia sido frisada / & vna espada delas viejas primeras de Cuellar / desque me vi en habito de hombre de bien / dixe a mi amo se tomasse su asno que no queria mas seguir aquel officio.} {CW. h iiij} [fol. 60v] {HD. Tractado +} {CB1. {RUB. % Como Lazaro se assento con vn Alguazil / y de lo que le acaescio conel.} {MIN=.} {IN6.} DEspedido del Capella<n> assente por hombre de justicia con vn Alguazil: mas muy poco viui con el / por parecer me officio peligroso / mayormente q<ue> vna noche nos corrieron a mi & a mi amo a pedradas & a palos vnos retraydos: & a mi amo que espe-ro /} [fol. 61r] {HD. Septimo.} {CB1. trataro<n> mal / mas a mi no me alca<n>c'aron / con esto renegue del trato / & pensando en que modo de viuir haria mi assiento por tener descanso / y ganar algo para la vejez / quiso dios alu<m>brar me & poner me en camino & manera prouechosa / & con fauor que tuue de amigos y sen~ores todos mis trabajos & fatigas hasta ento<n>ces passados fueron pagados con alcanc'ar lo que procure / q<ue> fue vn officio real viendo q<ue> no ay nadie que medre: sino los que le tienen. Enel qual el dia de oy viuo y resido a seruicio d<e> dios y de vuestra M<erced> Y es que tengo cargo de pregonar los vinos que enesta ciudad se venden / y en almonedas & cosas perdidas / acompan~ar los que padecen persecuciones por justicia / y declarar a bozes sus delictos / pregonero hablando en buen Romance. Ha me sucedido tambien / yo le} {CW. h v} [fol. 61v] {HD. Tractado +} {CB1. he vsado tan facilmente q<ue> casi todas las cosas al officio tocantes passan por mi mano: ta<n>to que en toda la cibdad: el que ha de echar vino a vender / o algo si Lazaro de Tormes no entiende en ello / hazen cuenta de no sacar prouecho. En este tiempo viendo mi habilidad & bue<n> viuir teniendo noticia de mi persona / el sen~or Arcipreste de sant Saluador / mi sen~or / y seruidor / & amigo de vuestra Merced porque le pregonaua sus vinos: procuro casar me con vna criada suya: & visto por mi que de tal persona no podia venir sino bie<n> & fauor: acorde de lo hazer & assi me case con ella & hasta agora no estoy arrepentido / por que aliende de ser buena hija / & diligente seruicial: tengo en mi sen~or el Arcipreste todo fauor & ayuda: & siempre en el an~o le da en vezes al pie de vna carga de} [fol. 62r] {HD. Septimo.} {CB1. trigo por las Pascuas su carne / & quando el par de los bodigos: las calc'as viejas que dexa: & hizo nos alquilar vna casilla par d<e> la suya: los domingos & fiestas casi todas las comiamos en su casa: mas malas lenguas que nunca faltaron ni faltaran no nos dexan viuir: diziendo / no se que & si se que de que veen a mi muger yrle a hazer la cama / & guisalle d<e> comer / y mejor les ayude Dios que ellos dizen la verdad / porque alie<n>de de no ser ella muger que se pague destas burlas / mi sen~or me ha prometido lo que pienso cumplira / que el me hablo vn dia muy largo dela<n>te della y me dixo. Lazaro de Tormes: quien ha de mirar a dichos de malas lenguas / nunca medrara: digo esto por que no me marauillaria alguno viendo entrar en mi casa a tu muger: & salir della. Ella entra muy atu ho<n>rra} [fol. 62v] {HD. Tractado +} {CB1. & suya: y esto telo prometo. Por tanto no mires a lo que pueden dezir: sino a lo que te toca / digo a tu prouecho. Sen~or / le dixe: yo determine de arrimar me alos buenos: verdad es que algunos de mis amigos me han dicho algo desso: & aun por mas de tres vezes me ha<n> certificado: que antes que comigo casasse auia parido tres vezes hablando con reuerencia de U<uestra> M<erced> porque esta ella delante: entonces mi muger echo juramentos sobre si / que yo pense / la casa se hundiera con nosotros / y despues tomo se a llorar & a echar maldiciones sobre quien comigo la auia casado. En tal manera que quisiera ser muerto antes que se me vuiera soltado aquella palabra dela boca: mas yo de vn cabo / & mi sen~or de otro tanto le diximos & otorgamos que cesso su llanto con juramento que le hize de} [fol. 63r] {HD. Septimo.} {CB1. nunca mas en mi vida me<n>talle nada de aquello / y que yo holgaua & auia por bien d<e> que ella entrasse & saliesse de noche y de dia / pues estaua bie<n> seguro de su bondad. Y assi quedamos todos tres bien conformes hasta el dia de oy nunca nadie nos oyo sobre el caso: antes quando alguno siento que quiere dezir algo d<e>lla / le atajo y le digo. Mira si soys amigo no me digays cosa con q<ue> me pese: q<ue> no tengo por mi amigo al que me haze pesar / mayormente si me quieren meter mal co<n> mi muger / q<ue> es la cosa del mundo que yo mas quiero / & la amo mas que a mi y me haze Dios conella mil mercedes & mas bien que yo merezco / que yo jurare sobre la hostia co<n>sagrada que es tan buena muger como viue dentro delas puertas de Toledo: & quien otra cosa me dixere / yo me matare con el. Desta} [fol. 63v] {HD. Tratado.} {CB1. manera no me dize<n> nada: & yo tengo paz en mi casa. Esto fue el mesmo an~o que nuestro victorioso Emperador enesta insigne cibdad d<e> Toledo entro: & tuuo enella cortes / y se hizieron grandes regozijos & fiestas: como Uuestra Merced aura oydo. Pues eneste tiempo estaua en mi prosperidad / y enla cumbre de toda buena fortuna. {RUB. % Fue impressa la presente obra enla muy noble villa de Medina del Campo en la imprenta de Mattheo y Francisco del canto hermanos. Acabo se a primero del mes de Marc'o. An~o de. M. D. liiij.}}`;

        // ============================================================
        // FUNCIÓ DE NETEJA FILOLÒGICA COMPLETA
        // ============================================================
        function netejaFilologica(text) {
            return text
                .replace(/([-~])\s*\n\s*/g, '') 
                .replace(/n~/g, 'ñ')
                .replace(/c'/g, 'ç')
                .replace(/&/g, 'y')
                .replace(/\([^\)]+\)\[([^\]]+)\]/g, '$1')
                .replace(/\[fol\.[^\]]+\]/g, '')
                .replace(/\{[^}]+\}/g, '')
                .replace(/\//g, '')
                .replace(/[<>]/g, '')
                .replace(/[.,;:?!()]/g, ' ')
                .replace(/~/g, ' ')
                .trim()
                .split(/\s+/)
                .filter(p => p.length > 0);
        }

        // ============================================================
        // ALGORISME NEEDLEMAN-WUNSCH
        // ============================================================
        function alignNeedlemanWunsch(seq1, seq2) {
            const MATCH = 2, MISMATCH = -1, GAP = -1;
            let n = seq1.length, m = seq2.length;
            let matrix = Array(n + 1).fill().map(() => Array(m + 1).fill(0));

            for (let i = 0; i <= n; i++) matrix[i][0] = i * GAP;
            for (let j = 0; j <= m; j++) matrix[0][j] = j * GAP;

            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    let score = (seq1[i-1].toLowerCase() === seq2[j-1].toLowerCase()) ? MATCH : MISMATCH;
                    matrix[i][j] = Math.max(
                        matrix[i-1][j-1] + score,
                        matrix[i-1][j] + GAP,
                        matrix[i][j-1] + GAP
                    );
                }
            }

            let res1 = [], res2 = [], i = n, j = m;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && matrix[i][j] === matrix[i-1][j-1] + (seq1[i-1].toLowerCase() === seq2[j-1].toLowerCase() ? MATCH : MISMATCH)) {
                    res1.unshift(seq1[i-1]);
                    res2.unshift(seq2[j-1]);
                    i--; j--;
                } else if (i > 0 && matrix[i][j] === matrix[i-1][j] + GAP) {
                    res1.unshift(seq1[i-1]);
                    res2.unshift(null);
                    i--;
                } else {
                    res1.unshift(null);
                    res2.unshift(seq2[j-1]);
                    j--;
                }
            }
            return { a: res1, b: res2 };
        }

        // ============================================================
        // PREPARACIÓ I ALINEACIÓ
        // ============================================================
        let paraulesAnvers, paraulesBurgos, paraulesAlcala, paraulesMedina;
        let alBurgos, alAlcala, alMedina;
        let totalRows = 0;
        
        function inicialitzarDades() {
            paraulesAnvers = netejaFilologica(textAnversRaw);
            paraulesBurgos = netejaFilologica(textBurgosRaw);
            paraulesAlcala = netejaFilologica(textAlcalaRaw);
            paraulesMedina = netejaFilologica(textMedinaRaw);
            
            alBurgos = alignNeedlemanWunsch(paraulesAnvers, paraulesBurgos);
            alAlcala = alignNeedlemanWunsch(paraulesAnvers, paraulesAlcala);
            alMedina = alignNeedlemanWunsch(paraulesAnvers, paraulesMedina);
            
            totalRows = alBurgos.a.length;
        }
        
        inicialitzarDades();

        // Funció per guardar nota individualment
        window.guardarNota = function(id) {
            const dades = JSON.parse(localStorage.getItem('notes_lazarillo') || "{}");
            const textarea = document.getElementById(`nota-${id}`);
            if (textarea) {
                dades[id] = textarea.value;
                localStorage.setItem('notes_lazarillo', JSON.stringify(dades));
            }
        };

        // Funció per mostrar missatge d'estat
        function mostrarStatus(msg, tipus = 'info') {
            const statusSpan = document.getElementById('statusMsg');
            if (statusSpan) {
                statusSpan.textContent = msg;
                statusSpan.className = `status-msg ${tipus}`;
                setTimeout(() => {
                    if (statusSpan.textContent === msg) {
                        statusSpan.textContent = '';
                        statusSpan.className = 'status-msg';
                    }
                }, 4000);
            }
        }

        // ============================================================
        // FUNCIÓ PER CARREGAR COMENTARIS EXTERNS (DES DE LA WEB)
        // ============================================================
        window.carregarComentarisExterns = async function() {
            const url = "https://rosamartina-si.github.io/Arahoentenc/NH/Lazarillo_comentaris.txt";
            mostrarStatus("🔄 Carregant comentaris des de la web...", "info");
            
            try {
                const resposta = await fetch(url);
                if (!resposta.ok) throw new Error(`HTTP ${resposta.status}: No s'ha pogut accedir al fitxer`);
                const text = await resposta.text();
                
                const linies = text.split('\n');
                const dadesNoves = {};
                let comentarisTrobats = 0;
                
                linies.forEach(linia => {
                    const match = linia.match(/^\[Fila (\d+)\]: (.*)$/);
                    if (match) {
                        const numFila = parseInt(match[1]) - 1;
                        const comentari = match[2].trim();
                        if (comentari) {
                            dadesNoves[numFila] = comentari;
                            comentarisTrobats++;
                        }
                    }
                });
                
                // Guardar al localStorage
                localStorage.setItem('notes_lazarillo', JSON.stringify(dadesNoves));
                
                // Recarregar la taula per mostrar els nous comentaris
                renderTaula();
                mostrarStatus(`✅ Carregats ${comentarisTrobats} comentaris des de la web`, "success");
                
            } catch (error) {
                console.error("Error en la càrrega externa:", error);
                mostrarStatus(`❌ Error carregant comentaris: ${error.message}`, "error");
            }
        };

        // Funció per descarregar notes a TXT
        window.descarregarTxt = function() {
            const dades = JSON.parse(localStorage.getItem('notes_lazarillo') || "{}");
            let contingut = "NOTES LAZARILLO - Comentaris per fila\n";
            contingut += "================================\n\n";
            
            Object.keys(dades).sort((a,b) => parseInt(a) - parseInt(b)).forEach(index => {
                if (dades[index] && dades[index].trim() !== "") {
                    contingut += `[Fila ${parseInt(index)+1}]: ${dades[index]}\n`;
                }
            });
            
            if (contingut === "NOTES LAZARILLO - Comentaris per fila\n================================\n\n") {
                contingut += "No hi ha cap comentari guardat.\n";
            }
            
            const blob = new Blob([contingut], { type: 'text/plain' });
            const enllaç = document.createElement('a');
            enllaç.href = URL.createObjectURL(blob);
            enllaç.download = "comentaris_lazarillo.txt";
            enllaç.click();
            mostrarStatus("💾 Notes descarregades correctament", "success");
        };

        // Funció per carregar notes des d'un fitxer TXT
        window.carregarTxt = function(event) {
            const arxiu = event.target.files[0];
            if (!arxiu) return;
            
            const lector = new FileReader();
            lector.onload = function(e) {
                const linies = e.target.result.split('\n');
                const dadesNoves = {};
                linies.forEach(linia => {
                    const match = linia.match(/^\[Fila (\d+)\]: (.*)$/);
                    if (match) {
                        dadesNoves[parseInt(match[1]) - 1] = match[2];
                    }
                });
                localStorage.setItem('notes_lazarillo', JSON.stringify(dadesNoves));
                renderTaula();
                mostrarStatus("📂 Notes carregades des del fitxer", "success");
            };
            lector.readAsText(arxiu);
            event.target.value = '';
        };
        
        // Funció per exportar CSV
        window.exportarCSV = function() {
            let csvContent = "\uFEFFFila,Anvers,Burgos,Alcalá,Medina,Divergència,Comentari\n";
            const notes = JSON.parse(localStorage.getItem('notes_lazarillo') || "{}");
            
            for (let i = 0; i < totalRows; i++) {
                const wA = (alBurgos.a[i] && alBurgos.a[i] !== null) ? alBurgos.a[i] : "—";
                const wB = (alBurgos.b[i] && alBurgos.b[i] !== null) ? alBurgos.b[i] : "—";
                const wC = (alAlcala.b[i] && alAlcala.b[i] !== null) ? alAlcala.b[i] : "—";
                const wM = (alMedina.b[i] && alMedina.b[i] !== null) ? alMedina.b[i] : "—";
                
                const nA = (wA !== "—" ? wA.toLowerCase().replace(/n~/g,'ñ').replace(/c'/g,'ç').replace(/&/g,'y') : "—");
                const nB = (wB !== "—" ? wB.toLowerCase().replace(/n~/g,'ñ').replace(/c'/g,'ç').replace(/&/g,'y') : "—");
                const nC = (wC !== "—" ? wC.toLowerCase().replace(/n~/g,'ñ').replace(/c'/g,'ç').replace(/&/g,'y') : "—");
                const nM = (wM !== "—" ? wM.toLowerCase().replace(/n~/g,'ñ').replace(/c'/g,'ç').replace(/&/g,'y') : "—");
                
                const variants = new Set([nA, nB, nC, nM]);
                const isDiff = variants.size > 1;
                
                const comentari = (notes[i] || "").replace(/"/g, '""');
                csvContent += `${i+1},"${wA}","${wB}","${wC}","${wM}",${isDiff ? "SÍ" : "NO"},"${comentari}"\n`;
            }
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'lazarillo_comparativa.csv';
            link.click();
            mostrarStatus("📊 CSV exportat correctament", "success");
        };

        // ============================================================
        // FUNCIÓ PER RENDERITZAR LA TAULA
        // ============================================================
        function renderTaula() {
            const notes = JSON.parse(localStorage.getItem('notes_lazarillo') || "{}");
            let htmlBody = "";
            
            const normalitzarComparacio = (w) => {
                if (w === "—") return "—";
                return w.toLowerCase()
                    .replace(/n~/g, 'ñ')
                    .replace(/c'/g, 'ç')
                    .replace(/&/g, 'y')
                    .replace(/[.,:;]/g, '');
            };

            for (let i = 0; i < totalRows; i++) {
                const wA = (alBurgos.a[i] !== undefined && alBurgos.a[i] !== null) ? alBurgos.a[i] : "—";
                const wB = (alBurgos.b[i] !== undefined && alBurgos.b[i] !== null) ? alBurgos.b[i] : "—";
                const wC = (alAlcala.b[i] !== undefined && alAlcala.b[i] !== null) ? alAlcala.b[i] : "—";
                const wM = (alMedina.b[i] !== undefined && alMedina.b[i] !== null) ? alMedina.b[i] : "—";

                const nA = normalitzarComparacio(wA);
                const nB = normalitzarComparacio(wB);
                const nC = normalitzarComparacio(wC);
                const nM = normalitzarComparacio(wM);
                
                const variants = new Set([nA, nB, nC, nM]);
                const isDiff = variants.size > 1;
                
                const nota = (notes[i] || "").replace(/</g, '&lt;').replace(/>/g, '&gt;');

                htmlBody += `
                <tr class="${isDiff ? 'diverge' : ''}">
                    <td><span class="num">${i+1}</span> ${wA}</td>
                    <td>${wB}</td>
                    <td>${wC}</td>
                    <td>${wM}</td>
                    <td class="col-comentari">
                        <textarea id="nota-${i}" oninput="guardarNota(${i})" placeholder="Escriu aquí el teu comentari o traducció...">${nota}</textarea>
                    </td>
                </tr>`;
            }
            
            document.getElementById('table-body').innerHTML = htmlBody;
        }

        // ============================================================
        // INICIALITZACIÓ: Carregar comentaris externs automàticament
        // ============================================================
        // Primer renderitzem la taula buida o amb dades locals
        renderTaula();
        
        // Després intentem carregar els comentaris externs (si no n'hi ha al localStorage o sempre)
        // Decisió: només carregar si no hi ha notes prèvies al localStorage
        const notesExistents = localStorage.getItem('notes_lazarillo');
        if (!notesExistents || notesExistents === "{}") {
            carregarComentarisExterns();
        } else {
            // Comprovem si les notes existents són de la versió externa o són locals
            // Per no sobreescriure notes locals, no carreguem automàticament
            console.log("📝 Ja hi ha notes locals guardades. No es carreguen automàticament les externes.");
            mostrarStatus("📝 Notes locals carregades", "info");
        }
        
        // Afegir informació al DOM
        const container = document.querySelector('.container');
        const existingInfo = container.querySelector('.info-box');
        if (!existingInfo) {
            const infoDiv = document.createElement('div');
            infoDiv.className = 'info-box';
            infoDiv.innerHTML = `<strong>📊 Alineació Needleman-Wunsch amb notes externes:</strong> S'han generat <strong>${totalRows}</strong> files alineades.
            <br><strong>🌐 Càrrega automàtica:</strong> Els comentaris es carreguen des de <code>https://rosamartina-si.github.io/Arahoentenc/NH/Lazarillo_comentaris.txt</code>
            <br>Les files <span style="background-color:#ffeccb; padding:2px 6px; border-radius:3px;">🔸 color taronja</span> indiquen divergències textuals entre edicions.`;
            container.insertBefore(infoDiv, container.firstChild);
        }
        
    </script>
