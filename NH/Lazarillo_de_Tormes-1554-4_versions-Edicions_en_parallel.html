        const textAnversRaw = `[fol. 1r] {CB1. LA VIDA DE LAZARILLO DE Tormes, y de sus fortunas y aduersidades. {MIN. {LAT. TVTISSIMA VIRTVS PIETAS HOMINI}} EN ANVERS, En casa de Martin Nucio. 1554. Con Preuilegio Imperial.} [fol. 1v] [fol. 2r] {HD. Prologo. \ 2} {CB1. {IN7.} YO por bien tengo que cosas tan sen~aladas, y por[ ]uentura nunca oydas, ni vistas, vengan a noticia de muchos, y no se entierren en la sepultura del oluido, pues podria ser que alguno que[ ]las lea, halle algo que le agrade. Y alos que no ahondaren tanto: los deleyte, y a este proposito, dize Plinio: que no ay libro por malo que sea, que no tenga alguna cosa buena. Mayorme<n>te que los gustos no son todos vnos, mas lo que vno no come, otro se pierde por ello. Y assi vemos cosas tenidas en poco de algunos, que de otros no lo son, y esto para que ninguna cosa se deuria romper, ni echar a mal si muy detestable no fuesse sino que a todos se comunicasse mayormente siendo sin perjuyzio, y pudiendo sacar della algu<n> fruto: porque si assi no fuesse, muy pocos escriuiria<n> para vno solo pues no se haze sin trabajo. Y quieren ya que lo passan, ser recompensados no con dineros, mas con q<ue> vean y lean sus obras, y si ay de} {CW. A 2 qu} [fol. 2v] {HD. PROLOGO.} {CB1. que se las alaben. Y a este proposito dize Tullio, la honrra cria las artes. Quien piensa quel soldado que es primero del escala, tiene mas aborrecido el biuir? no por cierto, mas el desseo de alabanc'a le haze ponerse al peligro, y assi en las artes y letras es lo mismo. Predica muy bien el presentado, y es hombre que dessea mucho el prouecho delas animas, mas pregunten a su merced si le pesa quando le dizen. O q<ue> marauillosamente lo ha hecho vuestra reuerencia. Iusto muy ruynmente el sen~or don Fulano, y dio el sayete de armas al truhan, porque lo loaua de auer lleuado muy buenas lanc'as, que hiziera si fuera verdad? y todo va desta manera, que confessando yo no ser mas santo que mis vezinos, desta no(u)[n]ada que en este grossero pues el Euangelio los llama bienauenturados. En este tiempo se hizo cierta armada contra Moros, entre los quales fue mi padre que ala sazon estaua desterrado por el desastre ya dicho, con cargo de azemilero de vn cauallero que alla fue, y con su sen~or como leal criado fenecio su vida. Mi biuda madre como sin marido y sin abrigo se viesse, determino arrimarse alos buenos por ser vno dellos, y vinose a biuir ala ciudad, y alquilo vna casilla y metiase a guisar de comer a ciertos estudiantes, y lauaua la ropa a ciertos moc'os de cauallos del comendador dela Magdalena. De manera que fue frequenta<n>do las cauallerizas, ella y vn hombre Moreno de aquellos que las bestias curauan vinieron en conocimiento, este algunas vezes se venia a nuestra casa, y se yua ala man~ana, otras vezes de dia llegaua ala puerta en achaque de comprar hueuos y entrauase en casa. Yo al principio de su entrada pesaua me con el, y auiale miedo viendo el color y mal} {CW. gesto} [fol. 5r] {HD. PRIMERO \ 5} {CB1. gesto que tenia. Mas de que vi que con su venida mejoraua el comer, fuy le queriendo bien, porque siempre traya pan: pedac'os de carne, y enel inuierno len~os a que nos calentauamos. De manera que continuando la posada y conuersacion, mi madre vino a darme vn negrito muy bonito, el qual yo brincaua y ayudaua a callentar. Y acuerdo me que estando el negro de mi padrastro, trebejando con el moc'uelo, como el nin~o via a mi madre y a mi blancos, y a el no, huya del con miedo para mi madre, y sen~alando con el dedo, dezia: Madre coco. Respondio el riendo Hideputa. Yo aunque bien mochacho note aquella palabra de mi hermanico y dixe entre mi: Quantos deue de auer enel mundo, que huyen de otros, porque no se veen a si mismos. Quiso nuestra fortuna que la conuersacion de Zayde que assi se llamaua, llego a oydos del mayordomo, y hecha pesquisa hallose que la mitad por medio dela ceuada que para las bestias le dauan hurtaua y saluados, len~a, almohac'as, mandiles, y las mantas, y sauanas delos cauallos hazia perdidas, y quando otra cosa no} {CW. A 5 tenia} [fol. 5v] {HD. TRACTADO +} {CB1. tenia las bestias desherraua, y con todo esto acudia a mi madre para criar a mi hermanico. No nos marauillemos de vn clerigo, ni de vn frayle porque el vno hurta delos pobres y el otro de casa para sus deuotas y para ayuda de otro tanto, quando a vn pobre esclauo el amor le animaua a esto, y prouose le quanto digo, y aun mas, porque a mi con amenazas me preguntauan, y como nin~o respondia, y descubria quanto sabia con miedo hasta ciertas herraduras que por mandado de mi madre a vn herrero vendi. Al triste de mi padrastro ac'otaron y pringaron, y a mi madre pusieron p(o)[e]na por justicia sobre el acostumbrado centenario, que en casa del sobredicho comendador no entrasse, ni al lastimado Zayde en la suya acogiesse, por no echar la soga tras el caldero, la triste se esforc'o y cu<m>plio la sentencia, y por euitar peligro, y quitarse de malas lenguas se fue a seruir alos que al presente biuian enel meson dela Solana, y alli padesciendo mil importunidades se acabo de criar mi hermanico, hasta que supo andar, y a mi hasta ser buen moc'uelo, que yua alos huespedes por vino,} {CW. y} [fol. 6r] {HD. PRIMERO \ 6} {CB1. y candelas, y por lo de( )mas que me mandauan. En este tiempo vino a posar al meson vn ciego, el qual pareciendole que yo seria para adestralle, me pidio a mi madre, y ella me encomendo a el, diziendole como era hijo de vn buen hombre. El qual por ensalc'ar la fe, auia muerto en la delos Gelues, y que ella confiaua en Dios, no saldria peor hombre que mi padre, y que le rogaua me tratasse bien y mirasse por mi, pues era huerfano. El respondio que assi lo haria, y que me recibia no por moc'o, sino por hijo. Y assi le comenc'e a seruir, y adestrar a mi nuevo y viejo amo. Como estuuimos en Salama<n>ca algunos dias, paresciendole a mi amo que no era la ganancia a su contento, determino yrse de alli. Y quando nos vuimos de partir, yo fuy a ver a mi madre, y ambos llorando me dio su bendicion, y dixo: Hijo ya se que no te vere mas, procura de ser bueno, y Dios te guie, criado te he y co<n> buen amo te he puesto, vale te por ti, y assi me fuy para mi amo que esperando me estaua. Salimos de Salamanca y llegando ala puente, esta ala entrada della vn ani-mal} {CW. A 6 mal} [fol. 6v] {HD. TRACTADO +} {CB1. de piedra que casi tiene forma de toro, y el ciego mandome que llegasse cerca del animal, y alli puesto, me dixo: Lazaro llega el oydo a este toro y oyras gran ruydo dentro del. Yo simplemente llegue creyendo ser assi, y como sintio que tenia la cabec'a par dela piedra: afirmo rezio la mano, y dio me vna gran calabac'ada enel diablo del toro que mas de tres dias me (t)[d]uro el dolor dela cornada, y dixo me: Necio aprende que el moc'o del ciego vn punto ha de saber mas que el diablo, y rio mucho la burla. Paresciome que en aquel instante d(i)[e]sperte dela simpleza, en que como nin~o dormido estaua, dixe entre mi: verdad dize este, que cumple abiuar el ojo y auisar pues solo soy, y pensar como me sepa valer. Comenc'amos nuestro camino y en muy pocos dias me mostro jerigonc'a, y como me viesse de buen ingenio: holgauase mucho y dezia. Yo oro, ni plata no te lo puedo dar, mas auisos para biuir muchos te mostrare: y fue assi que despues de Dios este me dio la vida, y siendo ciego me alumbro y adestro en la carrera de biuir. Huelgo de} {CW. con-} [fol. 7r] {HD. PRIMERO. \ 7} {CB1. contar a V<uestra> M<erced> estas nin~erias para mostrar quanta virtud sea saber los hombres subir siendo baxos: y dexarse baxar siendo altos, quanto vicio. Pues tornando al bueno de mi ciego, y co<n>tando sus cosas. V<uestra> M<erced> sepa que desde que Dios crio el mundo: ninguno formo mas astuto ni sagaz, en su oficio era vn aguila: ciento y tantas oraciones sabia de coro, vn tono baxo reposado y muy sonable que hazia resonar la yglesia donde rezaua, vn rostro humilde y deuoto que con muy buen continente ponia quando rezaua, sin hazer gestos ni visajes, con boca ni ojos, como otros suelen hazer. Allende desto, tenia otras mil formas y maneras para sacar el dinero, dezia saber oraciones para muchos y diuersos efectos para mugeres que no parian, para las que estauan de parto, para las que eran mal casadas que sus maridos las quisiessen bien. Echaua pronosticos alas pren~adas si trayan hijo o hija. Pues en caso de Medicina, dezia Galeno no supo la mitad que el, para muelas, desmayos, males de madre. Finalmente nadie le dezia [pa]decer alguna passion, que luego no} {CW. A 7 le} [fol. 7v] {HD. TRACTADO +} {CB1. le dezia hazed esto, hareys estotro, cosed tal yerua, tomad tal rayz. Con esto andauase todo el mundo tras el, especialmente mugeres, que quanto les dezia creyan, destas sacaua el grandes prouechos con las artes que digo, y ganaua mas en vn mes que cien ciegos en vn an~o. Mas tambien quiero que sepa Vuestra Merced, que con todo lo que adquiria, y tenia, jamas tan auariento, ni mezquino hombre no vi, tanto, que me mataua a mi de hambre, y assi no me remediaua de lo necessario. Digo verdad si con mi sotileza y buenas man~as no me supiera remediar, muchas vezes me finara de hambre, mas con todo su saber y auiso, le contaminaua de tal suerte, que siempre, o las mas vezes me cabia lo mas y mejor. Para esto le hazia burlas endiabladas, delas quales contare algunas, aunque no todas a mi saluo. El traya el pan, y todas las otras cosas en vn fardel de lienc'o, que por la boca se cerraua, con vna argolla de hierro y su candado y llaue, y al meter delas cosas, y sacarlas, era con tanta vigilancia, y tan por contadero, que no bastara todo} {CW. el} [fol. 8r] {HD. PRIMERO. \ 8} {CB1. el mundo hazerle menos vna migaja, mas yo tomaua aquella lazeria que el me daua, la qual en menos de dos bocados era despachada, despues que cerraua el candado y se descuydaua pensando que yo estaua entendiendo en otras cosas, por vn poco de costura que muchas vezes del vn lado del fardel descosia y tornaua a coser, sangraua el auariento fardel sacando no p tuorios que rezamos, a costa agena comia como lobo y beuia mas que vn saludador, y porque di(z)[x]e mortuorios, Dios me perdone que jamas fuy enemigo dela naturaleza humana sino entonces, y esto era porque comiamos bien y me hartauan, desseaua y aun rogaua a Dios que cada dia matasse el suyo. Y quando dauamos sacramento alos enfermos, especialmente la extrema vncion, como manda el clerigo rezar alos que estan} {CW. alli,} [fol. 17r] {HD. SEGVNDO. \ 17} {CB1. alli, yo cierto no era el postrero dela oracion, y con todo mi corac'on y buena voluntad rogaua al sen~or, no que le echasse ala parte que mas seruido fuesse ((como se suele dezir)) mas que le lleuasse deste mundo, y quando alguno destos escapaua ((Dios me lo perdone)) que mil vezes le daua al diablo, y el que se moria otras tantas bendiciones lleuaua de mi dichas, porque en todo el tiempo que alli estuue que serian quasi seys meses, solas veynte personas fallecieron, y estas bien creo que las mate yo, o por mejor dezir murieron a mi requesta, porque viendo el sen~or mi rauiosa y continua muerte, pie<n>so que holgaua de matarlos por darme a mi vida, mas delo que al presente padecia, remedio no hallaua, q<ue> si el dia que enterrauamos yo biuia, los dias que no auia muerto, por quedar bien vezado dela hartura, tornando a mi quotidiana ha<m>bre, mas lo sentia. De manera que en nada hallaua desca<n>so, saluo en la muerte, que yo ta<m>bien para mi como para los otros desseaua algunas vezes, mas no la via aun que estaua siempre en mi. Pense muchas vezes yrme de aquel mezquino} {CW. B 5 amo,} [fol. 17v] {HD. TRACTADO +} {CB1. amo, mas por dos cosas lo dexaua. La primera por no me atreuer a mis piernas por temer de la flaqueza que de pura hambre me venia. Y la otra, co<n>sideraua y dezia. Yo he tenido dos amos, el primero traya me muerto de hambre, y dexandole tope co<n> estotro que me tiene ya con ella en la sepultura, pues si deste desisto y doy en otro mas baxo, que sera sino fenecer? Con esto no me osaua menear, porque tenia por fe, que todos los grados auia de hallar mas ruynes. Y a abaxar otro pu<n>to no sonara Lazaro, ni se oyera enel mundo. Pues estando en tal afliccion, qual plega al sen~or librar della a todo fiel Christiano, y sin saber darme consejo, viendome yr de mal en peor, vn dia qual cuytado, ruyn, y lazerado de mi amo auia ydo fuera del lugar llego se a( )caso a mi puerta vn calderero, el qual yo creo que fue Angel embiado a mi por la mano de Dios en aquel habito, pregu<n>tome si tenia algo q<ue> adobar, en mi teniades bien que hazer, y no hariades poco si me remediassedes, dixe passo que no me oyo, mas como no era tiempo de gastarlo en dezir gracias, alumbrado por el Espiritu santo,} {CW. le} [fol. 18r] {HD. SEGVNDO. \ 18} {CB1. le dixe. Tio vna llaue deste arte he perdido, y temo mi sen~or me ac'ote, por vuestra vida veays si en estas q<ue> traeys ay algunas que le haga, que yo os lo pagare. Comenc'o a prouar el angelico calderero vna y otra de vn gran sartal que dellas traya, y yo ayudalle con mis flacas oraciones, quando no me cato veo en figura de panes, como dizen la cara de Dios dentro del arcaz, y abierto dixele. Yo no tengo dineros que os dar por la llaue, mas tomad de ay el pago. El tomo vn bodigo de aquellos el que mejor le parecio, y dandome mi llaue se fue muy contento, dexandome mas a mi. Mas no toque en nada por el presente, porque no fuesse la falta sentida, y aun porque me vi de tanto bien sen~or, pareciome que la hambre no se me osaua llegar. Vino el misero de mi amo, y quiso Dios no miro en la oblada quel Angel auia lleuado. Y otro dia en saliendo de casa abro mi parayso panal, y tomo entre las manos y dientes vn bodigo, y en dos credos le hize inuisible, no se me oluidando el arca abierta, y comienc'o a barrer la casa con mucha alegria} {CW. B 6 pa-} [fol. 18v] {HD. TRACTADO +} {CB1. paresciendome con aquel remedio, remediar dende en adelante la triste vida. Y assi estuue con ello aquel dia, y otro gozoso, mas no estaua en mi dicha que me durasse mucho aquel descanso, porque luego al tercero dia me vino la terciana derecha, y fue q<ue> veo a deshora al que me mataua de hambre, sobre nuestro arcaz boluiendo y reuoluiendo, contando y tornando a contar los panes. Yo dissimulaua y en mi secreta oracion y deuociones y plegarias dezia: sant Iuan y ciegale. Despues que estuuo vn gran rato echando la cuenta por dias y dedos contando, dixo. Si[ ]no tuuiera a tan buen recaudo esta arca: yo dixera q<ue> me auian tomado della panes, pero de oy mas solo por cerrar puerta ala sospecha, quiero tener buena cuenta con ellos, nueue quedan y vn pedac'o. Nueuas malas te de Dios ((dixe yo entre mi)) pareciome con lo que dixo passarme el corac'on con saeta de montero, y comenc'ome el estomago a escaruar de hambre, viendo se puesto enla dieta passada. Fue fuera de casa, yo por consolarme abro el arca y como vi el pan comencelo de adorar ((no osando rece-billo))} {CW. billo} [fol. 19r] {HD. SEGVNDO. \ 19} {CB1. contelos, si a dicha el lazerado se errara, y halle su cuenta mas verdadera que yo quisiera. Lo mas que yo pude hazer, fue dar en ellos mil besos, y lo mas delicado q<ue> yo pude, del partido parti vn poco al pelo que el estaua, y con aquel passe aquel dia no tan alegre como el passado, mas como la hambre creciesse, mayormente que tenia el estomago hecho a mas pan, aquellos dos, o tres dias ya dichos, moria mala muerte, tanto que otra cosa no hazia en viendo me solo, sino abrir y cerrar el arca y contemplar en aquella cara de Dios ((que assi dizen los nin~os)) mas el mismo Dios que socorre alos afligidos viendo me en tal estrecho, truxo a mi memoria vn pequen~o remedio, que considerando entre mi dixe. Este arqueton es viejo y grande y roto por algunas partes aunque pequen~os agujeros, puede se pensar que ratones entrando enel, hazen dan~o a este pan, sacarlo entero no es cosa conueniente, porq<ue> vera la falta el que en tanta me haze biuir. Esto bien se sufre, y comienc'o a desmigajar el pan sobre vnos no muy costosos as dio fin a sus obras, diziendo. Agora donos traydores ratones, conuiene os mudar proposito que en esta casa mala medra teneys. De que salio de su casa, voy a ver la obra, y halle que no dexo en la triste y vieja arca agujero, ni aun por donde le pudiesse entrar vn moxquito, abro con mi desaprouechada llaue sin esperanc'a de sacar prouecho y vi} {CW. los} [fol. 20v] {HD. TRACTADO +} {CB1. los dos o tres panes comenc'ados los que mi amo creyo ser ratonados y dellos todauia saque alguna lazeria, tocandolos muy ligeramente a vso de esgremidor diestro, como la necessidad sea tan gran maestra, viendome con tanta siempre noche y dia estaua pensando la manera que ternia en sustentar el biuir, y pienso para hallar estos negros remedios, que me era luz la hambre, pues dizen que el ingenio con ella se auisa, y al contrario con la hartura, y assi era por cierto en mi. Pues estando vna noche desuelado en este pensamiento pensando como me podria valer y aprouechar me del arcaz, sinti que mi amo dormia, porque lo mostraua con roncar y en vnos resoplidos grandes que daua quando estaua durmiendo, leuanteme muy quedito, y auiendo enel dia pensado lo que auia de hazer, y dexado vn cuchillo viejo que por alli andaua en parte do[ ]le hallasse, voy me al triste arcaz, y por do auia mirado tener menos defensa, le acometi conel cuchillo que a manera de barreno del vse, y como la antiquissima arca por ser de tantos an~os la hallasse sin fuerc'a y corac'on} {CW. antes} [fol. 21r] {HD. SEGVNDO. \ 21} {CB1. antes muy blanda y carcomida, luego se me rindio y consintio en su costado por mi remedio vn buen agujero. Esto hecho, abro muy passo la llagada arca y al tiento del pan que halle partido hize segun de yuso esta escripto, y con aquello algun tanto consolado tornando a cerrar me bolui a mis pajas en las quales repose y dormi vn poco, lo qual yo hazia mal y echaualo al no comer, y assi seria, porque cierto en aquel tiempo no me deuian de quitar el suen~o los cuydados del Rey de Fra<n>cia. Otro dia fue por el sen~or mi amo visto el dan~o assi del pan como del agujero que yo auia hecho, y comenc'o a dar al diablo los ratones y dezir. Que diremos a esto? nunca auer sentido ratones en esta casa sino agora, y sin duda deuia de dezir verdad, porque si casa auia de auer en el reyno justamente dellos preuilegiada, aquella de razon auia de ser, porque no suelen morar donde no ay que comer. Torna a buscar clauos por la casa y por las paredes y tablillas a ataparse los. Venida la noche y su reposo, luego yo era puesto en pie con mi aparejo, y qua<n>tos el tapaua de dia, destapaua yo de} {CW. noche} [fol. 21v] {HD. TRACTADO +} {CB1. noche. En tal manera fue y tal priessa nos dimos, que sin duda, por esto se deuio dezir, donde vna puerta se cierra otra se abre, finalme<n>te pareciamos tener a destajo la tela de Penelope, pues quanto el texia de dia, rompia yo de noche, y en pocos dias y noches pusimos la pobre dispensa de tal forma que quien quisiera propriamente della hablar, mas corac'as viejas de otro tiempo que no arcaz la llamara segun la clauazon y tachuelas sobre si tenia. De que vio no le aprouechar nada su remedio, dixo: Este arcaz esta tan mal tratado y es de madera tan vieja y flaca que no aura raton a[ ]quien se defienda, y va ya tal que si andamos mas con el, nos dexara sin guarda, y aun lo peor que aunque haze poca todauia hara falta faltando, y me pondra en costa de tres o quatro reales. El mejor remedio que hallo, pues el de hasta aqui no aprouecha, armare por de dentro a estos ratones malditos. Luego busco prestada vna ratonera, y con cortezas de queso que a los vezinos pedia, contino el gato estaua armado dentro del arca, lo qual era para mi singular auxilio, porque} {CW. pues-} [fol. 22r] {HD. SEGVNDO. \ 22} {CB1. puesto caso que yo no auia menester muchas salsas para comer, todauia me holgaua con las cortezas del queso que dela ratonera sacaua, y sin esto no perdonaua el ratonar del bodigo. Como hallasse el pan ratonado, y el queso comido y no cayesse el raton que lo comia daua se al diablo, preguntaua alos vezinos que podria ser comer el queso y sacarlo dela ratonera, y no caer ni quedar dentro el raton y hallar cayda la trampilla del gato, acordaron los vezinos no ser el raton el que este dan~o hazia, porque no fuera menos de auer caydo alguna vez, dixole vn vezino. En vuestra casa yo me acuerdo que solia andar vna culebra, y esta deue de ser sin duda, y lleua razon que como es larga, tiene lugar de tomar el ceuo, y aunque la coja la trampilla encima como no entre toda dentro, tornase a[ ]salir. Quadro a todos lo que aquel dixo, y altero mucho a mi amo, y dende en adelante no dormia tan a suen~o suelto, que qualquier gusano dela madera que de noche sonasse, pensaua ser la culebra que le roya el arca, luego era puesto en pie y con vn garrote} {CW. que} [fol. 22v] {HD. TRACTADO +} {CB1. que ala cabecera ((desde que aquello le dixeron)) ponia, daua en la pecadora del arca grandes garrotazos pensando espantar la culebra. Alos vezinos despertaua conel estruendo que hazia y a mi no dexaua dormir, yua se a mis pajas y trastornaualas y a mi con ellas pensando que se yua para mi y se emboluia en mis pajas o en mi sayo, porque le dezian que de noche acaescia a estos animales, buscando calor yrse a las cunas donde estan criaturas, y aun mordellas y hazerles peligrar. Yo las mas vezes hazia del dormido y en la man~ana dezia me el. Esta noche moc'o no sentiste nada? pues tras la culebra anduue y aun pienso se ha de yr para ti ala cama que son muy frias y buscan calor. Plega a Dios que no me muerda ((dezia yo)) que harto miedo le tengo, desta manera andaua tan eleuado y leuantado del suen~o que mi fe la culebra o el culebro por mejor dezir, no osaua roer de noche, ni leuantarse al arca, mas de dia mientra estaua en la yglesia, o por el lugar hazia mis saltos, los quales dan~os viendo el y el poco remedio q<ue> les podia poner, andaua de noche ((como digo)) hecho trasgo, yo} {CW. vue} [fol. 23r] {HD. SEGVNDO. \ 23} {CB1. vue miedo que con aquellas diligencias no me topasse con la llaue que de baxo delas pajas tenia, y pareciome lo mas seguro metella de noche en la boca, porque ya desde que biui conel ciego la tenia tan hecha bolsa que me acaescio tener enella doze, o quinze marauedis todo en medias blancas sin que me estoruasse el comer, porque de otra manera no era sen~or de vna blanca quel maldito ciego no cayesse con ella, no dexando costura ni remiendo que no me buscaua muy a[ ]menudo. Pues assi como digo, metia cada noche la llaue en la boca y dormia sin recelo que el bruxo de mi amo cayesse con ella, mas quando la desdicha ha de venir, por de( )mas es dilige<n>cia. Quisieron mis hados, o ((por mejor dezir)) mis pecados, que vna noche que estaua durmiendo, la llaue se me puso en la boca que abierta deuia tener, de tal manera y postura, quel ayre y resoplo que yo durmiendo echaua, salia por lo hueco dela llaue ((que de can~uto era)) y siluaua ((segun mi desastre quiso)) muy rezio, de tal manera, que el sobre saltado de mi amo lo oyo, y creyo sin duda ser el siluo dela culebra, y cier-to} {CW. to} [fol. 23v] {HD. TRACTADO +} {CB1. lo deuia parecer, leuanto se muy passo con su garrote en la mano, y al tiento y sonido dela culebra se llego a mi con mucha quietud por no ser sentido dela culebra. Y como cerca se vio, penso que alli en las pajas do yo estaua echado al calor mio se auia venido, leuantando bien el palo, pensando tener la debaxo y darle tal garrotazo que la matasse, con toda su fuerc'a me de(l)[s]carg(a)[o] en la cabec'a tan gran golpe, que sin ningun sentido y muy mal descalabrado me dexo. Como sintio que me auia dado, segun yo deuia hazer gran sentimiento con el fiero golpe, contaua el que se auia llegado a mi, y dando me grandes bozes llamando me, procuro recordar me, mas como me tocasse con las manos, tento la mucha sangre que se me yua, y conocio el dan~o que me auia hecho, y con mucha priessa fue a buscar lumbre, y llegando con ella hallo me quexando todauia con mi llaue en la boca, que nunca la desampare, la mitad fuera bien de aquella manera, que deuia estar al tiempo que siluaua co<n> ella. Espa<n>tado el matador de culebras, que podria ser aquella llaue, miro la, sacan-dome} {CW. do} [fol. 24r] {HD. SEGVNDO. \ 24} {CB1. la del todo dela boca, y vio lo que era, porque en las guardas nada dela suya difere<n>ciaua, fue luego a proualla y con ella prouo el maleficio. Deuio de dezir el cruel cac'ador, el raton y culebra que me dauan guerra y me comian mi hazienda he hallado. Delo que succedio en aquellos tres dias siguientes ninguna fe dare, porque los tuue enel vientre dela vallena, mas de como esto que he contado, oy ((despues que en mi torne)) dezir a mi amo, el qual a quantos alli venian, lo contaua por extenso. A cabo de tres dias yo torne en mi sentido y vime echado en mis pajas, la cabec'a toda emplastada, y llena de azeytes y vnguentos, y espantado dixe que es esto? Respondio me el cruel sacerdote. A fe que los ratones y culebras que me destruyan, ya los he cac'ado, y mire por mi, y vi me tan mal tratado que luego sospeche mi mal. A esta hora entro vna vieja que ensalmaua y los vezinos, y comienc'an me quitar trapos dela cabec'a y curar el garrotazo y como me hallaron buelto en mi sentido holgaron se mucho, y dixeron: pues ha torna-do} {CW. do} [fol. 24v] {HD. TRACTADO +} {CB1. en su acuerdo plazera a Dios no sera nada. Ay tornaron de nueuo a contar mis cuytas y a reyrlas y yo pecador a llorarlas. Con todo esto dieron me de comer que estaua transido de hambre y a( )penas me pudieron demediar, y assi de poco en poco alos quinze dias me leuante y estuue sin peligro, mas no sin hambre y medio sano. Luego otro dia que fuy leuantado, el sen~or mi amo me tomo por la mano, y sacome la puerta fuera, y puesto en la calle, dixo me. Lazaro de oy mas eres tuyo, y no mio, busca amo y vete con Dios que yo no quiero en mi compan~ia tan diligente seruidor, no es possible sino que ayas sido moc'o de ciego, y santiguando se de mi, c cio<n> si acabaua antes que yo, se comediria a ayudarme alo que me quedasse, y con esto acabamos casi a vna. Comenc'o a sacudir co<n> las manos vnas pocas de migajas, y bien menudas que en los pechos se le auia<n> quedado, y entro en vna cam(a)[e]reta que alli estaua, y saco vn jarro desbocado, y no muy nueuo, y desque vuo beuido combido me con el, yo por hazer del continente dixe, sen~or no beuo vino. Agua es ((me respondio)) bien puedes beuer. Entonces tome el jarro y beui no mucho, porque de sed no era mi co<n>goxa. Assi estuuimos hasta la noche hablando en cosas que me preguntaua, alas quales yo le respondi lo mejor que supe. En este tiempo metiome en la camara donde estaua el jarro de que beuimos, y dixome: Moc'o para te alli, y veras como hazemos esta cama para que la sepas hazer de aqui adela<n>te. Puse me de vn cabo y el del otro, y hezimos la negra cama, en la qual no auia mucho que hazer, porque ella tenia sobre vnos bancos vn can~izo, sobre el qual estaua tendida la ropa que por} {CW. no} [fol. 28r] {HD. TERCERO. \ 28} {CB1. no estar muy continuada a lauar se no parecia colchon, aunque seruia del, con harta menos lana que era menester, aquel tendimos haziendo cuenta de ablandalle, lo qual era impossible, porque delo duro mal se pued(o)[e] hazer blando, el diablo del enxalma maldita la cosa tenia dentro de si, que puesto sobre el can~izo todas las can~as se sen~alauan y parecian alo proprio entre cuesto de flaquissimo puerco, y sobre aquel hambriento colchon vn alfamar del mismo jaez del qual el color yo no pude alcanc'ar. Hecha la cama y la noche venida dixo me. Lazaro ya es tarde y de aqui ala plac'a ay gran trecho, tambien en esta ciudad andan muchos ladrones que siendo de noche capean, passemos como podamos, y man~ana veniendo el dia Dios hara merced, porque yo por estar solo no estoy proueydo, antes he comido estos dias por alla fuera, mas agora hazer lo hemos de otra manera. Sen~or de mi ((dixe yo)) ninguna pena tenga. V<uestra> M<erced> que bien se passar vna noche, y aun mas si es menester sin comer. Biuiras mas sano me respondio, porque como} {CW. C 4 dezia-} [fol. 28v] {HD. TRACTADO +} {CB1. deziamos oy, no ay tal cosa enel mundo para biuir mucho, que comer poco. Si por essa via es, dixe entre mi, nu<n>ca yo morire que siempre he guardado essa regla por fuerc'a, y aun espero en mi desdicha a tenella toda mi vida. Y acostose en la cama poniendo por cabecera las calc'as, y el jubon, y mandome echar a sus pies, lo qual yo hize, mas maldito el suen~o que yo dormi, porq<ue> las can~as y mis salidos huessos en toda la noche dexaron de rifar y encenderse, que con mis trabajos, males, y hambre pienso q<ue> en mi cuerpo no auia libra de carne, y tambien como aquel dia no auia comido casi nada rauiaua de hambre ((la qual conel suen~o no tenia amistad)) maldixeme mil vezes ((Dios me lo perdone)) y a mi ruyn fortuna, alli lo mas dela noche y lo peor no osandome reboluer por no despertalle pedi a Dios muchas vezes la muerte. La man~ana venida leuantamonos y comienc'a a limpiar, y sacudir sus calc'as y jubon, sayo y capa, y yo que le seruia de pelillo, y vistese me muy a su plazer de espacio, echele aguamanos, peynose y pusose su espada enel talauarte, y al tiempo que la} {CW. ponia} [fol. 29r] {HD. TERCERO. \ 29} {CB1. ponia, dixome. O si supiesses moc'o que piec'a es esta, no ay marco de oro enel mundo, porque yo la diesse, mas assi ninguna de quantas Antonio hizo, no acerto a ponelle los azeros tan prestos como esta los tiene, y sacola de la vayna y tento la con los dedos, diziendo. Ves la aqui, yo me obligo con ella cercenar vn copo de lana. Y yo dixe entre mi y yo con mis dientes ((aunque no son de azero)) vn pan de quatro libras. Torno la a meter y cin~o sela y vn sartal de cuentas gruessas del talauarte y con vn passo sossegado y el cuerpo derecho haziendo co<n> el y con la cabec'a muy gentiles meneos, echa<n>do el cabo dela capa sobre el ombro y a vezes so el brac'o, y ponie<n>do la mano derecha enel costado, sal uar que, por aquellas frescas riberas, con confianc'a que no ha de faltar quien se lo de segun las tienen puestas en esta costumbre aquellos hidalgos del lugar. Y como digo el estaua entre ellas hecho vn Macias, diziendoles mas dulc[']uras que Ouidio escriuio. Pero como sintieron del que estaua bien enternecido, no se les hizo de verguenc'a pedirle de almorzar con el acostumbrado pago. El sintiendose tan frio de bolsa quanto caliente del estomago tomole tal calofrio que le robo la color del gesto, y comenc'o a turbar se en la platica, y a poner excusas no validas. Ellas que deuian ser bien instituydas, como le sintieron} {CW. B 6 la} [fol. 30v] {HD. TRACTADO +} {CB1. la enfermedad dexaron le para el que era. Yo que estaua comiendo ciertos tronchos de verc'as, con las quales me desayune con mucha diligencia, como moc'o nueuo sin ser visto de mi amo torne a casa, dela qual pense barrer alguna parte que bien era menester, mas no halle con q[<ue>], puse me a pensar que haria, y paresciome esperar a mi amo hasta que el dia demediasse, y si viniesse, y por[ ]uentura traxesse algo que comiessemos, mas en vano fue mi experiencia, desque vi ser las dos y no venia. Y la hambre me aquexaua, cierro mi puerta y pongo la llaue do mando y torno me a mi menester con baxa y enferma boz y inclinadas mis manos en los senos puesto Dios ante mis ojos, y la lengua en su nombre, comienc'o a pedir pan por las puertas y casas mas gra[n]des que me parecia, mas como yo este oficio le vuiesse mamado en la leche, quiero dezir que con el gran maestro el ciego lo aprendi, tan suficiente discipulo sali, que aunque en este pueblo no auia charidad ni el an~o fuesse muy abundante tan buena man~a me di, que antes que el relox diesse las quatro, ya yo tenia otras} {CW. tantas} [fol. 31r] {HD. TERCERO. \ 31} {CB1. tantas libras de pan ensiladas enel cuerpo, y mas de otras dos en las mangas y senos. Boluime ala posada, y al passar por la triperia, pedi a vna de aquellas mugeres, y dio me vn pedac'o de vn~a de vaca con otras pocas de tripas cozidas. Quando llegue a casa, ya el bueno de mi amo estaua enella, doblada su capa y puesta enel poyo, y el passeando se por el patio, como entre, vino se para mi, pense que me queria ren~ir la tardanc'a, mas mejor lo hizo Dios. Pregunto me do venia, yo le dixe. Sen~or hasta que dio las dos estuue aqui, y de que vi que V<uestra> M<erced> no venia, fuy me por essa ciudad a encomendarme alas buenas gentes, y han me dado esto que veys, mostre le el pan y las tripas que en vn cabo dela halda traya, alo qual el mostro buen semblante, y dixo. Pues esperado te he a comer, y de que vi que no veniste, comi. Mas tu hazes como hombre de bien en esso, que mas vale pedillo por Dios que no hurtalle. Y assi el me ayude como ello me paresce bien, y solamente te encomiendo, no sepan que biues comigo, por lo que toca a mi honrra, aunque bie<n> creo que} {CW. C 7 sera} [fol. 31v] {HD. TRACTADO +} {CB1. sera secreto segun lo poco que en este pueblo soy conoscido, nunca a el yo vuiera de venir. Desso pierda sen~or cuydado, le dixe yo, que maldito aquel que ninguno tiene de pedirme essa cuenta, ni yo de dalla, agora pues come pecador que ((si a Dios plaze)) presto nos veremos sin necessidad, aunque te digo, que despues que en esta casa entre, nunca bien me ha ydo, deue ser de mal suelo, que ay casas desdichadas y de mal pie, que alos que biuen en ellas pegan la desdicha, esta deue de ser sin duda dellas, mas yo te prometo, acabado el mes no quede en ella, aunque me la den por mia. Sente me al cabo del poyo, y porque no me tuuiesse por gloton, calle la merienda, y comienc'o a cenar y morder en mis tripas, y pan, y dissimuladamente miraua al desuenturado sen~or mio, que no partia sus ojos de mis faldas que aquella sazon seruian de plato. Tanta lastima aya Dios de mi como yo auia del, porque senti lo que sentia, y muchas vezes auia por ello passado, y passaua cada dia. Pensaua si seria bien comedirme a combidalle, mas por me auer di-cho} {CW. cho} [fol. 32r] {HD. TERCERO. \ 32} {CB1. que auia comido, temia me no acceptaria el combite. Finalmente yo desseaua quel pecador ayudasse a su trabajo del mio, y se desayunasse como el dia antes hizo, pues auia mejor aparejo por ser mejor la vianda y menos mi hambre, quiso Dios cumplir mi desseo, y aun pienso que el suyo, porque como comence a comer el se andaua passeando, llegose a mi, y dixo me. Digo te Lazaro, que tienes en comer la mejor gracia que en mi vida vi a hombre, y que nadie te lo vee hazer, que no le pongas gana aunque no la tenga. La muy buena q<ue> tu tienes ((dixe yo entre mi)) te haze parecer la mia hermosa, con todo parescio me ayudarle, pues se ayudaua, y me abria camino para ello, y dixele, sen~or el buen aparejo haze buen artifice, este pan esta sabrosissimo, y esta vn~a de vaca tambien cozida y sazonada, que no aura a quien no combide con su sabor. Vn~a de vaca es? Si sen~or. Digo te que es el mejor bocado del mu<n>do, y que no ay Faysan que assi me sepa. Pues prueue sen~or y vera que tal esta. Pongole en las vn~as la otra y tres o quatro raciones de pan delo mas blanco, assentose} {CW. me} [fol. 32v] {HD. TRACTADO +} {CB1. me al lado y comienc'a a comer como aquel que lo auia gana royendo cada huessecillo de aquellos, mejor que vn galgo suyo lo hiziera, con almodrote ((dezia)) es este singular manjar, con mejor salsa lo comes tu, respondi yo passo, por Dios que me ha sabido como si[ ]no vuiera oy comido bocado. Assi me vengan los buenos an~os como es ello, dixe yo entre mi. Pidiome el jarro del agua, y di selo como lo auia traydo: es sen~al, que pues no le faltaua el agua, que no le auia a mi amo sobrado la comida, beuimos y muy co<n>tentos nos fuymos a dormir como la noche passada. Y por euitar prolixidad, desta manera estuuimos ocho, o diez dias, yendo se el pecador en la man~ana con aquel contento, y passo contado, a papar ayre por las calles, teniendo enel pobre Lazaro vna cabec'a de lobo. Contemplaua yo muchas vezes mi desastre, que escapando delos amos ruynes que auia tenido, y buscando mejoria, viniesse a topar con quien no solo [no] me mantuuiesse, mas a quien yo auia de mantener. Con todo le queria bien con ver, que no tenia ni podia mas, y antes le auia las-tima} {CW. tima} [fol. 33r] {HD. TERCERO. \ 33} {CB1. que enemistad, y muchas vezes por lleuar ala posada con que el lo passasse, yo lo passaua mal. Porque vna man~ana leuantandose el triste en camisa, subio alo alto dela casa a hazer sus menesteres, y en tanto yo por salir de sospecha, desembolui le el jubon y las calc'as, que ala cabecera dexo, y halle vna bolsilla de terciopelo raso, hecha cien doblezes, y sin maldita la blanca ni sen~al que la vuiesse tenido mucho tiempo. Este ((dezia yo)) es pobre, y nadie da lo que no tiene, mas el auariento ciego, y el malauenturado mezquino clerigo, que con darse lo Dios a ambos, al vno de mano besada, y al otro de lengua suelta, me matauan de hambre, aquellos es justo desamar, y aqueste es de auer manzilla. Dios es testigo que oy dia quando topo con alguno de su habito con aquel passo y pompa, le he lastima, con pensar si padece lo que aquel le vi sufrir, al qual con toda su pobreza holgaria de seruir, mas que alos otros por lo que he dicho. Solo tenia del vn poco de descontento que quisiera yo que no tuuiera tanta presuncion, mas que abaxara vn poco su fan-tasia} {CW. tasia} [fol. 33v] {HD. TRACTADO +} {CB1. con lo mucho que subia su necessidad, mas segun me parece, es regla ya entre ellos vsada y guardada, aunque no aya cornado de trueco ha de andar el birrete en su lugar. El sen~or lo remedie que ya coneste mal han de morir. Pues estando yo en tal estado, passando la vida que digo, quiso mi mala fortuna que de perseguir me no era satisfecha que en aquella trabajada y vergonc'osa biuienda no durasse. Y fue como el an~o en esta tierra fuesse esteril de pan, acordaron el ayuntamie<n>to, que todos los pobres estranjeros se fuessen dela ciudad, con pregon que el que de alli adelante topassen, fuesse punido co<n> ac'otes. Y assi executando la ley, desde a quatro dias que el pregon se dio vi lleuar vna procession de pobres ac'otando por las quatro calles. Lo qual me puso tan gran espanto que nunca ose desmandar me a demandar. Aqui viera quien vello pudiera la abstinencia de mi casa y la tristeza y silencio delos moradores della, tanto que nos acaecio estar dos o. tres dias sin comer bocado, ni hablar palabra. A mi dieron me la vida vnas mugercillas hilanderas} {CW. de} [fol. 34r] {HD. TERCERO. \ 34} {CB1. de Algodon que hazian bonetes, y biuian par de nosotros, con las quales yo tuue vezindad y conocimiento. Que dela lazeria que les trayan me dauan alguna cosilla, con la qual muy passado me passaua, y no tenia tanta lastima de mi, como del lastimado de mi amo, que en ocho dias maldito el bocado que comio, a[ ]lo[ ]menos en casa bien los estuuimos sin comer no se yo como, o do<n>de andaua, y que comia. Y velle venir a medio dia la calle abaxo con estirado cuerpo mas largo que galgo de buena casta, y por lo que tocaua a su negra que dizen honrra, tomaua vna paja delas que aun assaz no auia en casa, y salia ala puerta escaruando los que nada entre si tenian, quexando se todauia de aquel mal solar diziendo, malo esta de ver, que la desdicha desta biuienda lo haze, como ves es lobrega triste, obscura, mientras aqui estuuieremos hemos de padecer, ya desseo se acabe este mes por salir della. Pues estando en esta afligida y hambrienta persecucion, vn dia no se por qual dicha o ventura en el pobre poder de mi amo entro vn real,} {CW. conel} [fol. 34v] {HD. TRACTADO +} {CB1. conel qual vino a casa tan ufano como si tuuiera el thesoro de Venecia, y co<n> gesto muy alegre y risuen~o me lo dio, diziendo. Toma Lazaro que Dios ya va abriendo su mano, ve ala plac'a y merca pan y vino y carne, quebremos el ojo al diablo, y mas te hago saber porque te huelgues q<ue> he alquilado otra casa, y enesta desastrada no hemos de estar mas de en cumpliendo el mes maldita sea ella, y el que enella puso la primera teja que con mal enella entre[.] Por nuestro sen~or quanto ha q<ue> en ella biuo, gota de vino ni bocado de carne no he comido, ni he auido descanso ninguno, mas tal vista tiene y tal obscuridad y tristeza, ve y ven presto y comamos oy como condes. Tomo mi real y jarro y alos pies dando les priessa comienc'o a subir mi calle encaminando mis passos para la plac'a muy contento y alegre. Mas que me aprouecha si esta constituydo en mi triste fortuna que ningun gozo me venga sin c'oc'obra. Y assi fue este porque yendo la calle arriba, echando mi cuenta enlo que le emplearia que fuesse mejor y mas prouechosamente gastado, da<n>do infinitas gracias a Dios, q<ue> a} {CW. mi} [fol. 35r] {HD. TERCERO. \ 35} {CB1. mi amo auia hecho con dinero, a[ ]desora me vino al encuentro vn muerto q<ue> por la calle abaxo muchos clerigos y gente en vnas andas traya<n>, arrime me ala pared por dar les lugar, y desque el cuerpo passo, venia luego par del lecho vna que deuia ser su muger del defunto cargada de luto y conella otras muchas mugeres, la qual yua llorando a grandes bozes y diziendo, marido y sen~or mio, adonde os me lleuan, ala casa triste y desdichada, ala casa lobrega y obscura, ala casa donde nunca comen ni beuen. Yo que aquello oy junto se me el cielo co<n> la tierra, y dixe. O desdichado de mi para mi casa lleuan este muerto, dexo el camino que lleuaua y hendi por medio dela gente, y bueluo por la calle abaxo a todo el mas correr que pude para mi casa, y entrando enella, cierro a grande priessa, inuocando el auxilio y fauor de mi amo, abrac'ando me del que me venga ayudar, y a defender la entrada. El qual algo alterado pensando q<ue> fuesse otra cosa, me dixo. Ques esso moc'o, q<ue> bozes das, que has, porque cierras la puerta con tal furia? O Sen~or dixe yo, acuda aqui q<ue> nos traen} {CW. aca} [fol. 35v] {HD. TRACTADO +} {CB1. aca vn muerto. Como assi, respondio el? Aqui arriba lo encontre, y venia diziendo, su muger, marido y Sen~or mio. Adonde os lleuan, ala casa lobrega y obscura, ala casa triste y desdichada, ala casa donde nunca comen ni beuen, aca sen~or nos le traen. Y ciertamente quando mi amo esto oyo, aunque no tenia porque estar muy risuen~o, rio tanto, que muy gran rato estuuo sin poder hablar. Eneste tiempo tenia ya yo echada el aldaua ala puerta, y puesto el ombro enella por mas defensa. Passo la gente con su muerto, y yo todauia me recelaua que nos le auian de meter en casa, y desque fue ya mas harto de reyr que de comer el bueno de mi amo, dixo me. Verdad es Lazaro segun la biuda lo va diziendo, tu tuuiste razon de pe<n>sar lo que pensaste, mas pues Dios lo ha hecho mejor, y passan adelante, abre, abre y ve por de comer. Dexa los sen~or acaben de passar la calle dixe yo. Al fin vino mi amo ala puerta dela calle y abre la esforc'a<n>do me, que bien era menester segun el miedo y alteracion, y me torno a encaminar, mas aunque comimos bien aquel dia,} {CW. mal-} [fol. 36r] {HD. TERCERO. \ 36} {CB1. maldito el gusto yo tomaua enello, ni en aquellos tres dias torne en mi color, y mi amo muy risuen~o todas las vezes q<ue> sele acordaua aquella mi consideracio<n>. Desta manera estuue con mi tercero y pobre amo que fue este escudero algunos dias, y en todos desseando saber la intencion de su venida y estada en esta tierra, porque desde el primer dia que con el assente, le conosci ser estranjero por el poco conoscimiento, y trato que con los naturales della tenia. Al fin se cumplio mi desseo, y supe lo que desseaua, porque vn dia que auiamos comido razonablemente, y estaua algo contento, co<n>to me su hazienda, y dixo me, ser de Castilla la vieja, y que auia dexado su tierra no mas de por no quitar el bonete a vn cauallero su vezino Sen~or dixe yo. Si el era lo que dezis y tenia mas que vos, no errauades en quitar se lo primero, pues dezis quel tambien os lo quitaua. Si es, y si tiene, y ta<m>bien me lo quitaua el a mi, mas de qua<n>tas vezes yo sele quitaua primero, no fuera malo comedir se el alguna y ganar me tos mil marauedis segun se podria<n> hazer grandes y buenas, y tengo vn palomar que a no estar derribado como esta, daria cada an~o mas de dozientos palominos y otras cosas que me callo que dexe por lo que tocaua a mi honrra, y vine a esta ciudad, pensando que hallaria vn buen assiento, mas no me ha sucedido como pen-se.} {CW. D se} [fol. 37v] {HD. TRACTADO +} {CB1. Canonigos y sen~ores dela yglesia muchos hallo, mas es gente tan limitada, que no los sacara de su passo todo el mundo. Caualleros de media talla ta<m>bien me ruega<n>, mas seruir a estos es gran trabajo, porque de hombre os aueys de conuertir en malilla, y si[ ]no, anda con Dios os dizen, y las mas vezes son los pagamentos a largos plazos, y las mas ciertas comido por seruido, ya quando quieren reformar consciencia, y satisfazeros vuestros sudores, soys librado enla recamara, en vn sudado jubon, o rayda capa, o sayo. Ya quando assienta hombre con vn sen~or de titulo, todauia passa su lazeria, pues por[ ]uentura no ay en mi habilidad para seruir y contentar a estos. Por Dios si conel topasse, muy gran su priuado pienso que fuesse, y que mil seruicios le hiziesse, porque yo sabria mentille tambien como otro, y agradalle a las mil marauillas, reylle ya mucho sus donayres y costu<m>bres. aunque no fuessen las mejores del mundo, nunca dezille cosa con que le pesasse, aunque mucho le cumpliesse, ser muy dilige<n>te en su persona, en dicho y hecho, no me matar} {CW. por} [fol. 38r] {HD. TERCERO. \ 38} {CB1. por no hazer bien las cosas q<ue> el no auia de ver y poner me a ren~ir donde el lo oyesse con la ge<n>te de seruicio, porq<ue> pareciesse tener gra<n> cuydado delo q<ue> a el tocaua, si ren~iesse co<n> alguno su criado dar vnos puntillos agudos para le encender la yra, y que pareciessen en fauor del culpado, dezir le bie<n> delo que bien le estuuiesse, y por el contrario ser malicioso mofador, malsinar alos de casa y alos de fuera, pesquisar y procurar de saber vidas ajenas, para contarselas, y otras muchas galas desta calidad, que oy dia se vsan en palacio y alos sen~ores del parecen bien, y no quieren ver en sus casas hombres virtuosos, antes los aborrecen y tienen en poco, y llaman Necios y que no son personas de negocios, ni con quien el sen~or se puede descuydar, y con estos los astutos vsan como digo el dia de oy, delo que yo vsaria, mas no quiere mi ventura que le halle. Desta manera lamentaua tambien su aduersa fortuna mi amo, dando me relacion de su persona valerosa. Pues estando enesto, entro por la puerta vn hombre y vna vieja, el hombre le pide el alquile dela casa, y} {CW. la} [fol. 38v] {HD. TRACTADO +} {CB1. la vieja el dela cama, hazen cuenta y de dos meses le alcanc'aron, lo que el en vn an~o no alcanc'ara, pienso que fueron doze or treze reales, y el les dio muy buena respuesta que saldria ala plac'a a trocar vna piec'a de a dos y que ala tarde boluiessen, mas su salida fue sin buelta. Por manera que a la tarde ellos boluieron, mas fue tarde, yo les dixe, que aun no era venido. Venida la noche y el no, yo vue miedo de quedar en casa solo, y fuy me alas vezinas y conteles el caso, y alli dormi. Venida la man~ana los acreedores bueluen y preguntan por el vezino, mas a estotra puerta. Las mugeres le responden, veys aqui su moc'o y la llaue dela puerta, ellos me preguntaron por el, y dixe les que no sabia adonde estaua y que ta<m>poco auia buelto a casa desque salio a trocar la piec'a, y q<ue> pensaua q<ue> de mi y de ellos se auia ydo con el trueco. De que esto me oyeron, van por vn alguazil y vn escriuano, y he los do bueluen luego conellos, y toma<n> la llaue y llamanme, y llaman testigos y abren la puerta y entran a embargar la hazienda de mi amo hasta ser pagados de su deuda.} {CW. An-} [fol. 39r] {HD. TERCERO. \ 39} {CB1. Anduuieron toda la casa, y hallaronla desembarac'ada, como he contado, y dizenme. Ques dela hazienda de tu amo? Sus arcas y pan~os de pared y alhajas de casa? No se yo esso le respo<n>di. Sin duda dizen ellos esta noche lo deuen de auer alc'ado y lleuado a alguna parte. Sen~or alguazil prended a este moc'o, que el sabe donde esta. En esto vino el alguazil y echo me mano por el collar del jubon, diziendo. Mochacho tu eres preso, si no descubres los bienes deste tu amo. Yo como en otra tal no me vuiesse visto, porque asido del collar si auia sido muchas vezes, mas era ma<n>samente del trauado para que mostrasse el camino al que no via. Yo vue mucho miedo y llorando prometi le de dezir lo que me pregu<n>taua<n>. Bien esta dize<n> ellos, pues di lo q<ue> sabes y no ayas temor, sentose el escriuano en vn poyo para escreuir el inue<n>tario pregunta<n>do me q<ue> tenia. Sen~ores dixe yo, lo que este mi amo tiene segun el me dixo, es vn muy buen solar de casas y vn palomar derribado. Bien esta dize<n> ellos, por poco que esso valga, ay para nos entregar de la deuda. Y a q<ue> parte de la ciudad tiene esso, me pre-guntaron?} {CW. D 3 gun-} [fol. 39v] {HD. TRACTADO +} {CB1. En su tierra les respondi. Por Dios que esta bueno el negocio dixeron ellos, y ado<n>de es su tierra? De Castilla la vieja me dixo el q<ue> era, les dixe. Rieronse mucho el Alguazil y el escriuano diziendo. Bastante relacion es esta, para cobrar vuestra deuda, aunq<ue> mejor fuesse. Las vezinas q<ue> estauan presentes, dixeron. Sen~ores este es vn nin~o innoce<n>te, y ha pocos dias q<ue> esta conesse escudero, y no sabe del mas q<ue> vuestras mercedes, si[ ]no qua<n>to el pecadorcico se llega aqui a nuestra casa, y le damos de comer lo q<ue> podemos por amor de Dios, y alas noches se yua a dormir co<n>el. Vista mi innoce<n>cia, dexaro<n> me da<n>do me por libre. Y el Alguazil y el escriuano pide<n> al ho<m>bre y ala muger sus derechos sobre lo qual tuuiero<n> gran co<n>tienda y ruydo, porque ellos allegaron no ser obligados a pagar, pues no auia de que, ni se hazia el embargo, los otros dezia<n> que auian dexado de yr a otro negocio, q<ue> les importaua mas, por venir a aquel, finalmente despues de dadas muchas bozes, al cabo carga vn porquero<n> con el viejo alfamar de la vieja, y aunque no yua muy cargado alla van todos} {CW. cinco} [fol. 40r] {HD. TERCERO. \ 40} {CB1. cinco dando bozes, no se en que paro, creo yo quel pecador alfamar pagara por todos y bien se empleaua, pues el tie<m>po que auia de reposar y descansar delos trabajos passados, se andaua alquilando. Assi como he contado me dexo mi pobre tercero amo, do acabe de conocer mi ruyn dicha, pues sen~alandose todo lo q<ue> podria co<n>tra mi, hazia mis negocios tan al reues, que los amos que suele<n> ser dexados delos moc'os en mi no fuesse assi, mas q<ue> mi amo me dexasse y huyesse de mi. {RUB. Como Lazaro se assento con vn Frayle dela Merced, y delo que le acaecio conel.} {IN2.} VVe de buscar el quarto y este fue vn Frayle dela Merced q<ue> las mugercillas que digo, me encaminaron. Al qual ellas le llamaua<n> pariente, gran enemigo del coro, y de comer enel co<n>uento, perdido por andar fuera, amicissimo de negocios seglares, y visitas, ta<n>to que pie<n>so que rompia el mas} {CW. D 4 c'a-} [fol. 40v] {HD. TRACTADO +} {CB1. c'apatos q<ue> todo el conuento. Este me dio los primeros c'apatos que rompi en mi vida, mas no me duraron ocho dias, ni yo pude con su trote durar mas. Y por esto y por otras cosillas que no digo sali del. {RUB. Como Lazaro se assento con vn Buldero, y de las cosas que conel passo.} {IN2.} ENel quinto por mi ve<n>tura di, que fue vn Buldero el mas desembuelto y desuergo<n>c'ado, y el mayor echador dellas que jamas yo vi, ni ver espero, ni pienso nadie vio, porque tenia y buscaua modos y maneras y muy sotiles inuenciones. En entrando enlos lugares do auian de presentar la bulla, primero presentaua alos clerigos o curas algunas cosillas no ta<m>poco de mucho valor ni substancia. Vna lechuga Murciana si era por el tiempo, vn par de limas o naranjas, vn melocoton, vn par de duraznos, cada sendas peras verdin~ales. Assi procuraua tener los propicios, porque fauoreciessen su ne-gocio} {CW. gocio} [fol. 41r] {HD. QVINTO. \ 41} {CB1. y llamassen sus feligreses a tomar la bulla ofreciendose le a el las gracias, informaua se dela suficiencia dellos, si dezian que entendia<n>, no hablaua palabra en Latin por no dar tropec'on, mas aprouechauase de vn gentil y bien cortado romance y desemboltissima lengua. Y si sabian que los dichos clerigos eran delos reuerendos, digo que mas con dineros que con letras y con reuerendas se ordenan, hazia se entre ellos vn santo Thomas, y hablaua dos horas en Latin, a[ ]lo[ ]menos que lo parecia aunque no lo era. Quando por bien no le tomauan las bullas, buscaua como por mal se las tomassen y para aquello hazia molestias al pueblo. Y otras vezes con man~osos artificios, y porque todos los que le veya hazer seria largo de contar, dire vno muy sotil y donoso conel qual prouare bien su suficiencia. En vn lugar dela sagra de Toledo, auia predicado dos o tres dias, haziendo sus acostumbradas diligencias, y no le auian tomado bulla, ni a mi ver tenian inte<n>cion de sela tomar. Estaua dado al diablo con aquello, y pe<n>sando q<ue> hazer se acordo de co<m>bidar} {CW. D 5 al} [fol. 41v] {HD. TRACTADO +} {CB1. al pueblo, para otro dia de man~ana despedir la bulla. Y essa noche despues de cenar pusieron se a jugar la colacion el y el Alguazil, y sobre el juego viniero<n> a ren~ir y a auer malas palabras. El llamo al Alguazil ladron, y el otro a el falsario, sobre esto el sen~or Comissario mi sen~or tomo vn lanc'on, que enel portal do jugauan, estaua. El Alguazil puso mano a su espada que en la cinta tenia, al ruydo, y bozes que todos dimos, acuden los huespedes y vezinos, y meten se en medio, y ellos muy enojados procurandose de desembarac'ar delos que en medio estauan, para se matar, mas como la ge<n>te al gran ruydo cargasse, y la casa estuuiesse llena della, viendo que no podian afrentarse con las armas, dezian se palabras injuriosas, entre las quales el Alguazil dixo a mi amo, que era falsario y las bullas que predicaua eran falsas, finalmente que los del pueblo viendo que no bastaua<n> ponellos en paz, acordaro<n> de lleuar al Alguazil dela posada a otra parte. Y assi quedo mi amo muy enojado, y despues que los huespedes y vezinos le vuieron rogado que perdiesse el enojo y se fuesse a dormir: as-si} {CW. si} [fol. 42r] {HD. QVINTO. \ 42} {CB1. nos echamos todos. La man~ana venida, mi amo se fue ala yglesia y mando tan~er a Missa y al sermon para despedir la bulla. Y el pueblo se junto, el qual andaua murmurando delas bullas, diziendo, como eran falsas, y que el mismo Alguazil rin~endo, lo auia descubierto. De manera que atras que tenian mala gana de tomalla, con aquello del todo la abor[r]escieron. El sen~or Comissario se subio al pulpito, y comienc'a su sermon, y a animar la gente a que no quedassen sin tanto bien, y indulgencia, como la sancta Bulla traya. Estando en lo mejor del sermon, entra por la puerta dela yglesia el Alguazil, y desque hizo oracion, leuantose, y con boz alta y pausada, cuerdamente comenc'o a dezir. Buenos ho<m>bres oyd me vna palabra, que despues oyreys a quien quisierdes. Yo vine aqui con este Echacueruo, que os predica, el qual me engan~o, y dixo que le fauoresciesse en este negocio, y que partiriamos la ganancia, y agora visto el dan~o que haria a mi consciencia y a vuestras haziendas, arrepentido delo hecho os, declaro claramente, que las bullas que predica son} {CW. D 6 fal-} [fol. 42v] {HD. TRACTADO +} {CB1. falsas, y que no le creays ni las tomeys, y que yo directe ni indirecte no soy parte en ellas, y que desde agora dexo la vara y doy con ella enel suelo, y si en algun tiempo este fuere castigado por la falsedad que vosotros me seays testigos como yo no soy con el, ni le doy a ello ayuda, antes os desengan~o, y declaro su maldad. Y acabo su razonamiento. Algunos hombres honrrados que alli estauan se quisieron leuantar y echar al Alguazil fuera dela yglesia por euitar escandalo, mas mi amo les fue ala mano y mando a todos que so pena de excomunion no le estoruassen, mas que le dexassen dezir todo lo que quisiesse, y assi el tambien tuuo silencio mientras el Alguazil dixo todo lo que he dicho, como callo, mi amo le pregu<n>to si queria dezir mas que lo dixesse. El Alguazil dixo: harto mas ay que dezir de vos, y de vuestra falsedad, mas por agora basta. El sen~or Comissario se hinco de rodillas enel pulpito, y puestas las manos y mirando al cielo, dixo assi. Sen~or Dios aquie<n> ninguna cosa es escondida antes todas manifiestas, y a quien nada es impossible antes todo possible, tu sabes la} {CW. verdad} [fol. 43r] {HD. QVINTO. \ 43} {CB1. verdad y quan injustamente yo soy afrentado, en lo que a mi toca yo le perdono, porque tu sen~or me perdones, no mires a aquel que no sabe lo que haze, ni dize, mas la injuria a ti hecha, te suplico y por justicia te pido no dissimules, porque alguno que esta aqui, q<ue> por[ ]uentura penso tomar aquesta santa bulla, dando credito alas falsas palabras de aquel hombre lo dexara de hazer, y pues es ta<n>to perjuyzio del proximo, te suplico yo sen~or no lo dissimules, mas luego muestra aqui milagro, y sea desta manera, que si es verdad lo que aquel dize y q<ue> yo traygo maldad y falsedad, este pulpito se hunda comigo, y meta siete estados debaxo de tierra, do el ni yo jamas parezcamos. Y si es verdad lo que yo digo, y aquel persuadido del demonio ((por quitar y priuar a los que esta<n> presentes de tan gran bien)) dize maldad, tambien sea castigado, y de todos conocida su malicia. A( )penas auia acabado su oracion el deuoto sen~or mio, quando el negro Alguazil cae de su estado, y da ta<n> gran golpe enel suelo que la yglesia toda hizo resonar, y comenc'o a bramar y echar espumajos por la boca y torcella,} {CW. D 7 y} [fol. 43v] {HD. TRACTADO +} {CB1. y hazer visajes con el gesto, dando de pie y de mano, reboluiendose por aquel suelo a vna parte y a otra, el estruendo y bozes dela gente era tan grande, que no se oyan vnos a otros, algunos estauan espantados y temerosos, vnos dezian, el sen~or le socorra y valga, otros bien se le emplea, pues leuantaua tan falso testimonio. Finalmente algunos que alli estaua<n> y a mi parecer no sin harto temor se llegaron y le trauaron delos brac'os, con los quales daua fuertes pun~adas alos que cerca del estauan, otros le tirauan por las piernas, y tuuieron reziamente, porque no auia mula falsa enel mundo, q<ue> tan rezias coces tirasse. Y assi le tuuieron vn gran rato, porq<ue> mas de quinze ho<m>bres estauan sobre el, y a todos daua las manos llenas, y si se descuydauan, en los hocicos. A todo esto el sen~or mi amo estaua enel pulpito de rodillas, las manos y los ojos puestos enel cielo, trasportado en la diuina essencia, que el planto y ruydo y bozes que en la yglesia auia no era<n> parte para apartalle de su diuina co<n>templacion. Aquellos buenos hombres llegaron a el, y dando bozes le despertaron, y le suplica-ron} {CW. ron} [fol. 44r] {HD. QVINTO. \ 44} {CB1. quisiesse socorrer a aquel pobre que estaua murie<n>do, y que no mirasse alas cosas passadas, ni a sus dichos malos, pues ya dellos tenia el pago, mas si en algo podia aprouechar para librar le del peligro y passion que padescia por amor de Dios lo hiziesse. Pues ellos veyan clara la culpa del culpado, y la verdad, y bondad suya, pues a su peticion, y venganc'a el sen~or no alargo el castigo. El sen~or Comissario como quie<n> despierta de vn dulce suen~o, los miro y miro al delinquente, y a todos los que alrededor estauan y muy pausadamente les dixo. Buenos hombres vosotros nunca auiades de rogar por vn hombre en quien Dios tan sen~aladame<n>te se ha sen~alado. Mas pues el nos manda que no boluamos mal por mal, y perdonemos las injurias con confianc'a podremos suplicar le que cumpla lo que nos manda, y su majestad perdone a este que le ofendio poniendo en su santa fe obstaculo, vamos todos a suplicalle. Y assi baxo del pulpito y encomendo aqui muy deuotamente suplicassen a nuestro Sen~or tuuiesse por bien de perdonar a aquel pecador y boluerle en su salud y} {CW. sano} [fol. 44v] {HD. TRACTADO +} {CB1. sano juyzio, y lanc'ar del el demonio si su majestad auia permitido, que por su gran pecado enel entrasse. Todos se hincaron de rodillas y delante del altar con los clerigos comenc'auan a ca<n>tar con boz baxa vna letania, y viniendo el con la cruz y agua bendita despues de auer sobre el cantado, el sen~or mi amo puestas las manos al cielo, y los ojos que casi nada se le parecia sino vn poco de blanco, comienc'a vna oracion no menos larga que deuota, co<n> la qual hizo llorar a toda la gente como suele<n> hazer en los sermones de passion de predicador y auditorio deuoto suplica<n>do a nuestro Sen~or pues no queria la muerte del pecador, sino su vida y arrepentimiento que aquel encaminado por el demonio y persuadido de la muerte y pecado le quisiesse perdonar y dar vida y salud, para que se arrepintiesse y confessasse sus pecados, y esto hecho mando traer la bulla, y pusosela en la cabec'a y luego el pecador del Alguazil come<n>c'o poco a poco a estar mejor y tornar en si, y desque fue bien buelto en su acuerdo, echose alos pies del sen~or Comissario, y dema<n>dando le perdon, confesso auer dicho} {CW. aque-} [fol. 45r] {HD. QVINTO. \ 45} {CB1. aquello por la boca y mandamiento del demonio, lo vno por hazer a el dan~o y vengar se del enojo, lo otro y mas principal, porque el demonio recibia mucha pena del bien que alli se hiziera en tomar la bulla. El sen~or mi amo le perdono, y fueron hechas las amistades entre ellos, y a tomar la bulla vuo tanta priessa, que casi anima biuie<n>te enel lugar no quedo sin ella, marido, y muger, y hijos y hijas, moc'os y moc'as, diuulgose la nueua delo acaecido por los lugares comarcanos, y quando a ellos llegauamos no era menester sermon ni yr ala yglesia. Que a la posada la venia<n> a tomar como si fueran peras que se dieran de[ ]balde. De manera que en diez o doze lugares de aquellos alrededores, donde fuymos echo el sen~or mi amo otras tantas mil bullas sin predicar sermon. Quando se hizo el ensayo confiesso mi pecado, que tambien fuy dello espantado, y crey que assi era como otros muchos. Mas co<n> ver despues la risa y burla que mi amo y el Alugazil lleuaua<n> y hazian del negocio, conoci como auia sido industriado por el industrioso y inuentiuo de mi amo, y aunque mochacho} {CW. cayo} [fol. 45v] {HD. TRACTADO. VI.} {CB1. cayo me mucho en gracia, y dixe entre mi. Quantas destas deuen de hazer estos burladores entre la innocente gente. Finalmente estuue con este mi quinto amo cerca de quatro meses, en los quales passe ta<m>bien hartas fatigas. {RUB. Como Lazaro se assento con vn Capellan, y lo que conel passo.} {IN2.} DEspues desto, assente con vn maestro de pintar panderos, para molelle los colores, y ta<m>bien sufri mil males. Siendo ya en este tiempo bue<n> moc'uelo entrando vn dia en la yglesia mayor vn Capellan della me recibio por suyo, y puso me en poder vn bue<n> asno y quatro cantaros, y vn ac'ote, y comence a echar agua por la ciudad. Este fue el primer escalon que yo subi para venir a alcanc'ar buena vida, porque mi boca era medida, daua cada dia a mi amo treynta marauedis ganados y los sabados ganaua para mi, y todo lo de( )mas entre semana de treynta marauedis. Fue me tambien enel oficio que al cabo de quatro an~os que lo vse} {CW. con} [fol. 46r] {HD. TRACTADO. VII. \ 46} {CB1. con poner en la ganancia buen recaudo ahorre para me vestir muy ho<n>rradamente dela ropa vieja, dela qual co<m>pre vn jubon de fustan viejo, y vn sayo raydo de manga tranc'ada y puerta, y vna capa que auia sido frisada, y vna espada de las viejas primeras de Cuellar. Desque me vi en habito de hombre de bien, dixe a mi amo se tomasse su asno que no queria mas seguir aquel oficio. {RUB. Como Lazaro se assento con vn Alguazil, y de lo que le acaecio conel.} {IN2.} DEspedido del Capella<n> assente por hombre de justicia con vn Alguazil, mas muy poco biui conel, por parecer me oficio peligroso, mayormente que vna noche nos corrieron a mi y a mi amo a pedradas y a palos vnos retraydos, y a mi amo que espero, tractaron mal, mas a mi no me alcanc'aro<n>, co<n> esto renegue del trato, y pensando en q<ue> modo de biuir haria mi assiento por tener desca<n>so, y ganar algo para la vejez, quiso Dios alumbrarme, y po-nerme} {CW. ner} [fol. 46v] {HD. TRACTADO +} {CB1. en camino y manera prouechosa, y con fauor que tuue de amigos y sen~ores, todos mis trabajos y fatigas hasta entonces passados fueron pagados con alcanc'ar lo que procure, que fue vn oficio real, vie<n>do que no ay nadie que medre, sino los que le tienen. Enel qual el dia de oy yo biuo y resido a seruicio de Dios y de. V<uestra> M<erced> Y es q<ue> tengo cargo de pregonar los vinos que en esta ciudad se venden, y en almonedas y cosas perdidas, acompan~ar los que padece<n> persecuciones por justicia, y declarar a bozes sus delitos, pregonero hablando en buen roma<n>ce. Ha me sucedido tambien, y yo le he vsado tan facilme<n>te, que casi todas las cosas al oficio tocantes passan por mi mano, tanto que en toda la ciudad, el que ha de echar vino a vender, o algo, si Lazaro de Tormes no entiende en ello, hazen cuenta de no sacar prouecho. En este tiempo viendo mi habilidad y buen biuir teniendo noticia de mi persona el sen~or Arcipreste de sant Saluador mi sen~or, y seruidor, y amigo de. V<uestra> M<erced> porque le pregonaua sus vinos, procuro casarme con vna criada suya, y visto por mi que de tal} {CW. perso-} [fol. 47r] {HD. SEPTIMO. \ 47} {CB1. persona no podia venir sino bien y fauor, acorde delo hazer, y assi me case co<n> ella, y hasta agora no estoy arrepentido, porque allende de ser buena hija, y diligente seruicial, tengo en mi sen~or Arcipreste todo fauor y ayuda, y siempre enel an~o le da en vezes al pie de vna carga de trigo, por las Pascuas su carne, y quando el par delos bodigos, las calc'as viejas que dexa, y hizo nos alquilar vna casilla par dela suya, los Domingos y fiestas casi todas las comiamos en su casa, mas malas lenguas que nunca faltaron no nos dexan biuir, diziendo, no se que y si se que veen a mi muger yr le a hazer la cama, y guisalle de comer, y mejor les ayude Dios que ellos dizen la verdad, porque allende de no ser ella muger que se pague destas burlas, mi sen~or me ha prometido lo que pie<n>so cumplira, que el me hablo vn dia muy largo delante della y me dixo, Lazaro de Tormes, quien ha de mirar a dichos de malas lenguas, nu<n>ca medrara, digo esto porque no me marauillaria alguno viendo entrar en mi casa a tu muger, y salir della. Ella entra muy a tu ho<n>rra y suya y esto te lo prometo. Por tanto no mi-res} {CW. res} [fol. 47v] {HD. TRACTADO +} {CB1. alo que pueden dezir, sino alo que te toca, digo a tu prouecho. Sen~or, le dixe, yo determine de arrimar me alos buenos, verdad es que algunos de mis amigos me han dicho algo desso, y aun por mas de tres vezes me han certificado, que antes que comigo casasse auia parido tres vezes hablando con reuerencia de. V<uestra> M<erced> porque esta ella delante, entonces mi muger echo juramentos sobre si, que yo pense la casa se hundiera con nosotros, y despues tomo se a llorar y a echar mil maldiciones sobre quien comigo la auia casado. En tal manera que quisiera ser muerto antes que se me vuiera soltado aquella palabra dela boca, mas yo de vn cabo, y mi sen~or de otro, tanto le diximos y otorgamos que cesso su llanto con juramento que le hize de nunca mas en mi vida mentalle nada de aquello, y que yo holgaua y auia por bien de que ella entrasse y saliesse de noche y de dia, pues estaua bien seguro de su bondad. Y assi quedamos todos tres bien co<n>formes, hasta el dia de oy nunca nadie nos oyo sobre el caso, antes qua<n>do alguno siento q<ue> quiere dezir algo della, le atajo y le digo:} {CW. Mira} [fol. 48r] {HD. SEPTIMO. \ 48} {CB1. Mira si soys mi amigo no me digays cosa con que me pese, que no te<n>go por mi amigo al que me haze pesar, mayormente si me quieren meter mal co<n> mi muger, que es la cosa del mundo que yo mas quiero, y la amo mas que a mi, y me haze Dios conella mil mercedes y mas bien que yo merezco, que yo jurare sobre la hostia consagrada, que es tan buena muger como biue dentro delas puertas de Toledo, y quien otra cosa me dixere, yo me matare con el. Desta manera no me dizen nada, y yo tengo paz en mi casa. Esto fue el mesmo an~o que nuestro victorioso Emperador en esta insigne ciudad de Toledo entro, y tuuo en ella cortes, y se hizieron grandes regozijos y fiestas, como. V<uestra> M<erced> aura oydo. Pues en este tiempo estaua en mi prosperidad, y en la cumbre de toda buena fortuna. FIN.}`;

        const textBurgosRaw = `[fol. 1r] {CB1. {RMK: HSMS-0347-0001: Lazarillo de Tormes.} {MIN. % La vida de Lazarillo de Tormes: y de sus fortunas y aduersidades. 1554}} [fol. 1v] {HD. % Prologo.} {CB1. {IN4.} YO por bien tengo q<ue> cosas ta<n> sen~aladas: y por ve<n>tura nu<n>ca oydas ni vistas: venga<n> a noticia d<e> muchos: y no se entierren enla sepultura del oluido / pues podria ser que alguno que las lea / halle algo que le agrade. Y alas que no ahondaren tanto los deleyte / & a este proposito dize Plinio: que no ay libro por malo que sea / que no tenga algu<n>a cosa buena. Mayormente que los gustos no son todos vnos: mas lo q<ue> vno no come: otro se pierde por ello. Y assi vemos cosas tenidas en poco de algu<n>os que de otros no lo son. Y esto para que ninguna cosa se deuria romper, ni echar a mal si muy detestable no fuesse sino que a todos se comunicasse: mayorme<n>te sie<n>do sin perjuyzio / & pudiendo sacar della algun fructo: porque si assi no fuesse muy pocos escriuirian para vno solo: pues no se haze sin trabajo. Y quieren ya que lo passan / ser recompensados no con dineros, mas co<n> q<ue> vean y lean sus obras: y si ay de que se las alabe<n>. Y a este proposito dize Tulio. La ho<n>-ra} [fol. 2r] {HD. Prologo.} {CB1. cria las artes. Quien piensa que el soldado que es primero d<e>l escala / tiene mas aborrescido el viuir / no por cierto / mas el desseo de alabanc'a le haze poner se al peligro: y assi enlas artes y letras es lo mesmo. Predica muy bie<n> el presentado: y es hombre q<ue> dessea mucho el prouecho delas animas / mas pregunten a su merced si le pesa qua<n>do le dize<n>. O q<ue> marauillosamente lo ha hecho vuestra reuere<n>cia / Justo muy ruynmente el sen~or do<n> fulano / & dio el sayete d<e> armas al truha<n> / porq<ue> le loaua de auer lleuado muy buenas lanc'as: que hiziera si fuera verdad? & todo va desta manera / que confessando yo no ser mas sancto que mis vezinos: desta nonada q<ue> en<e>ste grossero estilo escriuio: no me pesar
